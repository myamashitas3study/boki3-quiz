","ch":["¥240,000","¥360,000","¥480,000","¥600,000"],"e":"期末の減価償却累計額は240,000＋120,000＝360,000。帳簿価額は600,000−360,000＝240,000です。当期分の償却費を忘れないようにしましょう。"},{"c":"決算","t":"精算表・財務諸表","q":"当期の収益合計は¥3,500,000、費用合計は¥3,200,000であった。損益計算書に表示される当期純利益はいくらか。","ch":["¥300,000","¥3,500,000","¥6,700,000","¥320,000"],"e":"当期純利益＝収益合計−費用合計＝3,500,000−3,200,000＝300,000です。"},{"c":"決算","t":"精算表・財務諸表","q":"決算整理後の売掛金残高は¥400,000、貸倒引当金残高は¥8,000である。貸借対照表において売掛金から貸倒引当金を控除した金額はいくらか。","ch":["¥392,000","¥408,000","¥400,000","¥8,000"],"e":"貸借対照表では売掛金400,000から貸倒引当金8,000を差し引いた392,000が回収可能見込額として示されます。"},{"c":"決算","t":"精算表・財務諸表","q":"精算表において、残高試算表欄の保険料は¥36,000(借方)、修正記入欄に前払分¥12,000が貸方に記入されている。損益計算書欄に記入される保険料の金額はいくらか。","ch":["¥24,000","¥36,000","¥48,000","¥12,000"],"e":"費用の勘定は残高から貸方の修正額を差し引きます。36,000−12,000＝24,000が当期の費用として損益計算書欄に移ります。加算しないよう注意しましょう。"},{"c":"決算","t":"精算表・財務諸表","q":"精算表において、残高試算表欄の受取家賃は¥180,000(貸方)、修正記入欄に前受分¥30,000が借方に記入されている。損益計算書欄に記入される受取家賃の金額はいくらか。","ch":["¥150,000","¥180,000","¥210,000","¥30,000"],"e":"収益の勘定は貸方残高から借方の修正額を差し引きます。180,000−30,000＝150,000が当期の収益です。"},{"c":"決算","t":"精算表・財務諸表","q":"精算表において、残高試算表欄の支払利息は¥9,000(借方)、修正記入欄に未払分¥3,000が借方に記入されている。損益計算書欄に記入される支払利息の金額はいくらか。","ch":["¥12,000","¥6,000","¥9,000","¥3,000"],"e":"未払費用の計上は費用の追加なので、同じ借方どうしを合計します。9,000＋3,000＝12,000です。差し引いてしまう間違いに注意しましょう。"},{"c":"決算","t":"精算表・財務諸表","q":"期首の純資産は¥2,000,000、期末の純資産は¥2,350,000であった。期中に増資や配当はない。当期純利益はいくらか。","ch":["¥350,000","¥2,350,000","¥4,350,000","¥1,650,000"],"e":"資本取引がなければ、純資産の増加額がそのまま当期純利益です。2,350,000−2,000,000＝350,000となります。"},{"c":"決算","t":"精算表・財務諸表","q":"期末の貸借対照表において、資産総額は¥5,000,000、負債総額は¥3,200,000であった。純資産の金額はいくらか。","ch":["¥1,800,000","¥8,200,000","¥3,200,000","¥2,800,000"],"e":"資産＝負債＋純資産の関係から、純資産＝5,000,000−3,200,000＝1,800,000です。"},{"c":"決算","t":"精算表・財務諸表","q":"精算表で当期純利益が生じた場合、その金額が記入される欄の組み合わせとして正しいものはどれか。","ch":["損益計算書欄の借方と貸借対照表欄の貸方","損益計算書欄の貸方と貸借対照表欄の借方","損益計算書欄の借方と貸借対照表欄の借方","修正記入欄の借方と貸方"],"e":"当期純利益は損益計算書欄では収益と費用の差額を埋める借方に、貸借対照表欄では純資産の増加として貸方に記入されます。"},{"c":"決算","t":"精算表・財務諸表","q":"期首商品棚卸高は¥50,000、当期商品仕入高は¥600,000、期末商品棚卸高は¥70,000である。決算整理後の繰越商品勘定の残高はいくらか。","ch":["¥70,000","¥50,000","¥580,000","¥620,000"],"e":"決算整理(しーくり・くりしー)を行うと、繰越商品勘定の残高は期末商品棚卸高の70,000になります。580,000は売上原価の金額です。"},{"c":"決算","t":"精算表・財務諸表","q":"当期の売上高は¥1,500,000、売上原価は¥900,000であった。損益計算書に表示される売上総利益はいくらか。","ch":["¥600,000","¥900,000","¥2,400,000","¥1,500,000"],"e":"売上総利益＝売上高−売上原価＝1,500,000−900,000＝600,000です。"},{"c":"決算","t":"精算表・財務諸表","q":"決算整理で計上した前払保険料は、財務諸表のどこに表示されるか。","ch":["貸借対照表の資産の部","貸借対照表の負債の部","損益計算書の費用","貸借対照表の純資産の部"],"e":"前払保険料(前払費用)は翌期の費用を先に支払ったもので、サービスを受ける権利を表す資産として貸借対照表に表示されます。"},{"c":"決算","t":"勘定の締切","q":"決算にあたり、売上勘定の残高¥2,000,000を損益勘定へ振り替える仕訳として正しいものはどれか。","ch":["(借)売上 2,000,000 ／ (貸)損益 2,000,000","(借)損益 2,000,000 ／ (貸)売上 2,000,000","(借)売上 2,000,000 ／ (貸)繰越利益剰余金 2,000,000","(借)売上 2,000,000 ／ (貸)資本金 2,000,000"],"e":"収益の勘定は貸方残高なので、締め切るときは借方に記入して損益勘定の貸方へ振り替えます。"},{"c":"決算","t":"勘定の締切","q":"決算にあたり、仕入勘定の残高(売上原価)¥1,400,000を損益勘定へ振り替える仕訳として正しいものはどれか。","ch":["(借)損益 1,400,000 ／ (貸)仕入 1,400,000","(借)仕入 1,400,000 ／ (貸)損益 1,400,000","(借)損益 1,400,000 ／ (貸)繰越商品 1,400,000","(借)繰越利益剰余金 1,400,000 ／ (貸)仕入 1,400,000"],"e":"費用の勘定は借方残高なので、貸方に記入して損益勘定の借方へ振り替えます。収益の振替と貸借が逆になる点に注意しましょう。"},{"c":"決算","t":"勘定の締切","q":"決算にあたり、給料勘定の残高¥300,000を損益勘定へ振り替える仕訳として正しいものはどれか。","ch":["(借)損益 300,000 ／ (貸)給料 300,000","(借)給料 300,000 ／ (貸)損益 300,000","(借)給料 300,000 ／ (貸)未払給料 300,000","(借)繰越利益剰余金 300,000 ／ (貸)給料 300,000"],"e":"給料は費用の勘定なので、損益勘定の借方へ振り替えます。仕訳では損益が借方、給料が貸方になります。"},{"c":"決算","t":"勘定の締切","q":"決算にあたり、受取利息勘定の残高¥5,000を損益勘定へ振り替える仕訳として正しいものはどれか。","ch":["(借)受取利息 5,000 ／ (貸)損益 5,000","(借)損益 5,000 ／ (貸)受取利息 5,000","(借)受取利息 5,000 ／ (貸)未収利息 5,000","(借)受取利息 5,000 ／ (貸)繰越利益剰余金 5,000"],"e":"受取利息は収益の勘定なので、借方に記入して残高をゼロにし、損益勘定の貸方へ振り替えます。"},{"c":"決算","t":"勘定の締切","q":"損益勘定の貸方合計(収益)は¥2,500,000、借方合計(費用)は¥2,100,000であった。当期純利益を振り替える仕訳として正しいものはどれか。","ch":["(借)損益 400,000 ／ (貸)繰越利益剰余金 400,000","(借)繰越利益剰余金 400,000 ／ (貸)損益 400,000","(借)損益 400,000 ／ (貸)資本金 400,000","(借)損益 2,500,000 ／ (貸)繰越利益剰余金 2,500,000"],"e":"当期純利益は2,500,000−2,100,000＝400,000。株式会社では損益勘定から繰越利益剰余金勘定(純資産)へ振り替えます。資本金勘定ではありません。"},{"c":"決算","t":"勘定の締切","q":"決算の結果、当期純損失¥100,000が生じた。損益勘定から振り替える仕訳として正しいものはどれか。","ch":["(借)繰越利益剰余金 100,000 ／ (貸)損益 100,000","(借)損益 100,000 ／ (貸)繰越利益剰余金 100,000","(借)資本金 100,000 ／ (貸)損益 100,000","(借)雑損 100,000 ／ (貸)損益 100,000"],"e":"純損失のときは純利益と貸借が逆になり、繰越利益剰余金を減らす借方記入になります。"},{"c":"決算","t":"勘定の締切","q":"損益勘定に集計された収益の合計は¥1,800,000、費用の合計は¥1,650,000であった。繰越利益剰余金勘定へ振り替えられる金額はいくらか。","ch":["¥150,000","¥1,800,000","¥1,650,000","¥3,450,000"],"e":"振り替えられるのは収益と費用の差額である当期純利益で、1,800,000−1,650,000＝150,000です。"},{"c":"決算","t":"勘定の締切","q":"決算において、損益勘定へ残高を振り替える勘定の組み合わせとして正しいものはどれか。","ch":["収益と費用の勘定","資産と負債の勘定","資産と純資産の勘定","すべての勘定"],"e":"損益勘定へ振り替えるのは収益・費用の勘定だけです。資産・負債・純資産の勘定は振り替えず、次期繰越として締め切ります。"},{"c":"決算","t":"勘定の締切","q":"決算日における現金勘定の借方残高は¥250,000であった。英米式決算法により現金勘定を締め切るとき、貸方に記入する語句と金額の組み合わせとして正しいものはどれか。","ch":["次期繰越 250,000","前期繰越 250,000","損益 250,000","繰越利益剰余金 250,000"],"e":"資産の勘定は損益勘定へ振り替えず、残高のある側と反対の貸方に「次期繰越」と記入して締め切ります。「前期繰越」は翌期首の記入です。"},{"c":"決算","t":"勘定の締切","q":"次の勘定のうち、決算で損益勘定へ振り替えずに「次期繰越」と記入して締め切るものはどれか。","ch":["建物","支払家賃","売上","雑益"],"e":"建物は資産の勘定なので次期繰越で締め切ります。支払家賃は費用、売上と雑益は収益なので損益勘定へ振り替えます。"},{"c":"決算","t":"勘定の締切","q":"繰越利益剰余金勘定の期首残高は¥500,000であった。当期純利益¥200,000を振り替えた後の繰越利益剰余金勘定の残高はいくらか。配当等は行っていない。","ch":["¥700,000","¥500,000","¥200,000","¥300,000"],"e":"当期純利益は繰越利益剰余金の貸方に加算されるので、500,000＋200,000＝700,000です。"},{"c":"決算","t":"勘定の締切","q":"繰越利益剰余金勘定の期首残高は¥300,000であった。当期純損失¥120,000を振り替えた後の繰越利益剰余金勘定の残高はいくらか。配当等は行っていない。","ch":["¥180,000","¥420,000","¥120,000","¥300,000"],"e":"純損失は繰越利益剰余金の借方に記入され残高を減らすので、300,000−120,000＝180,000です。純利益のときと逆に働く点に注意しましょう。"},{"c":"帳簿・理論","t":"補助簿","q":"商品¥100,000を仕入れ、代金は掛けとした。この取引で記入される補助簿の組み合わせとして正しいものはどれか。","ch":["仕入帳・買掛金元帳・商品有高帳","仕入帳・売掛金元帳・商品有高帳","仕入帳・買掛金元帳・現金出納帳","売上帳・買掛金元帳・商品有高帳"],"e":"仕入取引なので仕入帳と商品有高帳、掛け仕入なので買掛金元帳に記入します。現金は動いていないので現金出納帳は不要です。"},{"c":"帳簿・理論","t":"補助簿","q":"商品¥150,000を売り上げ、代金は現金で受け取った。この取引で記入される補助簿の組み合わせとして正しいものはどれか。","ch":["売上帳・商品有高帳・現金出納帳","売上帳・売掛金元帳・現金出納帳","売上帳・商品有高帳・当座預金出納帳","仕入帳・商品有高帳・現金出納帳"],"e":"売上取引なので売上帳と商品有高帳、現金を受け取ったので現金出納帳に記入します。掛けではないので売掛金元帳は不要です。"},{"c":"帳簿・理論","t":"補助簿","q":"商品¥80,000を仕入れ、代金として約束手形を振り出した。この取引で記入される補助簿の組み合わせとして正しいものはどれか。","ch":["仕入帳・商品有高帳・支払手形記入帳","仕入帳・商品有高帳・受取手形記入帳","仕入帳・商品有高帳・買掛金元帳","仕入帳・支払手形記入帳・当座預金出納帳"],"e":"手形を「振り出した」側は支払手形なので支払手形記入帳に記入します。受け取った場合の受取手形記入帳と混同しないようにしましょう。"},{"c":"帳簿・理論","t":"補助簿","q":"得意先に対する売掛金¥120,000を、得意先振出の約束手形で回収した。この取引で記入される補助簿の組み合わせとして正しいものはどれか。","ch":["受取手形記入帳・売掛金元帳","支払手形記入帳・売掛金元帳","受取手形記入帳・買掛金元帳","受取手形記入帳・売上帳"],"e":"手形を受け取ったので受取手形記入帳、売掛金が減ったので売掛金元帳に記入します。商品の動きはないので売上帳や商品有高帳は不要です。"},{"c":"帳簿・理論","t":"補助簿","q":"仕入先に対する買掛金¥90,000を、小切手を振り出して支払った。この取引で記入される補助簿の組み合わせとして正しいものはどれか。","ch":["当座預金出納帳・買掛金元帳","現金出納帳・買掛金元帳","当座預金出納帳・売掛金元帳","当座預金出納帳・支払手形記入帳"],"e":"小切手の振出は当座預金の減少なので当座預金出納帳、買掛金の減少なので買掛金元帳に記入します。小切手は手形ではないので支払手形記入帳には記入しません。"},{"c":"帳簿・理論","t":"補助簿","q":"商品¥200,000を売り上げ、代金のうち¥50,000は現金で受け取り、残額は掛けとした。この取引で記入される補助簿の組み合わせとして正しいものはどれか。","ch":["売上帳・商品有高帳・現金出納帳・売掛金元帳","売上帳・商品有高帳・現金出納帳","売上帳・商品有高帳・売掛金元帳","売上帳・現金出納帳・買掛金元帳"],"e":"売上なので売上帳と商品有高帳、現金の受取があるので現金出納帳、掛けの部分があるので売掛金元帳と、4つの補助簿に記入します。"},{"c":"帳簿・理論","t":"補助簿","q":"事務用の備品¥300,000を購入し、代金は小切手を振り出して支払った。この取引で記入される補助簿の組み合わせとして正しいものはどれか。","ch":["固定資産台帳・当座預金出納帳","仕入帳・当座預金出納帳","固定資産台帳・現金出納帳","商品有高帳・当座預金出納帳"],"e":"備品は商品ではないので仕入帳や商品有高帳ではなく固定資産台帳に記入します。小切手の振出なので当座預金出納帳にも記入します。"},{"c":"帳簿・理論","t":"補助簿","q":"小口現金係から、電車代¥3,000を小口現金で支払った旨の報告を受けた。この取引で記入される補助簿として正しいものはどれか。","ch":["小口現金出納帳","現金出納帳","当座預金出納帳","仕入帳"],"e":"小口現金の支払いは小口現金出納帳に記入します。通常の現金勘定とは別に管理されるため、現金出納帳には記入しません。"},{"c":"帳簿・理論","t":"補助簿","q":"掛けで仕入れた商品のうち¥20,000を品違いのため返品し、買掛金と相殺した。この取引で記入される補助簿の組み合わせとして正しいものはどれか。","ch":["仕入帳・買掛金元帳・商品有高帳","売上帳・売掛金元帳・商品有高帳","仕入帳・買掛金元帳","仕入帳・現金出納帳・商品有高帳"],"e":"仕入戻しは仕入帳に赤字などで記入し、買掛金の減少を買掛金元帳へ、商品が出ていくので商品有高帳にも記入します。"},{"c":"帳簿・理論","t":"補助簿","q":"かねて振り出していた約束手形¥100,000が支払期日となり、当座預金口座から決済された。この取引で記入される補助簿の組み合わせとして正しいものはどれか。","ch":["支払手形記入帳・当座預金出納帳","受取手形記入帳・当座預金出納帳","支払手形記入帳・現金出納帳","支払手形記入帳・買掛金元帳"],"e":"自分が振り出した手形の決済なので支払手形記入帳のてん末欄に記入し、当座預金が減るので当座預金出納帳にも記入します。"},{"c":"帳簿・理論","t":"補助簿","q":"現金¥50,000を当座預金口座に預け入れた。この取引で記入される補助簿の組み合わせとして正しいものはどれか。","ch":["現金出納帳・当座預金出納帳","現金出納帳のみ","当座預金出納帳のみ","現金出納帳・小口現金出納帳"],"e":"現金が減り当座預金が増える取引なので、現金出納帳と当座預金出納帳の両方に記入します。"},{"c":"帳簿・理論","t":"商品有高帳","q":"商品有高帳を先入先出法で記帳している。月初在庫は10個(@¥100)、10日に20個(@¥130)を仕入れ、15日に15個を払い出した。15日の払出額(売上原価)はいくらか。","ch":["¥1,650","¥1,950","¥1,800","¥1,500"],"e":"先入先出法では古いものから払い出すので、10個×100＋5個×130＝1,000＋650＝1,650です。新しい単価から払い出さないよう注意しましょう。"},{"c":"帳簿・理論","t":"商品有高帳","q":"商品有高帳を移動平均法で記帳している。残高は20個(@¥200)で、新たに30個(@¥250)を仕入れた。その後25個を払い出した場合の払出額はいくらか。","ch":["¥5,750","¥5,250","¥6,250","¥5,000"],"e":"平均単価＝(20個×200＋30個×250)÷50個＝11,500÷50＝@230。払出額は25個×230＝5,750です。5,250は先入先出法で計算した場合の金額です。"},{"c":"帳簿・理論","t":"商品有高帳","q":"商品有高帳を先入先出法で記帳している。月初在庫は15個(@¥120)、当月仕入は25個(@¥160)、当月払出は30個であった。月末在庫の金額はいくらか。","ch":["¥1,600","¥1,200","¥1,450","¥4,800"],"e":"先入先出法では古いものから払い出すため、月末に残る10個はすべて後から仕入れた@160のものです。10個×160＝1,600となります。"},{"c":"帳簿・理論","t":"商品有高帳","q":"商品有高帳を移動平均法で記帳している。残高は40個(@¥300)で、新たに60個(@¥350)を仕入れた。仕入直後の平均単価はいくらか。","ch":["¥330","¥325","¥350","¥300"],"e":"平均単価＝(40個×300＋60個×350)÷100個＝(12,000＋21,000)÷100＝@330です。単価どうしを単純平均した325とは異なる点に注意しましょう。"},{"c":"帳簿・理論","t":"商品有高帳","q":"商品有高帳を先入先出法で記帳している。月初在庫は10個(@¥500)、8日に20個(@¥550)を仕入れ、20日に25個を払い出した。20日の払出額(売上原価)はいくらか。","ch":["¥13,250","¥13,750","¥12,500","¥13,000"],"e":"先入先出法では月初の10個×500＝5,000を先に払い出し、残り15個は@550なので15個×550＝8,250。合計5,000＋8,250＝13,250です。"},{"c":"帳簿・理論","t":"商品有高帳","q":"商品有高帳の払出欄に記入する単価・金額について、正しいものはどれか。","ch":["商品の原価(仕入単価)で記入する","商品の売価で記入する","売価と原価の差額で記入する","消費税込みの売価で記入する"],"e":"商品有高帳は商品の在庫を原価で管理する帳簿なので、売り上げたときの払出欄も売価ではなく原価で記入します。"},{"c":"帳簿・理論","t":"商品有高帳","q":"商品有高帳を移動平均法で記帳している。月初在庫は10個(@¥180)、当月に40個(@¥205)を仕入れ、その後30個を払い出した。月末在庫の金額はいくらか。","ch":["¥4,000","¥4,100","¥3,600","¥6,000"],"e":"平均単価＝(10個×180＋40個×205)÷50個＝(1,800＋8,200)÷50＝@200。月末在庫は残り20個×200＝4,000です。"},{"c":"帳簿・理論","t":"商品有高帳","q":"商品有高帳を先入先出法で記帳している。月初在庫は20個(@¥100)、当月仕入は30個(@¥120)であり、当月に40個を1個あたり¥200で販売した。当月の売上総利益はいくらか。","ch":["¥3,600","¥3,200","¥4,000","¥4,400"],"e":"売上高は40個×200＝8,000。売上原価は先入先出法で20個×100＋20個×120＝4,400。売上総利益は8,000−4,400＝3,600です。"},{"c":"帳簿・理論","t":"伝票会計","q":"3伝票制を採用している。商品¥50,000を仕入れ、代金を現金で支払った。この取引を起票する伝票として正しいものはどれか。","ch":["出金伝票","入金伝票","振替伝票","仕入伝票"],"e":"現金が出ていく取引は出金伝票に起票します。3伝票制の伝票は入金伝票・出金伝票・振替伝票の3種類で、仕入伝票はありません。"},{"c":"帳簿・理論","t":"伝票会計","q":"3伝票制を採用している。売掛金¥80,000を現金で回収した。この取引を起票する伝票として正しいものはどれか。","ch":["入金伝票","出金伝票","振替伝票","入金伝票と振替伝票の2枚"],"e":"現金が入ってくる取引は入金伝票に起票します。取引全体が現金の入金なので1枚で足ります。"},{"c":"帳簿・理論","t":"伝票会計","q":"3伝票制を採用している。商品¥100,000を掛けで売り上げた。この取引を起票する伝票として正しいものはどれか。","ch":["振替伝票","入金伝票","出金伝票","売上伝票"],"e":"現金の入出金をともなわない取引は、すべて振替伝票に起票します。"},{"c":"帳簿・理論","t":"伝票会計","q":"商品¥100,000を売り上げ、代金のうち¥30,000は現金で受け取り、残額は掛けとした。取引を分解する方法により、入金伝票に「売上 30,000」と記入した場合、振替伝票に記入される仕訳はどれか。","ch":["(借)売掛金 70,000 ／ (貸)売上 70,000","(借)売掛金 100,000 ／ (貸)売上 100,000","(借)現金 30,000 ／ (貸)売上 30,000","(借)売掛金 70,000 ／ (貸)現金 70,000"],"e":"取引を分解する方法では、現金売上30,000を入金伝票に、残りの掛け売上70,000を振替伝票に記入します。"},{"c":"帳簿・理論","t":"伝票会計","q":"商品¥100,000を売り上げ、代金のうち¥30,000は現金で受け取り、残額は掛けとした。全額をいったん掛け取引とみなす方法により、入金伝票に「売掛金 30,000」と記入した場合、振替伝票に記入される仕訳はどれか。","ch":["(借)売掛金 100,000 ／ (貸)売上 100,000","(借)売掛金 70,000 ／ (貸)売上 70,000","(借)現金 30,000 ／ (貸)売掛金 30,000","(借)売掛金 100,000 ／ (貸)売上 70,000、現金 30,000"],"e":"全額掛けとみなす方法では、振替伝票に全額100,000の掛け売上を記入し、直後に売掛金30,000を現金回収したものとして入金伝票を起票します。"},{"c":"帳簿・理論","t":"伝票会計","q":"商品¥80,000を仕入れ、代金のうち¥20,000は現金で支払い、残額は掛けとした。出金伝票に「買掛金 20,000」と記入した場合、振替伝票に記入される仕訳はどれか。","ch":["(借)仕入 80,000 ／ (貸)買掛金 80,000","(借)仕入 60,000 ／ (貸)買掛金 60,000","(借)仕入 20,000 ／ (貸)現金 20,000","(借)買掛金 20,000 ／ (貸)現金 20,000"],"e":"出金伝票の科目が「買掛金」なので、全額をいったん掛け仕入とみなす方法です。振替伝票には全額80,000の掛け仕入を記入します。科目が「仕入」なら分解する方法です。"},{"c":"帳簿・理論","t":"伝票会計","q":"ある日の伝票を集計したところ、入金伝票の合計は¥250,000、出金伝票の合計は¥180,000であった。仕訳日計表の現金勘定の借方に集計される金額はいくらか。","ch":["¥250,000","¥180,000","¥430,000","¥70,000"],"e":"入金伝票はすべて(借)現金の取引なので、現金の借方合計は入金伝票の合計250,000です。出金伝票の合計180,000は現金の貸方に集計されます。"},{"c":"帳簿・理論","t":"伝票会計","q":"仕訳日計表の説明として正しいものはどれか。","ch":["1日分の伝票を勘定科目ごとに集計し、総勘定元帳へ合計転記するための表","1週間分の取引をまとめて損益計算書を作成するための表","決算整理仕訳を記入するための表","得意先ごとの売掛金残高を管理するための表"],"e":"仕訳日計表は毎日の伝票を科目別に集計する表で、これを使えば伝票1枚ごとではなく1日分まとめて総勘定元帳へ転記できます。"},{"c":"帳簿・理論","t":"伝票会計","q":"3伝票制において、出金伝票に起票される取引はどれか。","ch":["買掛金¥40,000を現金で支払った","商品¥40,000を現金で売り上げた","商品¥40,000を掛けで仕入れた","買掛金¥40,000を小切手を振り出して支払った"],"e":"出金伝票は現金の支払いを記録する伝票です。小切手の振出は当座預金の減少なので、現金の出金ではなく振替伝票に起票します。"},{"c":"帳簿・理論","t":"伝票会計","q":"入金伝票の科目欄に記入するものとして正しいものはどれか。","ch":["相手科目(仕訳の貸方の勘定科目)","現金","仕訳の借方の勘定科目","伝票の作成者名"],"e":"入金伝票では借方が必ず現金と決まっているため、科目欄には相手科目である貸方の勘定科目(売上・売掛金など)を記入します。"},{"c":"帳簿・理論","t":"理論・分類","q":"「前受金」は簿記の5要素のうちどれに分類されるか。","ch":["負債","資産","収益","純資産"],"e":"前受金は商品を引き渡す義務を表すので負債です。お金を受け取っていても、まだ収益にはなりません。"},{"c":"帳簿・理論","t":"理論・分類","q":"「支払家賃」は簿記の5要素のうちどれに分類されるか。","ch":["費用","負債","資産","純資産"],"e":"支払家賃は事務所などを借りるためにかかったコストなので費用です。損益計算書に表示されます。"},{"c":"帳簿・理論","t":"理論・分類","q":"次の勘定科目のうち、資産に分類されるものはどれか。","ch":["未収入金","未払金","前受収益","資本金"],"e":"未収入金は商品以外の売却代金などを後で受け取る権利なので資産です。未払金と前受収益は負債、資本金は純資産です。"},{"c":"帳簿・理論","t":"理論・分類","q":"次の勘定科目のうち、純資産に分類されるものはどれか。","ch":["繰越利益剰余金","借入金","貸倒引当金","受取利息"],"e":"繰越利益剰余金は過去の利益の蓄積で、資本金とともに純資産を構成します。借入金は負債、受取利息は収益です。"},{"c":"帳簿・理論","t":"理論・分類","q":"次のうち、簿記上の取引に該当するものはどれか。","ch":["火災により建物が焼失した","商品¥100,000の注文を受けた","事務所の賃貸借契約を結んだ","新しい従業員を採用した"],"e":"簿記上の取引とは資産・負債・純資産などが増減する出来事です。火災による焼失は建物という資産が減るので取引に該当します。注文や契約だけではお金や財産はまだ動いていません。"},{"c":"帳簿・理論","t":"理論・分類","q":"期中に増資や配当がない場合、損益計算書の当期純利益と一致するものはどれか。","ch":["貸借対照表の期末純資産から期首純資産を差し引いた金額","貸借対照表の資産総額から収益総額を差し引いた金額","期末の現金残高から期首の現金残高を差し引いた金額","貸借対照表の負債総額の増加額"],"e":"利益が出ると純資産が増えるため、資本取引がなければ「期末純資産−期首純資産＝当期純利益」となり、損益計算書の利益と一致します。"},{"c":"帳簿・理論","t":"理論・分類","q":"各勘定の借方合計と貸方合計をそのまま集計して作成する試算表はどれか。","ch":["合計試算表","残高試算表","合計残高試算表","精算表"],"e":"合計試算表は借方・貸方それぞれの合計額を集計します。残高だけを集計するのが残高試算表、両方を示すのが合計残高試算表です。"},{"c":"帳簿・理論","t":"理論・分類","q":"主要簿の組み合わせとして正しいものはどれか。","ch":["仕訳帳と総勘定元帳","仕訳帳と現金出納帳","総勘定元帳と売掛金元帳","仕入帳と売上帳"],"e":"主要簿はすべての取引を記録する仕訳帳と総勘定元帳の2つです。現金出納帳や仕入帳などは必要に応じて作成する補助簿です。"},{"c":"仕訳","t":"頻出総合","q":"商品¥100,000をクレジット払いの条件で販売した。信販会社への手数料(販売代金の4%)は販売時に計上する。正しい仕訳はどれか。","ch":["(借)クレジット売掛金 96,000、支払手数料 4,000 ／ (貸)売上 100,000","(借)クレジット売掛金 100,000 ／ (貸)売上 100,000","(借)売掛金 96,000、支払手数料 4,000 ／ (貸)売上 100,000","(借)クレジット売掛金 100,000 ／ (貸)売上 96,000、支払手数料 4,000"],"e":"手数料100,000×4%＝4,000を支払手数料(費用)とし、差額96,000をクレジット売掛金とします。通常の売掛金勘定とは区別します。"},{"c":"仕訳","t":"頻出総合","q":"得意先に対する売掛金¥200,000について、電子記録債権の発生記録が行われた。正しい仕訳はどれか。","ch":["(借)電子記録債権 200,000 ／ (貸)売掛金 200,000","(借)売掛金 200,000 ／ (貸)電子記録債権 200,000","(借)電子記録債務 200,000 ／ (貸)売掛金 200,000","(借)受取手形 200,000 ／ (貸)売掛金 200,000"],"e":"売掛金が電子記録債権という別の債権に置き換わるので、売掛金を減らして電子記録債権(資産)を計上します。"},{"c":"仕訳","t":"頻出総合","q":"かねて発生記録を行っていた電子記録債務¥150,000の支払期日が到来し、当座預金口座から決済された。正しい仕訳はどれか。","ch":["(借)電子記録債務 150,000 ／ (貸)当座預金 150,000","(借)当座預金 150,000 ／ (貸)電子記録債務 150,000","(借)電子記録債権 150,000 ／ (貸)当座預金 150,000","(借)買掛金 150,000 ／ (貸)当座預金 150,000"],"e":"決済により電子記録債務(負債)が消滅するので借方に記入し、当座預金の減少を貸方に記入します。"},{"c":"仕訳","t":"頻出総合","q":"店舗を賃借するにあたり、敷金¥200,000と1か月分の家賃¥100,000を普通預金口座から支払った。正しい仕訳はどれか。","ch":["(借)差入保証金 200,000、支払家賃 100,000 ／ (貸)普通預金 300,000","(借)支払家賃 300,000 ／ (貸)普通預金 300,000","(借)差入保証金 300,000 ／ (貸)普通預金 300,000","(借)支払手数料 200,000、支払家賃 100,000 ／ (貸)普通預金 300,000"],"e":"敷金は退去時に返還される権利なので差入保証金(資産)、家賃は支払家賃(費用)で処理します。全額を費用にしないよう注意しましょう。"},{"c":"仕訳","t":"頻出総合","q":"社会保険料¥60,000(従業員負担分¥30,000は給料支払時に預り金で処理済み、残額¥30,000は会社負担分)を現金で納付した。正しい仕訳はどれか。","ch":["(借)法定福利費 30,000、社会保険料預り金 30,000 ／ (貸)現金 60,000","(借)法定福利費 60,000 ／ (貸)現金 60,000","(借)社会保険料預り金 60,000 ／ (貸)現金 60,000","(借)給料 30,000、社会保険料預り金 30,000 ／ (貸)現金 60,000"],"e":"会社負担分は法定福利費(費用)、従業員から預かった分は社会保険料預り金(負債)の取り崩しとして処理します。"},{"c":"仕訳","t":"頻出総合","q":"従業員への給料¥300,000の支払いにあたり、所得税の源泉徴収分¥15,000と社会保険料¥25,000を差し引き、残額を普通預金口座から振り込んだ。正しい仕訳はどれか。","ch":["(借)給料 300,000 ／ (貸)所得税預り金 15,000、社会保険料預り金 25,000、普通預金 260,000","(借)給料 260,000 ／ (貸)普通預金 260,000","(借)給料 300,000 ／ (貸)普通預金 300,000","(借)給料 260,000、所得税預り金 15,000、社会保険料預り金 25,000 ／ (貸)普通預金 300,000"],"e":"給料は総額300,000で費用計上し、差し引いた分は預り金(負債)、実際の振込額は300,000−15,000−25,000＝260,000です。"},{"c":"仕訳","t":"頻出総合","q":"収入印紙¥10,000を購入し、代金は現金で支払った。購入時に費用処理する方法によっている場合、正しい仕訳はどれか。","ch":["(借)租税公課 10,000 ／ (貸)現金 10,000","(借)通信費 10,000 ／ (貸)現金 10,000","(借)貯蔵品 10,000 ／ (貸)現金 10,000","(借)法人税等 10,000 ／ (貸)現金 10,000"],"e":"収入印紙は税金の一種なので租税公課(費用)で処理します。郵便切手の通信費と混同しないようにしましょう。決算時に未使用分があれば貯蔵品へ振り替えます。"},{"c":"仕訳","t":"頻出総合","q":"当座預金残高が¥30,000のとき、買掛金¥50,000を小切手を振り出して支払った。銀行とは借越限度額¥200,000の当座借越契約を結んでおり、期中は当座預金勘定のみで処理している。正しい仕訳はどれか。","ch":["(借)買掛金 50,000 ／ (貸)当座預金 50,000","(借)買掛金 50,000 ／ (貸)当座預金 30,000、当座借越 20,000","(借)買掛金 30,000 ／ (貸)当座預金 30,000","(借)買掛金 50,000 ／ (貸)現金 50,000"],"e":"期中は残高を超えても全額を当座預金勘定の貸方で処理します。決算時に貸方残高となっていれば、借入金などへ振り替えます。"}];

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

  try { return JSON.parse(localStorage.getItem(WRONG_KEY)) || []; } catch (e) { return []; }
}
function saveWrong(list) {
  try { localStorage.setItem(WRONG_KEY, JSON.stringify(list)); } catch (e) {}
}
function markWrong(idx, isWrong) {
  let list = loadWrong();
  if (isWrong) { if (!list.includes(idx)) list.push(idx); }
  else { list = list.filter(x => x !== idx); }
  saveWrong(list);
}

function catCount(cat) {
  return cat === "すべて" ? QUESTIONS.length : QUESTIONS.filter(q => q.c === cat).length;
}

function renderStart() {
  document.getElementById("subtitle").textContent = "過去問形式トレーニング・全" + QUESTIONS.length + "問収録";
  const catBox = document.getElementById("cat-chips");
  catBox.innerHTML = "";
  CATS.forEach(c => {
    const b = document.createElement("button");
    b.className = "chip" + (c === selCat ? " sel" : "");
    b.textContent = c + " (" + catCount(c) + ")";
    b.onclick = () => { selCat = c; renderStart(); };
    catBox.appendChild(b);
  });
  const numBox = document.getElementById("num-chips");
  numBox.innerHTML = "";
  NUMS.forEach(n => {
    const b = document.createElement("button");
    b.className = "chip" + (n === selNum ? " sel" : "");
    b.textContent = n + "問";
    b.onclick = () => { selNum = n; renderStart(); };
    numBox.appendChild(b);
  });
  const wrong = loadWrong();
  const rb = document.getElementById("btn-review");
  rb.textContent = "🔥 苦手問題だけ復習する(" + wrong.length + "問)";
  rb.disabled = wrong.length === 0;
}

function buildQuizItem(q, idx) {
  const order = shuffle([0, 1, 2, 3]);
  return {
    idx: idx, c: q.c, t: q.t, q: q.q, e: q.e,
    ch: order.map(i => q.ch[i]),
    a: order.indexOf(0)
  };
}

function startQuiz() {
  const pool = [];
  QUESTIONS.forEach((q, i) => {
    if (selCat === "すべて" || q.c === selCat) pool.push(buildQuizItem(q, i));
  });
  quiz = shuffle(pool).slice(0, Math.min(selNum, pool.length));
  beginQuiz();
}

function startReview() {
  const wrong = loadWrong();
  const pool = wrong.filter(i => QUESTIONS[i]).map(i => buildQuizItem(QUESTIONS[i], i));
  if (pool.length === 0) return;
  quiz = shuffle(pool);
  beginQuiz();
}

function beginQuiz() {
  current = 0; score = 0; wrongList = [];
  document.getElementById("screen-start").classList.add("hidden");
  document.getElementById("screen-quiz").classList.remove("hidden");
  showQuestion();
}

function showQuestion() {
  const q = quiz[current];
  document.getElementById("q-count").textContent = "第" + (current + 1) + "問 / 全" + quiz.length + "問";
  document.getElementById("q-score").textContent = "正解 " + score;
  document.getElementById("progress").style.width = (current / quiz.length * 100) + "%";
  document.getElementById("q-tag").textContent = q.c;
  document.getElementById("q-tag2").textContent = q.t || "";
  document.getElementById("q-text").textContent = q.q;

  const box = document.getElementById("q-choices");
  box.innerHTML = "";
  q.ch.forEach((text, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = "アイウエ"[i] + ". " + text;
    btn.onclick = () => answer(i, btn);
    box.appendChild(btn);
  });

  document.getElementById("feedback").className = "feedback";
  document.getElementById("btn-next").classList.add("hidden");
}

function answer(i, btn) {
  const q = quiz[current];
  const buttons = document.querySelectorAll(".choice");
  buttons.forEach((b, idx) => {
    b.disabled = true;
    if (idx === q.a) b.classList.add("correct");
    else if (b === btn) b.classList.add("wrong");
    else b.classList.add("faded");
  });

  const ok = (i === q.a);
  if (ok) { score++; } else { wrongList.push(q); }
  markWrong(q.idx, !ok);

  const fb = document.getElementById("feedback");
  document.getElementById("fb-mark").textContent = ok ? "⭕ 正解!" : "❌ 不正解…";
  document.getElementById("fb-text").textContent = q.e;
  fb.classList.add("show", ok ? "ok" : "ng");

  document.getElementById("q-score").textContent = "正解 " + score;
  const nextBtn = document.getElementById("btn-next");
  nextBtn.textContent = (current + 1 < quiz.length) ? "次の問題へ ▶" : "結果を見る 🏁";
  nextBtn.classList.remove("hidden");
  nextBtn.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

function nextQuestion() {
  current++;
  if (current < quiz.length) {
    showQuestion();
    window.scrollTo(0, 0);
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById("screen-quiz").classList.add("hidden");
  document.getElementById("screen-result").classList.remove("hidden");
  document.getElementById("r-score").textContent = score;
  document.getElementById("r-total").textContent = quiz.length;

  const rate = score / quiz.length;
  let msg;
  if (rate === 1)        msg = "🎉 全問正解!すばらしい!";
  else if (rate >= 0.7)  msg = "💮 合格ライン(70%)クリア!この調子!";
  else if (rate >= 0.5)  msg = "📖 あと少し!間違えた問題を復習しよう";
  else                   msg = "🌱 これから伸びる!繰り返しが大切です";
  document.getElementById("r-msg").textContent = msg;

  const list = document.getElementById("review-list");
  if (wrongList.length === 0) {
    document.getElementById("review-card").classList.add("hidden");
  } else {
    wrongList.forEach((q, i) => {
      const div = document.createElement("div");
      div.className = "review-item";
      div.innerHTML =
        '<div class="rq">' + (i + 1) + ". " + escapeHtml(q.q) + '</div>' +
        '<div class="ra">正解:' + escapeHtml(q.ch[q.a]) + '</div>' +
        '<div>' + escapeHtml(q.e) + '</div>';
      list.appendChild(div);
    });
  }
  window.scrollTo(0, 0);
}

function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

renderStart();
</script>
</body>
</html>
