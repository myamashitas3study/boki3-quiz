","ch":["¥240,000","¥360,000","¥480,000","¥600,000"],"e":"期末の減価償却累計額は240,000＋120,000＝360,000。帳簿価額は600,000−360,000＝240,000です。当期分の償却費を忘れないようにしましょう。"},{"c":"決算","t":"精算表・財務諸表","q":"当期の収益合計は¥3,500,000、費用合計は¥3,200,000であった。損益計算書に表示される当期純利益はいくらか。","ch":["¥300,000","¥3,500,000","¥6,700,000","¥320,000"],"e":"当期純利益＝収益合計−費用合計＝3,500,000−3,200,000＝300,000です。"},{"c":"決算","t":"精算表・財務諸表","q":"決算整理後の売掛金残高は¥400,000、貸倒引当金残高は¥8,000である。貸借対照表において売掛金から貸倒引当金を控除した金額はいくらか。","ch":["¥392,000","¥408,000","¥400,000","¥8,000"],"e":"貸借対照表では売掛金400,000から貸倒引当金8,000を差し引いた392,000が回収可能見込額として示されます。"},{"c":"決算","t":"精算表・財務諸表","q":"精算表において、残高試算表欄の保険料は¥36,000(借方)、修正記入欄に前払分¥12,000が貸方に記入されている。損益計算書欄に記入される保険料の金額はいくらか。","ch":["¥24,000","¥36,000","¥48,000","¥12,000"],"e":"費用の勘定は残高から貸方の修正額を差し引きます。36,000−12,000＝24,000が当期の費用として損益計算書欄に移ります。加算しないよう注意しましょう。"},{"c":"決算","t":"精算表・財務諸表","q":"精算表において、残高試算表欄の受取家賃は¥180,000(貸方)、修正記入欄に前受分¥30,000が借方に記入されている。損益計算書欄に記入される受取家賃の金額はいくらか。","ch":["¥150,000","¥180,000","¥210,000","¥30,000"],"e":"収益の勘定は貸方残高から借方の修正額を差し引きます。180,000−30,000＝150,000が当期の収益です。"},{"c":"決算","t":"精算表・財務諸表","q":"精算表において、残高試算表欄の支払利息は¥9,000(借方)、修正記入欄に未払分¥3,000が借方に記入されている。損益計算書欄に記入される支払利息の金額はいくらか。","ch":["¥12,000","¥6,000","¥9,000","¥3,000"],"e":"未払費用の計上は費用の追加なので、同じ借方どうしを合計します。9,000＋3,000＝12,000です。差し引いてしまう間違いに注意しましょう。"},{"c":"決算","t":"精算表・財務諸表","q":"期首の純資産は¥2,000,000、期末の純資産は¥2,350,000であった。期中に増資や配当はない。当期純利益はいくらか。","ch":["¥350,000","¥2,350,000","¥4,350,000","¥1,650,000"],"e":"資本取引がなければ、純資産の増加額がそのまま当期純利益です。2,350,000−2,000,000＝350,000となります。"},{"c":"決算","t":"精算表・財務諸表","q":"期末の貸借対照表において、資産総額は¥5,000,000、負債総額は¥3,200,000であった。純資産の金額はいくらか。","ch":["¥1,800,000","¥8,200,000","¥3,200,000","¥2,800,000"],"e":"資産＝負債＋純資産の関係から、純資産＝5,000,000−3,200,000＝1,800,000です。"},{"c":"決算","t":"精算表・財務諸表","q":"精算表で当期純利益が生じた場合、その金額が記入される欄の組み合わせとして正しいものはどれか。","ch":["損益計算書欄の借方と貸借対照表欄の貸方","損益計算書欄の貸方と貸借対照表欄の借方","損益計算書欄の借方と貸借対照表欄の借方","修正記入欄の借方と貸方"],"e":"当期純利益は損益計算書欄では収益と費用の差額を埋める借方に、貸借対照表欄では純資産の増加として貸方に記入されます。"},{"c":"決算","t":"精算表・財務諸表","q":"期首商品棚卸高は¥50,000、当期商品仕入高は¥600,000、期末商品棚卸高は¥70,000である。決算整理後の繰越商品勘定の残高はいくらか。","ch":["¥70,000","¥50,000","¥580,000","¥620,000"],"e":"決算整理(しーくり・くりしー)を行うと、繰越商品勘定の残高は期末商品棚卸高の70,000になります。580,000は売上原価の金額です。"},{"c":"決算","t":"精算表・財務諸表","q":"当期の売上高は¥1,500,000、売上原価は¥900,000であった。損益計算書に表示される売上総利益はいくらか。","ch":["¥600,000","¥900,000","¥2,400,000","¥1,500,000"],"e":"売上総利益＝売上高−売上原価＝1,500,000−900,000＝600,000です。"},{"c":"決算","t":"精算表・財務諸表","q":"決算整理で計上した前払保険料は、財務諸表のどこに表示されるか。","ch":["貸借対照表の資産の部","貸借対照表の負債の部","損益計算書の費用","貸借対照表の純資産の部"],"e":"前払保険料(前払費用)は翌期の費用を先に支払ったもので、サービスを受ける権利を表す資産として貸借対照表に表示されます。"},{"c":"決算","t":"勘定の締切","q":"決算にあたり、売上勘定の残高¥2,000,000を損益勘定へ振り替える仕訳として正しいものはどれか。","ch":["(借)売上 2,000,000 ／ (貸)損益 2,000,000","(借)損益 2,000,000 ／ (貸)売上 2,000,000","(借)売上 2,000,000 ／ (貸)繰越利益剰余金 2,000,000","(借)売上 2,000,000 ／ (貸)資本金 2,000,000"],"e":"収益の勘定は貸方残高なので、締め切るときは借方に記入して損益勘定の貸方へ振り替えます。"},{"c":"決算","t":"勘定の締切","q":"決算にあたり、仕入勘定の残高(売上原価)¥1,400,000を損益勘定へ振り替える仕訳として正しいものはどれか。","ch":["(借)損益 1,400,000 ／ (貸)仕入 1,400,000","(借)仕入 1,400,000 ／ (貸)損益 1,400,000","(借)損益 1,400,000 ／ (貸)繰越商品 1,400,000","(借)繰越利益剰余金 1,400,000 ／ (貸)仕入 1,400,000"],"e":"費用の勘定は借方残高なので、貸方に記入して損益勘定の借方へ振り替えます。収益の振替と貸借が逆になる点に注意しましょう。"},{"c":"決算","t":"勘定の締切","q":"決算にあたり、給料勘定の残高¥300,000を損益勘定へ振り替える仕訳として正しいものはどれか。","ch":["(借)損益 300,000 ／ (貸)給料 300,000","(借)給料 300,000 ／ (貸)損益 300,000","(借)給料 300,000 ／ (貸)未払給料 300,000","(借)繰越利益剰余金 300,000 ／ (貸)給料 300,000"],"e":"給料は費用の勘定なので、損益勘定の借方へ振り替えます。仕訳では損益が借方、給料が貸方になります。"},{"c":"決算","t":"勘定の締切","q":"決算にあたり、受取利息勘定の残高¥5,000を損益勘定へ振り替える仕訳として正しいものはどれか。","ch":["(借)受取利息 5,000 ／ (貸)損益 5,000","(借)損益 5,000 ／ (貸)受取利息 5,000","(借)受取利息 5,000 ／ (貸)未収利息 5,000","(借)受取利息 5,000 ／ (貸)繰越利益剰余金 5,000"],"e":"受取利息は収益の勘定なので、借方に記入して残高をゼロにし、損益勘定の貸方へ振り替えます。"},{"c":"決算","t":"勘定の締切","q":"損益勘定の貸方合計(収益)は¥2,500,000、借方合計(費用)は¥2,100,000であった。当期純利益を振り替える仕訳として正しいものはどれか。","ch":["(借)損益 400,000 ／ (貸)繰越利益剰余金 400,000","(借)繰越利益剰余金 400,000 ／ (貸)損益 400,000","(借)損益 400,000 ／ (貸)資本金 400,000","(借)損益 2,500,000 ／ (貸)繰越利益剰余金 2,500,000"],"e":"当期純利益は2,500,000−2,100,000＝400,000。株式会社では損益勘定から繰越利益剰余金勘定(純資産)へ振り替えます。資本金勘定ではありません。"},{"c":"決算","t":"勘定の締切","q":"決算の結果、当期純損失¥100,000が生じた。損益勘定から振り替える仕訳として正しいものはどれか。","ch":["(借)繰越利益剰余金 100,000 ／ (貸)損益 100,000","(借)損益 100,000 ／ (貸)繰越利益剰余金 100,000","(借)資本金 100,000 ／ (貸)損益 100,000","(借)雑損 100,000 ／ (貸)損益 100,000"],"e":"純損失のときは純利益と貸借が逆になり、繰越利益剰余金を減らす借方記入になります。"},{"c":"決算","t":"勘定の締切","q":"損益勘定に集計された収益の合計は¥1,800,000、費用の合計は¥1,650,000であった。繰越利益剰余金勘定へ振り替えられる金額はいくらか。","ch":["¥150,000","¥1,800,000","¥1,650,000","¥3,450,000"],"e":"振り替えられるのは収益と費用の差額である当期純利益で、1,800,000−1,650,000＝150,000です。"},{"c":"決算","t":"勘定の締切","q":"決算において、損益勘定へ残高を振り替える勘定の組み合わせとして正しいものはどれか。","ch":["収益と費用の勘定","資産と負債の勘定","資産と純資産の勘定","すべての勘定"],"e":"損益勘定へ振り替えるのは収益・費用の勘定だけです。資産・負債・純資産の勘定は振り替えず、次期繰越として締め切ります。"},{"c":"決算","t":"勘定の締切","q":"決算日における現金勘定の借方残高は¥250,000であった。英米式決算法により現金勘定を締め切るとき、貸方に記入する語句と金額の組み合わせとして正しいものはどれか。","ch":["次期繰越 250,000","前期繰越 250,000","損益 250,000","繰越利益剰余金 250,000"],"e":"資産の勘定は損益勘定へ振り替えず、残高のある側と反対の貸方に「次期繰越」と記入して締め切ります。「前期繰越」は翌期首の記入です。"},{"c":"決算","t":"勘定の締切","q":"次の勘定のうち、決算で損益勘定へ振り替えずに「次期繰越」と記入して締め切るものはどれか。","ch":["建物","支払家賃","売上","雑益"],"e":"建物は資産の勘定なので次期繰越で締め切ります。支払家賃は費用、売上と雑益は収益なので損益勘定へ振り替えます。"},{"c":"決算","t":"勘定の締切","q":"繰越利益剰余金勘定の期首残高は¥500,000であった。当期純利益¥200,000を振り替えた後の繰越利益剰余金勘定の残高はいくらか。配当等は行っていない。","ch":["¥700,000","¥500,000","¥200,000","¥300,000"],"e":"当期純利益は繰越利益剰余金の貸方に加算されるので、500,000＋200,000＝700,000です。"},{"c":"決算","t":"勘定の締切","q":"繰越利益剰余金勘定の期首残高は¥300,000であった。当期純損失¥120,000を振り替えた後の繰越利益剰余金勘定の残高はいくらか。配当等は行っていない。","ch":["¥180,000","¥420,000","¥120,000","¥300,000"],"e":"純損失は繰越利益剰余金の借方に記入され残高を減らすので、300,000−120,000＝180,000です。純利益のときと逆に働く点に注意しましょう。"},{"c":"帳簿・理論","t":"補助簿","q":"商品¥100,000を仕入れ、代金は掛けとした。この取引で記入される補助簿の組み合わせとして正しいものはどれか。","ch":["仕入帳・買掛金元帳・商品有高帳","仕入帳・売掛金元帳・商品有高帳","仕入帳・買掛金元帳・現金出納帳","売上帳・買掛金元帳・商品有高帳"],"e":"仕入取引なので仕入帳と商品有高帳、掛け仕入なので買掛金元帳に記入します。現金は動いていないので現金出納帳は不要です。"},{"c":"帳簿・理論","t":"補助簿","q":"商品¥150,000を売り上げ、代金は現金で受け取った。この取引で記入される補助簿の組み合わせとして正しいものはどれか。","ch":["売上帳・商品有高帳・現金出納帳","売上帳・売掛金元帳・現金出納帳","売上帳・商品有高帳・当座預金出納帳","仕入帳・商品有高帳・現金出納帳"],"e":"売上取引なので売上帳と商品有高帳、現金を受け取ったので現金出納帳に記入します。掛けではないので売掛金元帳は不要です。"},{"c":"帳簿・理論","t":"補助簿","q":"商品¥80,000を仕入れ、代金として約束手形を振り出した。この取引で記入される補助簿の組み合わせとして正しいものはどれか。","ch":["仕入帳・商品有高帳・支払手形記入帳","仕入帳・商品有高帳・受取手形記入帳","仕入帳・商品有高帳・買掛金元帳","仕入帳・支払手形記入帳・当座預金出納帳"],"e":"手形を「振り出した」側は支払手形なので支払手形記入帳に記入します。受け取った場合の受取手形記入帳と混同しないようにしましょう。"},{"c":"帳簿・理論","t":"補助簿","q":"得意先に対する売掛金¥120,000を、得意先振出の約束手形で回収した。この取引で記入される補助簿の組み合わせとして正しいものはどれか。","ch":["受取手形記入帳・売掛金元帳","支払手形記入帳・売掛金元帳","受取手形記入帳・買掛金元帳","受取手形記入帳・売上帳"],"e":"手形を受け取ったので受取手形記入帳、売掛金が減ったので売掛金元帳に記入します。商品の動きはないので売上帳や商品有高帳は不要です。"},{"c":"帳簿・理論","t":"補助簿","q":"仕入先に対する買掛金¥90,000を、小切手を振り出して支払った。この取引で記入される補助簿の組み合わせとして正しいものはどれか。","ch":["当座預金出納帳・買掛金元帳","現金出納帳・買掛金元帳","当座預金出納帳・売掛金元帳","当座預金出納帳・支払手形記入帳"],"e":"小切手の振出は当座預金の減少なので当座預金出納帳、買掛金の減少なので買掛金元帳に記入します。小切手は手形ではないので支払手形記入帳には記入しません。"},{"c":"帳簿・理論","t":"補助簿","q":"商品¥200,000を売り上げ、代金のうち¥50,000は現金で受け取り、残額は掛けとした。この取引で記入される補助簿の組み合わせとして正しいものはどれか。","ch":["売上帳・商品有高帳・現金出納帳・売掛金元帳","売上帳・商品有高帳・現金出納帳","売上帳・商品有高帳・売掛金元帳","売上帳・現金出納帳・買掛金元帳"],"e":"売上なので売上帳と商品有高帳、現金の受取があるので現金出納帳、掛けの部分があるので売掛金元帳と、4つの補助簿に記入します。"},{"c":"帳簿・理論","t":"補助簿","q":"事務用の備品¥300,000を購入し、代金は小切手を振り出して支払った。この取引で記入される補助簿の組み合わせとして正しいものはどれか。","ch":["固定資産台帳・当座預金出納帳","仕入帳・当座預金出納帳","固定資産台帳・現金出納帳","商品有高帳・当座預金出納帳"],"e":"備品は商品ではないので仕入帳や商品有高帳ではなく固定資産台帳に記入します。小切手の振出なので当座預金出納帳にも記入します。"},{"c":"帳簿・理論","t":"補助簿","q":"小口現金係から、電車代¥3,000を小口現金で支払った旨の報告を受けた。この取引で記入される補助簿として正しいものはどれか。","ch":["小口現金出納帳","現金出納帳","当座預金出納帳","仕入帳"],"e":"小口現金の支払いは小口現金出納帳に記入します。通常の現金勘定とは別に管理されるため、現金出納帳には記入しません。"},{"c":"帳簿・理論","t":"補助簿","q":"掛けで仕入れた商品のうち¥20,000を品違いのため返品し、買掛金と相殺した。この取引で記入される補助簿の組み合わせとして正しいものはどれか。","ch":["仕入帳・買掛金元帳・商品有高帳","売上帳・売掛金元帳・商品有高帳","仕入帳・買掛金元帳","仕入帳・現金出納帳・商品有高帳"],"e":"仕入戻しは仕入帳に赤字などで記入し、買掛金の減少を買掛金元帳へ、商品が出ていくので商品有高帳にも記入します。"},{"c":"帳簿・理論","t":"補助簿","q":"かねて振り出していた約束手形¥100,000が支払期日となり、当座預金口座から決済された。この取引で記入される補助簿の組み合わせとして正しいものはどれか。","ch":["支払手形記入帳・当座預金出納帳","受取手形記入帳・当座預金出納帳","支払手形記入帳・現金出納帳","支払手形記入帳・買掛金元帳"],"e":"自分が振り出した手形の決済なので支払手形記入帳のてん末欄に記入し、当座預金が減るので当座預金出納帳にも記入します。"},{"c":"帳簿・理論","t":"補助簿","q":"現金¥50,000を当座預金口座に預け入れた。この取引で記入される補助簿の組み合わせとして正しいものはどれか。","ch":["現金出納帳・当座預金出納帳","現金出納帳のみ","当座預金出納帳のみ","現金出納帳・小口現金出納帳"],"e":"現金が減り当座預金が増える取引なので、現金出納帳と当座預金出納帳の両方に記入します。"},{"c":"帳簿・理論","t":"商品有高帳","q":"商品有高帳を先入先出法で記帳している。月初在庫は10個(@¥100)、10日に20個(@¥130)を仕入れ、15日に15個を払い出した。15日の払出額(売上原価)はいくらか。","ch":["¥1,650","¥1,950","¥1,800","¥1,500"],"e":"先入先出法では古いものから払い出すので、10個×100＋5個×130＝1,000＋650＝1,650です。新しい単価から払い出さないよう注意しましょう。"},{"c":"帳簿・理論","t":"商品有高帳","q":"商品有高帳を移動平均法で記帳している。残高は20個(@¥200)で、新たに30個(@¥250)を仕入れた。その後25個を払い出した場合の払出額はいくらか。","ch":["¥5,750","¥5,250","¥6,250","¥5,000"],"e":"平均単価＝(20個×200＋30個×250)÷50個＝11,500÷50＝@230。払出額は25個×230＝5,750です。5,250は先入先出法で計算した場合の金額です。"},{"c":"帳簿・理論","t":"商品有高帳","q":"商品有高帳を先入先出法で記帳している。月初在庫は15個(@¥120)、当月仕入は25個(@¥160)、当月払出は30個であった。月末在庫の金額はいくらか。","ch":["¥1,600","¥1,200","¥1,450","¥4,800"],"e":"先入先出法では古いものから払い出すため、月末に残る10個はすべて後から仕入れた@160のものです。10個×160＝1,600となります。"},{"c":"帳簿・理論","t":"商品有高帳","q":"商品有高帳を移動平均法で記帳している。残高は40個(@¥300)で、新たに60個(@¥350)を仕入れた。仕入直後の平均単価はいくらか。","ch":["¥330","¥325","¥350","¥300"],"e":"平均単価＝(40個×300＋60個×350)÷100個＝(12,000＋21,000)÷100＝@330です。単価どうしを単純平均した325とは異なる点に注意しましょう。"},{"c":"帳簿・理論","t":"商品有高帳","q":"商品有高帳を先入先出法で記帳している。月初在庫は10個(@¥500)、8日に20個(@¥550)を仕入れ、20日に25個を払い出した。20日の払出額(売上原価)はいくらか。","ch":["¥13,250","¥13,750","¥12,500","¥13,000"],"e":"先入先出法では月初の10個×500＝5,000を先に払い出し、残り15個は@550なので15個×550＝8,250。合計5,000＋8,250＝13,250です。"},{"c":"帳簿・理論","t":"商品有高帳","q":"商品有高帳の払出欄に記入する単価・金額について、正しいものはどれか。","ch":["商品の原価(仕入単価)で記入する","商品の売価で記入する","売価と原価の差額で記入する","消費税込みの売価で記入する"],"e":"商品有高帳は商品の在庫を原価で管理する帳簿なので、売り上げたときの払出欄も売価ではなく原価で記入します。"},{"c":"帳簿・理論","t":"商品有高帳","q":"商品有高帳を移動平均法で記帳している。月初在庫は10個(@¥180)、当月に40個(@¥205)を仕入れ、その後30個を払い出した。月末在庫の金額はいくらか。","ch":["¥4,000","¥4,100","¥3,600","¥6,000"],"e":"平均単価＝(10個×180＋40個×205)÷50個＝(1,800＋8,200)÷50＝@200。月末在庫は残り20個×200＝4,000です。"},{"c":"帳簿・理論","t":"商品有高帳","q":"商品有高帳を先入先出法で記帳している。月初在庫は20個(@¥100)、当月仕入は30個(@¥120)であり、当月に40個を1個あたり¥200で販売した。当月の売上総利益はいくらか。","ch":["¥3,600","¥3,200","¥4,000","¥4,400"],"e":"売上高は40個×200＝8,000。売上原価は先入先出法で20個×100＋20個×120＝4,400。売上総利益は8,000−4,400＝3,600です。"},{"c":"帳簿・理論","t":"伝票会計","q":"3伝票制を採用している。商品¥50,000を仕入れ、代金を現金で支払った。この取引を起票する伝票として正しいものはどれか。","ch":["出金伝票","入金伝票","振替伝票","仕入伝票"],"e":"現金が出ていく取引は出金伝票に起票します。3伝票制の伝票は入金伝票・出金伝票・振替伝票の3種類で、仕入伝票はありません。"},{"c":"帳簿・理論","t":"伝票会計","q":"3伝票制を採用している。売掛金¥80,000を現金で回収した。この取引を起票する伝票として正しいものはどれか。","ch":["入金伝票","出金伝票","振替伝票","入金伝票と振替伝票の2枚"],"e":"現金が入ってくる取引は入金伝票に起票します。取引全体が現金の入金なので1枚で足ります。"},{"c":"帳簿・理論","t":"伝票会計","q":"3伝票制を採用している。商品¥100,000を掛けで売り上げた。この取引を起票する伝票として正しいものはどれか。","ch":["振替伝票","入金伝票","出金伝票","売上伝票"],"e":"現金の入出金をともなわない取引は、すべて振替伝票に起票します。"},{"c":"帳簿・理論","t":"伝票会計","q":"商品¥100,000を売り上げ、代金のうち¥30,000は現金で受け取り、残額は掛けとした。取引を分解する方法により、入金伝票に「売上 30,000」と記入した場合、振替伝票に記入される仕訳はどれか。","ch":["(借)売掛金 70,000 ／ (貸)売上 70,000","(借)売掛金 100,000 ／ (貸)売上 100,000","(借)現金 30,000 ／ (貸)売上 30,000","(借)売掛金 70,000 ／ (貸)現金 70,000"],"e":"取引を分解する方法では、現金売上30,000を入金伝票に、残りの掛け売上70,000を振替伝票に記入します。"},{"c":"帳簿・理論","t":"伝票会計","q":"商品¥100,000を売り上げ、代金のうち¥30,000は現金で受け取り、残額は掛けとした。全額をいったん掛け取引とみなす方法により、入金伝票に「売掛金 30,000」と記入した場合、振替伝票に記入される仕訳はどれか。","ch":["(借)売掛金 100,000 ／ (貸)売上 100,000","(借)売掛金 70,000 ／ (貸)売上 70,000","(借)現金 30,000 ／ (貸)売掛金 30,000","(借)売掛金 100,000 ／ (貸)売上 70,000、現金 30,000"],"e":"全額掛けとみなす方法では、振替伝票に全額100,000の掛け売上を記入し、直後に売掛金30,000を現金回収したものとして入金伝票を起票します。"},{"c":"帳簿・理論","t":"伝票会計","q":"商品¥80,000を仕入れ、代金のうち¥20,000は現金で支払い、残額は掛けとした。出金伝票に「買掛金 20,000」と記入した場合、振替伝票に記入される仕訳はどれか。","ch":["(借)仕入 80,000 ／ (貸)買掛金 80,000","(借)仕入 60,000 ／ (貸)買掛金 60,000","(借)仕入 20,000 ／ (貸)現金 20,000","(借)買掛金 20,000 ／ (貸)現金 20,000"],"e":"出金伝票の科目が「買掛金」なので、全額をいったん掛け仕入とみなす方法です。振替伝票には全額80,000の掛け仕入を記入します。科目が「仕入」なら分解する方法です。"},{"c":"帳簿・理論","t":"伝票会計","q":"ある日の伝票を集計したところ、入金伝票の合計は¥250,000、出金伝票の合計は¥180,000であった。仕訳日計表の現金勘定の借方に集計される金額はいくらか。","ch":["¥250,000","¥180,000","¥430,000","¥70,000"],"e":"入金伝票はすべて(借)現金の取引なので、現金の借方合計は入金伝票の合計250,000です。出金伝票の合計180,000は現金の貸方に集計されます。"},{"c":"帳簿・理論","t":"伝票会計","q":"仕訳日計表の説明として正しいものはどれか。","ch":["1日分の伝票を勘定科目ごとに集計し、総勘定元帳へ合計転記するための表","1週間分の取引をまとめて損益計算書を作成するための表","決算整理仕訳を記入するための表","得意先ごとの売掛金残高を管理するための表"],"e":"仕訳日計表は毎日の伝票を科目別に集計する表で、これを使えば伝票1枚ごとではなく1日分まとめて総勘定元帳へ転記できます。"},{"c":"帳簿・理論","t":"伝票会計","q":"3伝票制において、出金伝票に起票される取引はどれか。","ch":["買掛金¥40,000を現金で支払った","商品¥40,000を現金で売り上げた","商品¥40,000を掛けで仕入れた","買掛金¥40,000を小切手を振り出して支払った"],"e":"出金伝票は現金の支払いを記録する伝票です。小切手の振出は当座預金の減少なので、現金の出金ではなく振替伝票に起票します。"},{"c":"帳簿・理論","t":"伝票会計","q":"入金伝票の科目欄に記入するものとして正しいものはどれか。","ch":["相手科目(仕訳の貸方の勘定科目)","現金","仕訳の借方の勘定科目","伝票の作成者名"],"e":"入金伝票では借方が必ず現金と決まっているため、科目欄には相手科目である貸方の勘定科目(売上・売掛金など)を記入します。"},{"c":"帳簿・理論","t":"理論・分類","q":"「前受金」は簿記の5要素のうちどれに分類されるか。","ch":["負債","資産","収益","純資産"],"e":"前受金は商品を引き渡す義務を表すので負債です。お金を受け取っていても、まだ収益にはなりません。"},{"c":"帳簿・理論","t":"理論・分類","q":"「支払家賃」は簿記の5要素のうちどれに分類されるか。","ch":["費用","負債","資産","純資産"],"e":"支払家賃は事務所などを借りるためにかかったコストなので費用です。損益計算書に表示されます。"},{"c":"帳簿・理論","t":"理論・分類","q":"次の勘定科目のうち、資産に分類されるものはどれか。","ch":["未収入金","未払金","前受収益","資本金"],"e":"未収入金は商品以外の売却代金などを後で受け取る権利なので資産です。未払金と前受収益は負債、資本金は純資産です。"},{"c":"帳簿・理論","t":"理論・分類","q":"次の勘定科目のうち、純資産に分類されるものはどれか。","ch":["繰越利益剰余金","借入金","貸倒引当金","受取利息"],"e":"繰越利益剰余金は過去の利益の蓄積で、資本金とともに純資産を構成します。借入金は負債、受取利息は収益です。"},{"c":"帳簿・理論","t":"理論・分類","q":"次のうち、簿記上の取引に該当するものはどれか。","ch":["火災により建物が焼失した","商品¥100,000の注文を受けた","事務所の賃貸借契約を結んだ","新しい従業員を採用した"],"e":"簿記上の取引とは資産・負債・純資産などが増減する出来事です。火災による焼失は建物という資産が減るので取引に該当します。注文や契約だけではお金や財産はまだ動いていません。"},{"c":"帳簿・理論","t":"理論・分類","q":"期中に増資や配当がない場合、損益計算書の当期純利益と一致するものはどれか。","ch":["貸借対照表の期末純資産から期首純資産を差し引いた金額","貸借対照表の資産総額から収益総額を差し引いた金額","期末の現金残高から期首の現金残高を差し引いた金額","貸借対照表の負債総額の増加額"],"e":"利益が出ると純資産が増えるため、資本取引がなければ「期末純資産−期首純資産＝当期純利益」となり、損益計算書の利益と一致します。"},{"c":"帳簿・理論","t":"理論・分類","q":"各勘定の借方合計と貸方合計をそのまま集計して作成する試算表はどれか。","ch":["合計試算表","残高試算表","合計残高試算表","精算表"],"e":"合計試算表は借方・貸方それぞれの合計額を集計します。残高だけを集計するのが残高試算表、両方を示すのが合計残高試算表です。"},{"c":"帳簿・理論","t":"理論・分類","q":"主要簿の組み合わせとして正しいものはどれか。","ch":["仕訳帳と総勘定元帳","仕訳帳と現金出納帳","総勘定元帳と売掛金元帳","仕入帳と売上帳"],"e":"主要簿はすべての取引を記録する仕訳帳と総勘定元帳の2つです。現金出納帳や仕入帳などは必要に応じて作成する補助簿です。"},{"c":"仕訳","t":"頻出総合","q":"商品¥100,000をクレジット払いの条件で販売した。信販会社への手数料(販売代金の4%)は販売時に計上する。正しい仕訳はどれか。","ch":["(借)クレジット売掛金 96,000、支払手数料 4,000 ／ (貸)売上 100,000","(借)クレジット売掛金 100,000 ／ (貸)売上 100,000","(借)売掛金 96,000、支払手数料 4,000 ／ (貸)売上 100,000","(借)クレジット売掛金 100,000 ／ (貸)売上 96,000、支払手数料 4,000"],"e":"手数料100,000×4%＝4,000を支払手数料(費用)とし、差額96,000をクレジット売掛金とします。通常の売掛金勘定とは区別します。"},{"c":"仕訳","t":"頻出総合","q":"得意先に対する売掛金¥200,000について、電子記録債権の発生記録が行われた。正しい仕訳はどれか。","ch":["(借)電子記録債権 200,000 ／ (貸)売掛金 200,000","(借)売掛金 200,000 ／ (貸)電子記録債権 200,000","(借)電子記録債務 200,000 ／ (貸)売掛金 200,000","(借)受取手形 200,000 ／ (貸)売掛金 200,000"],"e":"売掛金が電子記録債権という別の債権に置き換わるので、売掛金を減らして電子記録債権(資産)を計上します。"},{"c":"仕訳","t":"頻出総合","q":"かねて発生記録を行っていた電子記録債務¥150,000の支払期日が到来し、当座預金口座から決済された。正しい仕訳はどれか。","ch":["(借)電子記録債務 150,000 ／ (貸)当座預金 150,000","(借)当座預金 150,000 ／ (貸)電子記録債務 150,000","(借)電子記録債権 150,000 ／ (貸)当座預金 150,000","(借)買掛金 150,000 ／ (貸)当座預金 150,000"],"e":"決済により電子記録債務(負債)が消滅するので借方に記入し、当座預金の減少を貸方に記入します。"},{"c":"仕訳","t":"頻出総合","q":"店舗を賃借するにあたり、敷金¥200,000と1か月分の家賃¥100,000を普通預金口座から支払った。正しい仕訳はどれか。","ch":["(借)差入保証金 200,000、支払家賃 100,000 ／ (貸)普通預金 300,000","(借)支払家賃 300,000 ／ (貸)普通預金 300,000","(借)差入保証金 300,000 ／ (貸)普通預金 300,000","(借)支払手数料 200,000、支払家賃 100,000 ／ (貸)普通預金 300,000"],"e":"敷金は退去時に返還される権利なので差入保証金(資産)、家賃は支払家賃(費用)で処理します。全額を費用にしないよう注意しましょう。"},{"c":"仕訳","t":"頻出総合","q":"社会保険料¥60,000(従業員負担分¥30,000は給料支払時に預り金で処理済み、残額¥30,000は会社負担分)を現金で納付した。正しい仕訳はどれか。","ch":["(借)法定福利費 30,000、社会保険料預り金 30,000 ／ (貸)現金 60,000","(借)法定福利費 60,000 ／ (貸)現金 60,000","(借)社会保険料預り金 60,000 ／ (貸)現金 60,000","(借)給料 30,000、社会保険料預り金 30,000 ／ (貸)現金 60,000"],"e":"会社負担分は法定福利費(費用)、従業員から預かった分は社会保険料預り金(負債)の取り崩しとして処理します。"},{"c":"仕訳","t":"頻出総合","q":"従業員への給料¥300,000の支払いにあたり、所得税の源泉徴収分¥15,000と社会保険料¥25,000を差し引き、残額を普通預金口座から振り込んだ。正しい仕訳はどれか。","ch":["(借)給料 300,000 ／ (貸)所得税預り金 15,000、社会保険料預り金 25,000、普通預金 260,000","(借)給料 260,000 ／ (貸)普通預金 260,000","(借)給料 300,000 ／ (貸)普通預金 300,000","(借)給料 260,000、所得税預り金 15,000、社会保険料預り金 25,000 ／ (貸)普通預金 300,000"],"e":"給料は総額300,000で費用計上し、差し引いた分は預り金(負債)、実際の振込額は300,000−15,000−25,000＝260,000です。"},{"c":"仕訳","t":"頻出総合","q":"収入印紙¥10,000を購入し、代金は現金で支払った。購入時に費用処理する方法によっている場合、正しい仕訳はどれか。","ch":["(借)租税公課 10,000 ／ (貸)現金 10,000","(借)通信費 10,000 ／ (貸)現金 10,000","(借)貯蔵品 10,000 ／ (貸)現金 10,000","(借)法人税等 10,000 ／ (貸)現金 10,000"],"e":"収入印紙は税金の一種なので租税公課(費用)で処理します。郵便切手の通信費と混同しないようにしましょう。決算時に未使用分があれば貯蔵品へ振り替えます。"},{"c":"仕訳","t":"頻出総合","q":"当座預金残高が¥30,000のとき、買掛金¥50,000を小切手を振り出して支払った。銀行とは借越限度額¥200,000の当座借越契約を結んでおり、期中は当座預金勘定のみで処理している。正しい仕訳はどれか。","ch":["(借)買掛金 50,000 ／ (貸)当座預金 50,000","(借)買掛金 50,000 ／ (貸)当座預金 30,000、当座借越 20,000","(借)買掛金 30,000 ／ (貸)当座預金 30,000","(借)買掛金 50,000 ／ (貸)現金 50,000"],"e":"期中は残高を超えても全額を当座預金勘定の貸方で処理します。決算時に貸方残高となっていれば、借入金などへ振り替えます。"},{"c":"仕訳","t":"商品売買","q":"商品¥240,000を仕入れ、代金のうち¥100,000は約束手形を振り出して支払い、残額は掛けとした。","ch":["(借)仕入 240,000 ／ (貸)支払手形 100,000、買掛金 140,000","(借)仕入 240,000 ／ (貸)受取手形 100,000、買掛金 140,000","(借)仕入 240,000 ／ (貸)買掛金 240,000","(借)仕入 240,000 ／ (貸)支払手形 140,000、買掛金 100,000"],"e":"自分が振り出した約束手形は支払手形(負債)で処理します。残額¥140,000は掛けなので買掛金とし、貸方合計が仕入¥240,000と一致します。"},{"c":"仕訳","t":"商品売買","q":"かねて注文を受けていた商品¥350,000を得意先に引き渡し、代金のうち¥70,000は受注時に受け取っていた手付金と相殺し、残額は先方振出しの小切手で受け取り、ただちに当座預金口座に預け入れた。","ch":["(借)前受金 70,000、当座預金 280,000 ／ (貸)売上 350,000","(借)前受金 70,000、現金 280,000 ／ (貸)売上 350,000","(借)前払金 70,000、当座預金 280,000 ／ (貸)売上 350,000","(借)当座預金 350,000 ／ (貸)売上 350,000"],"e":"受注時の手付金は前受金(負債)なので、引渡時に取り崩します。受け取った小切手はただちに当座預金に預け入れているため、現金ではなく当座預金で処理します。"},{"c":"仕訳","t":"商品売買","q":"かねて注文していた商品¥180,000を受け取り、代金のうち¥50,000は注文時に支払った手付金と相殺し、残額は掛けとした。なお、引取運賃¥3,000は現金で支払った。","ch":["(借)仕入 183,000 ／ (貸)前払金 50,000、買掛金 130,000、現金 3,000","(借)仕入 180,000、発送費 3,000 ／ (貸)前払金 50,000、買掛金 130,000、現金 3,000","(借)仕入 183,000 ／ (貸)前受金 50,000、買掛金 130,000、現金 3,000","(借)仕入 180,000 ／ (貸)前払金 50,000、買掛金 130,000"],"e":"引取運賃(仕入諸掛)は仕入原価に含めるため、仕入は¥183,000です。注文時の手付金は前払金(資産)を取り崩し、残額¥130,000が買掛金となります。"},{"c":"仕訳","t":"商品売買","q":"商品¥250,000を売り上げ、送料¥5,000を加えた合計額を掛けとした。また、同時に配送業者へ商品を引き渡し、送料¥5,000は現金で支払った。","ch":["(借)売掛金 255,000、発送費 5,000 ／ (貸)売上 255,000、現金 5,000","(借)売掛金 250,000、発送費 5,000 ／ (貸)売上 250,000、現金 5,000","(借)売掛金 255,000、立替金 5,000 ／ (貸)売上 255,000、現金 5,000","(借)売掛金 250,000、立替金 5,000 ／ (貸)売上 250,000、現金 5,000"],"e":"送料を加えた合計額で先方に請求する場合は、送料込みの¥255,000を売上として計上します。支払った送料¥5,000は発送費(費用)で処理するのが現行の出題区分に沿った処理です。"},{"c":"仕訳","t":"商品売買","q":"商品¥300,000を仕入れ、代金のうち¥60,000は注文時に支払った手付金と相殺し、¥100,000は小切手を振り出して支払い、残額は掛けとした。","ch":["(借)仕入 300,000 ／ (貸)前払金 60,000、当座預金 100,000、買掛金 140,000","(借)仕入 300,000 ／ (貸)前受金 60,000、当座預金 100,000、買掛金 140,000","(借)仕入 300,000 ／ (貸)前払金 60,000、現金 100,000、買掛金 140,000","(借)仕入 240,000 ／ (貸)当座預金 100,000、買掛金 140,000"],"e":"注文時に支払った手付金は前払金(資産)として計上済みなので、仕入時に取り崩します。小切手の振出しは当座預金の減少、残額¥140,000が買掛金です。"},{"c":"仕訳","t":"商品売買","q":"商品¥400,000を売り上げ、代金のうち¥80,000は受注時に受け取った手付金と相殺し、残額は掛けとした。なお、当社負担の発送費¥4,000は現金で支払った。","ch":["(借)前受金 80,000、売掛金 320,000、発送費 4,000 ／ (貸)売上 400,000、現金 4,000","(借)前受金 80,000、売掛金 324,000 ／ (貸)売上 400,000、現金 4,000","(借)前払金 80,000、売掛金 320,000、発送費 4,000 ／ (貸)売上 400,000、現金 4,000","(借)前受金 80,000、売掛金 320,000 ／ (貸)売上 396,000、現金 4,000"],"e":"手付金は前受金の取崩し、残額¥320,000が売掛金です。当社負担の発送費は売上や売掛金から差し引かず、発送費(費用)として別に計上します。"},{"c":"仕訳","t":"商品売買","q":"商品¥300,000をクレジット払いの条件で販売した。なお、信販会社への手数料(販売代金の2%)は販売時に計上する。","ch":["(借)クレジット売掛金 294,000、支払手数料 6,000 ／ (貸)売上 300,000","(借)クレジット売掛金 300,000 ／ (貸)売上 294,000、支払手数料 6,000","(借)売掛金 294,000、支払手数料 6,000 ／ (貸)売上 300,000","(借)クレジット売掛金 294,000 ／ (貸)売上 294,000"],"e":"売上は販売代金の総額¥300,000で計上し、手数料¥6,000(300,000×2%)は支払手数料(費用)とします。信販会社に対する債権は通常の売掛金と区別してクレジット売掛金で処理します。"},{"c":"仕訳","t":"商品売買","q":"かねて注文を受けていた商品¥260,000を引き渡し、代金のうち¥60,000は受注時の手付金と相殺し、残額は先方振出しの約束手形で受け取った。","ch":["(借)前受金 60,000、受取手形 200,000 ／ (貸)売上 260,000","(借)前受金 60,000、支払手形 200,000 ／ (貸)売上 260,000","(借)受取手形 260,000 ／ (貸)売上 260,000","(借)前払金 60,000、受取手形 200,000 ／ (貸)売上 260,000"],"e":"手付金¥60,000は前受金(負債)を取り崩し、先方振出しの約束手形は受取手形(資産)で処理します。売上は総額¥260,000で計上します。"},{"c":"仕訳","t":"商品売買","q":"商品¥200,000を売り上げ、代金は掛けとした。なお、当社負担の発送費¥6,000は運送会社に月末に支払うこととした。","ch":["(借)売掛金 200,000、発送費 6,000 ／ (貸)売上 200,000、未払金 6,000","(借)売掛金 200,000、発送費 6,000 ／ (貸)売上 200,000、買掛金 6,000","(借)売掛金 206,000 ／ (貸)売上 200,000、未払金 6,000","(借)売掛金 200,000 ／ (貸)売上 194,000、未払金 6,000"],"e":"当社負担の発送費は発送費(費用)として計上します。運送代金など商品以外のサービスに対する後払いの債務は、買掛金ではなく未払金で処理する点がポイントです。"},{"c":"仕訳","t":"商品売買","q":"得意先に対する売掛金¥140,000の回収として、¥90,000は先方振出しの約束手形で受け取り、残額は現金で受け取った。","ch":["(借)受取手形 90,000、現金 50,000 ／ (貸)売掛金 140,000","(借)支払手形 90,000、現金 50,000 ／ (貸)売掛金 140,000","(借)売掛金 140,000 ／ (貸)受取手形 90,000、現金 50,000","(借)受取手形 90,000、現金 50,000 ／ (貸)売上 140,000"],"e":"売掛金という債権が、受取手形¥90,000と現金¥50,000という別の資産に置き換わった取引です。先方振出しの約束手形は受取手形で処理します。"},{"c":"仕訳","t":"商品売買","q":"仕入先に対する買掛金¥130,000の支払いのため、¥80,000については約束手形を振り出し、残額は現金で支払った。","ch":["(借)買掛金 130,000 ／ (貸)支払手形 80,000、現金 50,000","(借)買掛金 130,000 ／ (貸)受取手形 80,000、現金 50,000","(借)支払手形 80,000、現金 50,000 ／ (貸)買掛金 130,000","(借)仕入 130,000 ／ (貸)支払手形 80,000、現金 50,000"],"e":"買掛金¥130,000が消滅し、代わりに支払手形という債務¥80,000が発生、現金¥50,000が減少します。自分が振り出した約束手形は支払手形です。"},{"c":"仕訳","t":"商品売買","q":"先に掛けで売り上げた商品¥200,000のうち¥20,000が品違いのため返品され、その後、掛け代金の残額¥180,000が当座預金口座に振り込まれた。返品と入金をあわせて1つの仕訳で示したものはどれか。","ch":["(借)売上 20,000、当座預金 180,000 ／ (貸)売掛金 200,000","(借)仕入 20,000、当座預金 180,000 ／ (貸)売掛金 200,000","(借)当座預金 200,000 ／ (貸)売掛金 200,000","(借)売掛金 200,000 ／ (貸)売上 20,000、当座預金 180,000"],"e":"返品分は売上を取り消す(売上勘定の借方に記入する)ため、売掛金は¥200,000全額が減少します。実際に入金されたのは返品分を差し引いた¥180,000です。"},{"c":"仕訳","t":"商品売買","q":"商品¥350,000を仕入れ、代金は引取運賃¥8,000とあわせて小切手を振り出して支払った。","ch":["(借)仕入 358,000 ／ (貸)当座預金 358,000","(借)仕入 350,000、発送費 8,000 ／ (貸)当座預金 358,000","(借)仕入 358,000 ／ (貸)現金 358,000","(借)仕入 350,000 ／ (貸)当座預金 350,000"],"e":"引取運賃は仕入諸掛として仕入原価に含めるため、仕入は¥358,000です。小切手の振出しは当座預金の減少として処理します。"},{"c":"仕訳","t":"商品売買","q":"商品¥600,000を注文し、手付金として代金の10%を小切手を振り出して支払った。","ch":["(借)前払金 60,000 ／ (貸)当座預金 60,000","(借)前受金 60,000 ／ (貸)当座預金 60,000","(借)仕入 60,000 ／ (貸)当座預金 60,000","(借)前払金 60,000 ／ (貸)現金 60,000"],"e":"手付金は¥600,000×10%=¥60,000です。商品はまだ受け取っていないので仕入ではなく前払金(資産)で処理し、小切手の振出しは当座預金の減少とします。"},{"c":"仕訳","t":"商品売買","q":"得意先から商品¥450,000の注文を受け、手付金として¥90,000を先方振出しの小切手で受け取った。","ch":["(借)現金 90,000 ／ (貸)前受金 90,000","(借)当座預金 90,000 ／ (貸)前受金 90,000","(借)現金 90,000 ／ (貸)売上 90,000","(借)前受金 90,000 ／ (貸)現金 90,000"],"e":"他人(先方)振出しの小切手は簿記上の現金として扱います。商品を引き渡す前に受け取った手付金は前受金(負債)です。"},{"c":"仕訳","t":"現金・預金","q":"決算日において、現金過不足勘定の借方残高¥4,000のうち¥3,000は消耗品費の記帳漏れであることが判明したが、残額は原因不明のため適切な勘定へ振り替える。","ch":["(借)消耗品費 3,000、雑損 1,000 ／ (貸)現金過不足 4,000","(借)消耗品費 3,000 ／ (貸)現金過不足 3,000","(借)現金過不足 4,000 ／ (貸)消耗品費 3,000、雑益 1,000","(借)消耗品費 3,000、雑損 1,000 ／ (貸)現金 4,000"],"e":"借方残高(実際有高の不足)のうち原因が判明した分は該当する費用へ振り替え、原因不明の残額¥1,000は雑損として処理し、現金過不足勘定を消去します。"},{"c":"仕訳","t":"現金・預金","q":"かねて現金の実際有高が帳簿残高より¥7,000不足していたため現金過不足勘定で処理していたが、本日、その全額が水道光熱費の記帳漏れであることが判明した。","ch":["(借)水道光熱費 7,000 ／ (貸)現金過不足 7,000","(借)現金過不足 7,000 ／ (貸)水道光熱費 7,000","(借)水道光熱費 7,000 ／ (貸)現金 7,000","(借)雑損 7,000 ／ (貸)現金過不足 7,000"],"e":"不足の発見時に「(借)現金過不足 ／ (貸)現金」と処理済みです。原因判明時は現金過不足勘定(借方残高)を貸方で消去し、水道光熱費を計上します。"},{"c":"仕訳","t":"現金・預金","q":"決算日において、現金過不足勘定の貸方残高¥5,000のうち¥4,000は受取家賃の記帳漏れであることが判明したが、残額は原因不明のため適切な勘定へ振り替える。","ch":["(借)現金過不足 5,000 ／ (貸)受取家賃 4,000、雑益 1,000","(借)現金過不足 5,000 ／ (貸)受取家賃 4,000、雑損 1,000","(借)受取家賃 4,000、雑益 1,000 ／ (貸)現金過不足 5,000","(借)現金 5,000 ／ (貸)受取家賃 4,000、雑益 1,000"],"e":"貸方残高(実際有高の過剰)のうち原因が判明した分は受取家賃へ、原因不明の残額¥1,000は雑益として処理します。現金過不足勘定は借方に記入して消去します。"},{"c":"仕訳","t":"現金・預金","q":"現金¥200,000を当座預金口座から引き出した。","ch":["(借)現金 200,000 ／ (貸)当座預金 200,000","(借)当座預金 200,000 ／ (貸)現金 200,000","(借)現金 200,000 ／ (貸)普通預金 200,000","(借)小口現金 200,000 ／ (貸)当座預金 200,000"],"e":"当座預金という資産が減り、現金という資産が増える取引です。増える現金を借方、減る当座預金を貸方に記入します。"},{"c":"仕訳","t":"現金・預金","q":"現金¥300,000を、C銀行の普通預金口座に¥200,000、D銀行の当座預金口座に¥100,000預け入れた。なお、口座の管理のため、銀行名を付した勘定を用いている。","ch":["(借)普通預金C銀行 200,000、当座預金D銀行 100,000 ／ (貸)現金 300,000","(借)現金 300,000 ／ (貸)普通預金C銀行 200,000、当座預金D銀行 100,000","(借)普通預金C銀行 100,000、当座預金D銀行 200,000 ／ (貸)現金 300,000","(借)普通預金C銀行 300,000 ／ (貸)現金 300,000"],"e":"預け入れた口座ごとに、銀行名を付した勘定の借方に記入します。現金は合計¥300,000の減少です。"},{"c":"仕訳","t":"現金・預金","q":"小口係から、小口現金で通信費¥3,000、消耗品費¥4,500、旅費交通費¥2,500を支払った旨の報告を受け、ただちに同額を普通預金口座から小口係の口座へ振り込んで補給した。","ch":["(借)通信費 3,000、消耗品費 4,500、旅費交通費 2,500 ／ (貸)普通預金 10,000","(借)通信費 3,000、消耗品費 4,500、旅費交通費 2,500 ／ (貸)小口現金 10,000","(借)小口現金 10,000 ／ (貸)普通預金 10,000","(借)通信費 3,000、消耗品費 4,500、旅費交通費 2,500 ／ (貸)現金 10,000"],"e":"支払報告と同時に補給する場合は、小口現金勘定を経由させず、各費用の計上と普通預金の減少を直接記帳できます。"},{"c":"仕訳","t":"現金・預金","q":"定期預金¥800,000が満期となり、利息¥4,000とともに普通預金口座に入金された。","ch":["(借)普通預金 804,000 ／ (貸)定期預金 800,000、受取利息 4,000","(借)普通預金 804,000 ／ (貸)定期預金 800,000、支払利息 4,000","(借)定期預金 800,000、受取利息 4,000 ／ (貸)普通預金 804,000","(借)普通預金 800,000 ／ (貸)定期預金 800,000"],"e":"満期により定期預金(資産)が減少し、元本と利息の合計¥804,000が普通預金に入金されます。利息は受取利息(収益)です。"},{"c":"仕訳","t":"現金・預金","q":"手許にあった得意先振出しの小切手¥60,000と紙幣¥40,000を、まとめて当座預金口座に預け入れた。","ch":["(借)当座預金 100,000 ／ (貸)現金 100,000","(借)当座預金 100,000 ／ (貸)現金 40,000、受取手形 60,000","(借)現金 100,000 ／ (貸)当座預金 100,000","(借)当座預金 100,000 ／ (貸)売掛金 100,000"],"e":"他人振出しの小切手は受け取った時点で現金として処理しているため、紙幣とあわせて「現金→当座預金」への振替¥100,000となります。"},{"c":"仕訳","t":"現金・預金","q":"当座預金勘定が¥70,000の貸方残高(当座借越の状態)のときに、得意先から売掛金¥100,000が当座預金口座に振り込まれた。なお、期中の取引はすべて当座預金勘定で処理している。","ch":["(借)当座預金 100,000 ／ (貸)売掛金 100,000","(借)当座借越 70,000、当座預金 30,000 ／ (貸)売掛金 100,000","(借)当座預金 100,000 ／ (貸)売掛金 30,000、当座借越 70,000","(借)現金 100,000 ／ (貸)売掛金 100,000"],"e":"期中は当座借越の状態でも当座預金勘定だけで処理するため、入金額¥100,000をそのまま当座預金の借方に記入します(結果として貸方残高が解消されます)。"},{"c":"仕訳","t":"現金・預金","q":"現金の実際有高を調べたところ、帳簿残高より¥6,000不足していた。調査の結果、¥4,500は旅費交通費の記帳漏れと判明したが、残額は原因が分からないため現金過不足勘定で処理した。","ch":["(借)旅費交通費 4,500、現金過不足 1,500 ／ (貸)現金 6,000","(借)旅費交通費 4,500、雑損 1,500 ／ (貸)現金 6,000","(借)現金過不足 6,000 ／ (貸)現金 6,000","(借)現金 6,000 ／ (貸)旅費交通費 4,500、現金過不足 1,500"],"e":"帳簿残高を実際有高に合わせるため現金¥6,000を減らします。原因判明分は旅費交通費、不明分¥1,500のみ現金過不足とします。雑損とするのは決算まで原因不明の場合です。"},{"c":"仕訳","t":"固定資産","q":"店舗用の建物¥2,500,000を購入し、代金は月末に支払うこととした。なお、登記料¥100,000は現金で支払った。","ch":["(借)建物 2,600,000 ／ (貸)未払金 2,500,000、現金 100,000","(借)建物 2,500,000、租税公課 100,000 ／ (貸)未払金 2,500,000、現金 100,000","(借)建物 2,600,000 ／ (貸)買掛金 2,500,000、現金 100,000","(借)建物 2,500,000 ／ (貸)未払金 2,400,000、現金 100,000"],"e":"登記料は建物を取得するための付随費用なので取得原価に含め、建物は¥2,600,000です。建物代金の後払いは未払金、登記料は現金と、支払方法ごとに貸方を分けます。"},{"c":"仕訳","t":"固定資産","q":"駐車場用の土地(1㎡あたり¥50,000)を60㎡購入し、整地費用¥200,000とあわせて小切手を振り出して支払った。","ch":["(借)土地 3,200,000 ／ (貸)当座預金 3,200,000","(借)土地 3,000,000、修繕費 200,000 ／ (貸)当座預金 3,200,000","(借)土地 3,200,000 ／ (貸)現金 3,200,000","(借)土地 3,000,000 ／ (貸)当座預金 3,000,000"],"e":"土地の代金は50,000×60㎡=3,000,000で、整地費用200,000は使用できる状態にするための付随費用なので取得原価に含めます。合計¥3,200,000が土地の金額です。"},{"c":"仕訳","t":"固定資産","q":"期首に、営業用の車両(取得原価¥900,000、減価償却累計額¥600,000、間接法で記帳)を¥250,000で売却し、代金は先方振出しの小切手で受け取った。","ch":["(借)車両運搬具減価償却累計額 600,000、現金 250,000、固定資産売却損 50,000 ／ (貸)車両運搬具 900,000","(借)車両運搬具減価償却累計額 600,000、当座預金 250,000、固定資産売却損 50,000 ／ (貸)車両運搬具 900,000","(借)現金 250,000、固定資産売却損 650,000 ／ (貸)車両運搬具 900,000","(借)車両運搬具減価償却累計額 600,000、現金 250,000 ／ (貸)車両運搬具 900,000、固定資産売却益 50,000"],"e":"帳簿価額は900,000−600,000=¥300,000で、売却価額¥250,000との差額¥50,000が固定資産売却損です。他人振出しの小切手は現金勘定で処理します。"},{"c":"仕訳","t":"固定資産","q":"×3年7月31日に、備品(取得原価¥360,000、期首の減価償却累計額¥120,000、耐用年数6年、残存価額ゼロ、定額法、間接法で記帳)を¥240,000で売却し、代金は月末に受け取ることとした。当期の減価償却費は月割で計上する。なお、決算日は3月31日である。","ch":["(借)備品減価償却累計額 120,000、減価償却費 20,000、未収入金 240,000 ／ (貸)備品 360,000、固定資産売却益 20,000","(借)備品減価償却累計額 120,000、未収入金 240,000 ／ (貸)備品 360,000","(借)備品減価償却累計額 120,000、減価償却費 60,000、未収入金 240,000 ／ (貸)備品 360,000、固定資産売却益 60,000","(借)備品減価償却累計額 120,000、減価償却費 20,000、売掛金 240,000 ／ (貸)備品 360,000、固定資産売却益 20,000"],"e":"年間償却費は360,000÷6年=60,000で、4月〜7月の4か月分¥20,000を月割計上します。帳簿価額は360,000−120,000−20,000=¥220,000となり、売却価額¥240,000との差額¥20,000が売却益です。"},{"c":"仕訳","t":"固定資産","q":"決算日(3月31日)にあたり、当期の8月1日に取得した建物¥2,400,000(耐用年数20年、残存価額ゼロ、定額法)について月割で減価償却を行う。記帳は間接法による。","ch":["(借)減価償却費 80,000 ／ (貸)建物減価償却累計額 80,000","(借)減価償却費 120,000 ／ (貸)建物減価償却累計額 120,000","(借)減価償却費 70,000 ／ (貸)建物減価償却累計額 70,000","(借)減価償却費 80,000 ／ (貸)建物 80,000"],"e":"年間償却費は2,400,000÷20年=120,000です。8月から3月までの8か月分なので、120,000×8/12=¥80,000を計上します。"},{"c":"仕訳","t":"固定資産","q":"事務所用のエアコン¥150,000を購入し、設置工事費¥20,000とあわせて普通預金口座から支払った。","ch":["(借)備品 170,000 ／ (貸)普通預金 170,000","(借)備品 150,000、修繕費 20,000 ／ (貸)普通預金 170,000","(借)消耗品費 170,000 ／ (貸)普通預金 170,000","(借)備品 150,000 ／ (貸)普通預金 150,000"],"e":"エアコンは長期間使用する固定資産なので備品で処理し、設置工事費は使用可能にするための付随費用として取得原価に含めます。合計¥170,000が備品の金額です。"},{"c":"仕訳","t":"固定資産","q":"所有する土地の一部(帳簿価額¥800,000)を¥750,000で売却し、代金は普通預金口座に振り込まれた。","ch":["(借)普通預金 750,000、固定資産売却損 50,000 ／ (貸)土地 800,000","(借)普通預金 750,000 ／ (貸)土地 750,000","(借)普通預金 750,000、雑損 50,000 ／ (貸)土地 800,000","(借)普通預金 800,000 ／ (貸)土地 750,000、固定資産売却益 50,000"],"e":"土地は帳簿価額¥800,000の全額を貸方に記入します。売却価額¥750,000が帳簿価額を下回るため、差額¥50,000は固定資産売却損(費用)です。"},{"c":"仕訳","t":"固定資産","q":"決算にあたり、備品(取得原価¥900,000、耐用年数6年、残存価額ゼロ、定額法)について3年目の減価償却を行う。記帳は間接法による。","ch":["(借)減価償却費 150,000 ／ (貸)備品減価償却累計額 150,000","(借)減価償却費 450,000 ／ (貸)備品減価償却累計額 450,000","(借)減価償却費 150,000 ／ (貸)備品 150,000","(借)減価償却費 300,000 ／ (貸)備品減価償却累計額 300,000"],"e":"定額法では毎期同額を計上するため、3年目も900,000÷6年=¥150,000です。450,000は3年分の累計額であり、当期の仕訳の金額ではありません。"},{"c":"仕訳","t":"固定資産","q":"決算日(3月31日)にあたり、当期の10月1日に取得した営業用の車両¥1,800,000(耐用年数6年、残存価額ゼロ、定額法)について月割で減価償却を行う。記帳は間接法による。","ch":["(借)減価償却費 150,000 ／ (貸)車両運搬具減価償却累計額 150,000","(借)減価償却費 300,000 ／ (貸)車両運搬具減価償却累計額 300,000","(借)減価償却費 175,000 ／ (貸)車両運搬具減価償却累計額 175,000","(借)減価償却費 150,000 ／ (貸)車両運搬具 150,000"],"e":"年間償却費は1,800,000÷6年=300,000です。10月から3月までの6か月分なので、300,000×6/12=¥150,000を月割計上します。"},{"c":"仕訳","t":"固定資産","q":"店舗の改修工事を行い、代金¥700,000を普通預金口座から支払った。このうち¥500,000は建物の価値を高める資本的支出であり、残額は原状回復のための収益的支出である。","ch":["(借)建物 500,000、修繕費 200,000 ／ (貸)普通預金 700,000","(借)建物 700,000 ／ (貸)普通預金 700,000","(借)修繕費 700,000 ／ (貸)普通預金 700,000","(借)建物 200,000、修繕費 500,000 ／ (貸)普通預金 700,000"],"e":"価値を高める資本的支出¥500,000は建物(資産)に計上し、原状回復のための収益的支出¥200,000は修繕費(費用)で処理します。金額の振り分けを問題文から正確に読み取りましょう。"},{"c":"仕訳","t":"固定資産","q":"中古のトラック¥800,000を購入し、整備費用¥50,000とあわせて小切手を振り出して支払った。","ch":["(借)車両運搬具 850,000 ／ (貸)当座預金 850,000","(借)車両運搬具 800,000、修繕費 50,000 ／ (貸)当座預金 850,000","(借)車両運搬具 850,000 ／ (貸)現金 850,000","(借)車両運搬具 800,000 ／ (貸)当座預金 800,000"],"e":"中古資産でも、使用開始前の整備費用は使用できる状態にするための付随費用なので取得原価に含めます。修繕費とするのは使用開始後の維持・修理のための支出です。"},{"c":"仕訳","t":"固定資産","q":"先月購入した営業用車両の未払代金¥1,500,000を、普通預金口座から振り込んで支払った。","ch":["(借)未払金 1,500,000 ／ (貸)普通預金 1,500,000","(借)買掛金 1,500,000 ／ (貸)普通預金 1,500,000","(借)車両運搬具 1,500,000 ／ (貸)普通預金 1,500,000","(借)未払金 1,500,000 ／ (貸)当座預金 1,500,000"],"e":"車両は購入時に計上済みで、そのとき貸方に記入した未払金(負債)を支払って減らす仕訳です。商品以外の未払いなので買掛金ではありません。"},{"c":"仕訳","t":"固定資産","q":"決算にあたり、建物(取得原価¥6,000,000、耐用年数30年、残存価額は取得原価の10%、定額法)について減価償却を行う。記帳は間接法による。","ch":["(借)減価償却費 180,000 ／ (貸)建物減価償却累計額 180,000","(借)減価償却費 200,000 ／ (貸)建物減価償却累計額 200,000","(借)減価償却費 180,000 ／ (貸)建物 180,000","(借)減価償却費 60,000 ／ (貸)建物減価償却累計額 60,000"],"e":"残存価額は6,000,000×10%=600,000です。減価償却費は(6,000,000−600,000)÷30年=¥180,000となります。残存価額を差し引くのを忘れないようにしましょう。"},{"c":"仕訳","t":"その他の費用・収益","q":"事務所のインターネット利用料¥8,000が普通預金口座から引き落とされた。","ch":["(借)通信費 8,000 ／ (貸)普通預金 8,000","(借)水道光熱費 8,000 ／ (貸)普通預金 8,000","(借)支払手数料 8,000 ／ (貸)普通預金 8,000","(借)消耗品費 8,000 ／ (貸)普通預金 8,000"],"e":"インターネット利用料は電話料金や切手代と同じく、通信のための費用なので通信費で処理します。"},{"c":"仕訳","t":"その他の費用・収益","q":"来客用のお茶とお菓子¥3,000を購入し、代金は現金で支払った。なお、どの費用にもあてはまらない少額の支出として処理する。","ch":["(借)雑費 3,000 ／ (貸)現金 3,000","(借)雑損 3,000 ／ (貸)現金 3,000","(借)消耗品費 3,000 ／ (貸)現金 3,000","(借)仕入 3,000 ／ (貸)現金 3,000"],"e":"特定の費用にあてはまらない少額の支出は雑費で処理します。雑損は現金過不足の原因不明分などに使う勘定なので区別しましょう。"},{"c":"仕訳","t":"その他の費用・収益","q":"所有する土地を月極駐車場として貸しており、今月分の地代¥35,000が普通預金口座に振り込まれた。","ch":["(借)普通預金 35,000 ／ (貸)受取地代 35,000","(借)普通預金 35,000 ／ (貸)受取家賃 35,000","(借)受取地代 35,000 ／ (貸)普通預金 35,000","(借)普通預金 35,000 ／ (貸)土地 35,000"],"e":"土地を貸して受け取る賃料は受取地代(収益)で処理します。建物を貸した場合の受取家賃と区別しましょう。"},{"c":"仕訳","t":"その他の費用・収益","q":"事務所の水道料金¥9,000が当座預金口座から引き落とされた。","ch":["(借)水道光熱費 9,000 ／ (貸)当座預金 9,000","(借)通信費 9,000 ／ (貸)当座預金 9,000","(借)雑費 9,000 ／ (貸)当座預金 9,000","(借)水道光熱費 9,000 ／ (貸)普通預金 9,000"],"e":"水道・電気・ガスの料金は水道光熱費で処理します。引き落とされた口座が当座預金である点も確認しましょう。"},{"c":"仕訳","t":"その他の費用・収益","q":"従業員募集のための求人広告を掲載し、掲載料¥60,000は月末に支払うこととした。","ch":["(借)広告宣伝費 60,000 ／ (貸)未払金 60,000","(借)広告宣伝費 60,000 ／ (貸)買掛金 60,000","(借)支払手数料 60,000 ／ (貸)未払金 60,000","(借)給料 60,000 ／ (貸)未払金 60,000"],"e":"求人広告の掲載料は広告宣伝費で処理します。サービスに対する代金の後払いなので、貸方は買掛金ではなく未払金です。"},{"c":"仕訳","t":"その他の費用・収益","q":"店舗にかける6か月分の火災保険料¥24,000を普通預金口座から支払った。なお、支払時に全額を費用として処理する。","ch":["(借)保険料 24,000 ／ (貸)普通預金 24,000","(借)建物 24,000 ／ (貸)普通預金 24,000","(借)前払保険料 24,000 ／ (貸)普通預金 24,000","(借)修繕費 24,000 ／ (貸)普通預金 24,000"],"e":"火災保険の掛金は保険料(費用)で処理します。支払時は全額を費用とし、決算日に未経過分があれば前払保険料へ振り替えます。"},{"c":"仕訳","t":"訂正仕訳","q":"得意先から売掛金¥50,000を現金で回収した際、誤って借方を当座預金として記帳していたことが判明した。これを訂正する仕訳はどれか。","ch":["(借)現金 50,000 ／ (貸)当座預金 50,000","(借)当座預金 50,000 ／ (貸)現金 50,000","(借)現金 50,000 ／ (貸)売掛金 50,000","(借)売掛金 50,000 ／ (貸)当座預金 50,000"],"e":"誤って増やした当座預金を貸方で取り消し、正しく現金を借方に計上します。売掛金の減少は正しく処理されているので動かしません。"},{"c":"仕訳","t":"訂正仕訳","q":"商品¥18,000を掛けで売り上げた際、誤って金額を¥81,000と記帳していたことが判明した。これを訂正する仕訳はどれか。","ch":["(借)売上 63,000 ／ (貸)売掛金 63,000","(借)売掛金 63,000 ／ (貸)売上 63,000","(借)売上 81,000 ／ (貸)売掛金 81,000","(借)売掛金 18,000 ／ (貸)売上 18,000"],"e":"81,000−18,000=¥63,000だけ多く記帳しているため、過大分を取り消す逆仕訳を行います。数字の書き間違い(桁の転置)は差額で訂正します。"},{"c":"仕訳","t":"訂正仕訳","q":"給料¥300,000の支給の際、源泉所得税¥12,000を差し引いて現金¥288,000を支払ったが、誤って「(借)給料 288,000 ／ (貸)現金 288,000」と記帳していた。これを訂正する仕訳はどれか。","ch":["(借)給料 12,000 ／ (貸)所得税預り金 12,000","(借)所得税預り金 12,000 ／ (貸)給料 12,000","(借)給料 12,000 ／ (貸)現金 12,000","(借)給料 300,000 ／ (貸)所得税預り金 12,000、現金 288,000"],"e":"給料は総額¥300,000で計上すべきで、¥12,000不足しています。不足分の給料を借方に、計上漏れの所得税預り金(負債)を貸方に追加します。現金の処理は正しいので動かしません。"},{"c":"仕訳","t":"訂正仕訳","q":"約束手形を振り出して銀行から¥600,000を借り入れた際、誤って貸方を支払手形として記帳していたことが判明した。これを訂正する仕訳はどれか。","ch":["(借)支払手形 600,000 ／ (貸)手形借入金 600,000","(借)手形借入金 600,000 ／ (貸)支払手形 600,000","(借)支払手形 600,000 ／ (貸)借入金 600,000","(借)当座預金 600,000 ／ (貸)手形借入金 600,000"],"e":"資金の借入れのために振り出した手形は、商品代金の支払手形と区別して手形借入金で処理します。誤った支払手形を借方で取り消し、手形借入金を貸方に計上します。"},{"c":"仕訳","t":"訂正仕訳","q":"収入印紙¥6,000を現金で購入してただちに使用した際、誤って通信費として記帳していたことが判明した。これを訂正する仕訳はどれか。","ch":["(借)租税公課 6,000 ／ (貸)通信費 6,000","(借)通信費 6,000 ／ (貸)租税公課 6,000","(借)租税公課 6,000 ／ (貸)現金 6,000","(借)貯蔵品 6,000 ／ (貸)通信費 6,000"],"e":"収入印紙は税金の一種なので租税公課で処理すべきです。誤って計上した通信費を貸方で取り消し、租税公課を借方に計上します。切手(通信費)との混同に注意しましょう。"},{"c":"仕訳","t":"訂正仕訳","q":"土地(帳簿価額¥900,000)を¥1,000,000で売却して代金を当座預金に預け入れた際、売却益¥100,000を誤って売上として記帳していたことが判明した。これを訂正する仕訳はどれか。","ch":["(借)売上 100,000 ／ (貸)固定資産売却益 100,000","(借)固定資産売却益 100,000 ／ (貸)売上 100,000","(借)売上 100,000 ／ (貸)土地 100,000","(借)売上 1,000,000 ／ (貸)固定資産売却益 1,000,000"],"e":"売上は商品を販売したときの収益であり、土地の売却差益は固定資産売却益で処理すべきです。誤った売上を借方で取り消し、固定資産売却益を貸方に計上します。"},{"c":"仕訳","t":"給料・税金","q":"従業員への給料¥360,000の支払いにあたり、源泉所得税¥14,000、住民税¥22,000および従業員負担分の社会保険料¥27,000を差し引き、残額を当座預金口座から従業員の口座へ振り込んだ。","ch":["(借)給料 360,000 ／ (貸)所得税預り金 14,000、住民税預り金 22,000、社会保険料預り金 27,000、当座預金 297,000","(借)給料 297,000 ／ (貸)当座預金 297,000","(借)給料 360,000、法定福利費 27,000 ／ (貸)所得税預り金 14,000、住民税預り金 22,000、社会保険料預り金 27,000、当座預金 324,000","(借)給料 360,000 ／ (貸)所得税預り金 63,000、当座預金 297,000"],"e":"給料は総額¥360,000で計上し、3種類の控除額はそれぞれの預り金(負債)とします。差引支給額は360,000−63,000=¥297,000です。従業員負担分の社会保険料は法定福利費ではありません。"},{"c":"仕訳","t":"給料・税金","q":"社会保険料¥50,000を普通預金口座から納付した。このうち¥25,000は従業員の給料から差し引いた従業員負担分であり、残額は会社負担分である。","ch":["(借)社会保険料預り金 25,000、法定福利費 25,000 ／ (貸)普通預金 50,000","(借)法定福利費 50,000 ／ (貸)普通預金 50,000","(借)社会保険料預り金 50,000 ／ (貸)普通預金 50,000","(借)給料 25,000、法定福利費 25,000 ／ (貸)普通預金 50,000"],"e":"従業員負担分は給料支払時に計上した社会保険料預り金の取崩し、会社負担分は法定福利費(費用)です。負担者ごとに勘定を分けるのがポイントです。"},{"c":"仕訳","t":"給料・税金","q":"市役所から建物と土地に対する固定資産税の納税通知書¥120,000を受け取り、後日納付することとした。","ch":["(借)租税公課 120,000 ／ (貸)未払金 120,000","(借)租税公課 120,000 ／ (貸)現金 120,000","(借)建物 120,000 ／ (貸)未払金 120,000","(借)法人税等 120,000 ／ (貸)未払金 120,000"],"e":"固定資産税は租税公課(費用)で処理します。納税通知書を受け取った時点で納税義務が確定するため、未納付分は未払金(負債)を計上します。"},{"c":"仕訳","t":"給料・税金","q":"前期末の決算で未使用の収入印紙¥5,000を貯蔵品勘定へ振り替えている。当期首(4月1日)に行う再振替仕訳として正しいものはどれか。","ch":["(借)租税公課 5,000 ／ (貸)貯蔵品 5,000","(借)貯蔵品 5,000 ／ (貸)租税公課 5,000","(借)通信費 5,000 ／ (貸)貯蔵品 5,000","(借)租税公課 5,000 ／ (貸)現金 5,000"],"e":"期首に前期末の仕訳の逆仕訳を行い、貯蔵品を元の費用勘定へ戻します。収入印紙は租税公課です。切手の場合は通信費に戻します。"},{"c":"仕訳","t":"給料・税金","q":"商品を仕入れ、税込価額¥165,000(消費税率10%)は掛けとした。なお、消費税は税抜方式で記帳している。","ch":["(借)仕入 150,000、仮払消費税 15,000 ／ (貸)買掛金 165,000","(借)仕入 165,000 ／ (貸)買掛金 165,000","(借)仕入 150,000、仮受消費税 15,000 ／ (貸)買掛金 165,000","(借)仕入 165,000、仮払消費税 16,500 ／ (貸)買掛金 181,500"],"e":"税込165,000のうち本体価格は165,000×100/110=150,000、消費税は15,000です。支払う側の消費税は仮払消費税(資産)で処理します。"},{"c":"仕訳","t":"給料・税金","q":"営業用トラックにかかる自動車税¥30,000を現金で納付した。","ch":["(借)租税公課 30,000 ／ (貸)現金 30,000","(借)車両運搬具 30,000 ／ (貸)現金 30,000","(借)法人税等 30,000 ／ (貸)現金 30,000","(借)旅費交通費 30,000 ／ (貸)現金 30,000"],"e":"自動車税は固定資産税や印紙税と同じく租税公課(費用)で処理します。車両の取得原価には含めません。"},{"c":"仕訳","t":"給料・税金","q":"給料支払時に源泉徴収していた従業員の所得税¥15,000を、普通預金口座から納付した。","ch":["(借)所得税預り金 15,000 ／ (貸)普通預金 15,000","(借)租税公課 15,000 ／ (貸)普通預金 15,000","(借)給料 15,000 ／ (貸)普通預金 15,000","(借)法人税等 15,000 ／ (貸)普通預金 15,000"],"e":"源泉徴収した所得税は従業員から預かっているお金なので、納付時は所得税預り金(負債)を取り崩します。会社の費用にはなりません。"},{"c":"仕訳","t":"給料・税金","q":"従業員への給料¥300,000の支払いにあたり、かねて従業員に貸し付けていた¥50,000と源泉所得税¥12,000を差し引き、残額を普通預金口座から振り込んだ。","ch":["(借)給料 300,000 ／ (貸)従業員貸付金 50,000、所得税預り金 12,000、普通預金 238,000","(借)給料 238,000 ／ (貸)普通預金 238,000","(借)給料 300,000 ／ (貸)立替金 50,000、所得税預り金 12,000、普通預金 238,000","(借)給料 300,000、従業員貸付金 50,000 ／ (貸)所得税預り金 12,000、普通預金 338,000"],"e":"給料は総額で計上し、貸し付けていた¥50,000は従業員貸付金(資産)の回収として貸方に記入します。差引支給額は¥238,000です。"},{"c":"仕訳","t":"給料・税金","q":"決算日において、購入時に費用として処理していた収入印紙のうち、未使用分が¥10,000あることが判明したため、適切な勘定へ振り替える。","ch":["(借)貯蔵品 10,000 ／ (貸)租税公課 10,000","(借)租税公課 10,000 ／ (貸)貯蔵品 10,000","(借)貯蔵品 10,000 ／ (貸)通信費 10,000","(借)消耗品費 10,000 ／ (貸)租税公課 10,000"],"e":"未使用の収入印紙は換金性があるため、決算日に貯蔵品(資産)へ振り替えて翌期に繰り越します。収入印紙の費用勘定は租税公課です。"},{"c":"仕訳","t":"給料・税金","q":"従業員の給料から差し引いていた源泉所得税¥14,000と住民税¥20,000を、まとめて普通預金口座から納付した。","ch":["(借)所得税預り金 14,000、住民税預り金 20,000 ／ (貸)普通預金 34,000","(借)租税公課 34,000 ／ (貸)普通預金 34,000","(借)給料 34,000 ／ (貸)普通預金 34,000","(借)所得税預り金 20,000、住民税預り金 14,000 ／ (貸)普通預金 34,000"],"e":"どちらも従業員から預かった税金なので、それぞれの預り金(負債)を取り崩して納付します。金額の対応(所得税14,000・住民税20,000)にも注意しましょう。"},{"c":"仕訳","t":"給料・税金","q":"郵便局で郵便切手¥8,000と収入印紙¥6,000を購入し、代金は現金で支払った。なお、いずれもただちに使用した。","ch":["(借)通信費 8,000、租税公課 6,000 ／ (貸)現金 14,000","(借)通信費 14,000 ／ (貸)現金 14,000","(借)租税公課 8,000、通信費 6,000 ／ (貸)現金 14,000","(借)貯蔵品 14,000 ／ (貸)現金 14,000"],"e":"切手は通信費、収入印紙は租税公課と、別々の費用で処理します。どちらも使用済みなので貯蔵品にはしません。"},{"c":"仕訳","t":"給料・税金","q":"消費税の確定申告を行い、決算で計上していた未払消費税¥120,000を普通預金口座から納付した。","ch":["(借)未払消費税 120,000 ／ (貸)普通預金 120,000","(借)租税公課 120,000 ／ (貸)普通預金 120,000","(借)仮払消費税 120,000 ／ (貸)普通預金 120,000","(借)仮受消費税 120,000 ／ (貸)普通預金 120,000"],"e":"決算で計上した未払消費税(負債)を納付により取り崩します。仮払・仮受消費税は決算時の相殺で消えているため、納付時には使いません。"},{"c":"仕訳","t":"債権・債務","q":"従業員の交通費支払用のICカードに現金¥10,000を入金(チャージ)した。なお、チャージ時には費用とせず、資産の勘定で処理している。","ch":["(借)仮払金 10,000 ／ (貸)現金 10,000","(借)旅費交通費 10,000 ／ (貸)現金 10,000","(借)前払金 10,000 ／ (貸)現金 10,000","(借)立替金 10,000 ／ (貸)現金 10,000"],"e":"チャージした時点では何に使うか確定していないため、仮払金(資産)で処理します。実際に電車などを利用した時点で旅費交通費へ振り替えます。"},{"c":"仕訳","t":"債権・債務","q":"従業員がチャージ済みのICカード(チャージ時に仮払金で処理)を使用して、電車賃¥2,600を支払った旨の報告を受けた。","ch":["(借)旅費交通費 2,600 ／ (貸)仮払金 2,600","(借)旅費交通費 2,600 ／ (貸)現金 2,600","(借)仮払金 2,600 ／ (貸)旅費交通費 2,600","(借)旅費交通費 2,600 ／ (貸)未払金 2,600"],"e":"利用が確定した分だけ仮払金から旅費交通費(費用)へ振り替えます。現金はチャージ時にすでに減っているので、ここでは動きません。"},{"c":"仕訳","t":"債権・債務","q":"取引先に¥500,000を貸し付けるにあたり、利息¥10,000を差し引いた残額を普通預金口座から振り込んだ。","ch":["(借)貸付金 500,000 ／ (貸)普通預金 490,000、受取利息 10,000","(借)貸付金 490,000 ／ (貸)普通預金 490,000","(借)貸付金 500,000 ／ (貸)普通預金 500,000","(借)貸付金 500,000、支払利息 10,000 ／ (貸)普通預金 490,000、受取利息 20,000"],"e":"貸付金は貸し付けた総額¥500,000で計上します。先に差し引いた利息¥10,000は受取利息(収益)とし、実際の振込額は¥490,000です。"},{"c":"仕訳","t":"債権・債務","q":"取引先への手形貸付金¥400,000について、満期日に利息¥8,000とともに当座預金口座に振り込まれた。","ch":["(借)当座預金 408,000 ／ (貸)手形貸付金 400,000、受取利息 8,000","(借)当座預金 408,000 ／ (貸)貸付金 400,000、受取利息 8,000","(借)当座預金 400,000、支払利息 8,000 ／ (貸)手形貸付金 408,000","(借)手形貸付金 400,000、受取利息 8,000 ／ (貸)当座預金 408,000"],"e":"手形を受け取って貸し付けたお金は手形貸付金で処理しているため、回収時はこれを取り崩します。利息¥8,000は受取利息(収益)です。"},{"c":"仕訳","t":"債権・債務","q":"当社の役員から¥500,000を借り入れ、同額が普通預金口座に入金された。なお、役員からの借入れであることを明示する勘定科目を用いる。","ch":["(借)普通預金 500,000 ／ (貸)役員借入金 500,000","(借)普通預金 500,000 ／ (貸)役員貸付金 500,000","(借)役員借入金 500,000 ／ (貸)普通預金 500,000","(借)普通預金 500,000 ／ (貸)資本金 500,000"],"e":"役員からの借入れは、通常の借入金と区別して役員借入金(負債)で処理します。役員貸付金は当社が役員にお金を貸したときの資産の勘定です。"},{"c":"仕訳","t":"債権・債務","q":"取引先への貸付金¥1,200,000(貸付期間10か月、利率年3%)について、満期日に利息とともに現金で回収した。","ch":["(借)現金 1,230,000 ／ (貸)貸付金 1,200,000、受取利息 30,000","(借)現金 1,236,000 ／ (貸)貸付金 1,200,000、受取利息 36,000","(借)現金 1,230,000 ／ (貸)貸付金 1,230,000","(借)現金 1,203,000 ／ (貸)貸付金 1,200,000、受取利息 3,000"],"e":"利息は1,200,000×3%×10/12=¥30,000です。年利率なので、貸付期間10か月分に月割りする計算を忘れないようにしましょう。"},{"c":"仕訳","t":"債権・債務","q":"かねて従業員のために立て替えていた¥15,000を、従業員から現金で受け取った。","ch":["(借)現金 15,000 ／ (貸)立替金 15,000","(借)現金 15,000 ／ (貸)預り金 15,000","(借)立替金 15,000 ／ (貸)現金 15,000","(借)現金 15,000 ／ (貸)雑益 15,000"],"e":"立替払いしたときに計上した立替金(資産)を、回収により貸方に記入して減らします。あとで返してもらう権利が消滅する取引です。"},{"c":"仕訳","t":"債権・債務","q":"商品¥28,000を売り上げ、代金として自治体発行の商品券¥30,000を受け取り、釣銭¥2,000は現金で支払った。","ch":["(借)受取商品券 30,000 ／ (貸)売上 28,000、現金 2,000","(借)受取商品券 28,000 ／ (貸)売上 28,000","(借)受取商品券 30,000 ／ (貸)売上 30,000","(借)現金 2,000、受取商品券 28,000 ／ (貸)売上 30,000"],"e":"受け取った商品券は額面¥30,000全額を受取商品券(資産)で計上します。売上¥28,000との差額¥2,000は釣銭として現金で支払っています。"},{"c":"仕訳","t":"債権・債務","q":"かねて商品¥400,000を注文し手付金¥40,000を支払っていたが、取引が中止となり、手付金の全額が普通預金口座に返金された。","ch":["(借)普通預金 40,000 ／ (貸)前払金 40,000","(借)普通預金 40,000 ／ (貸)前受金 40,000","(借)前払金 40,000 ／ (貸)普通預金 40,000","(借)普通預金 40,000 ／ (貸)雑益 40,000"],"e":"注文時に計上した前払金(資産)が返金により消滅するので、貸方に記入します。取引中止でも損益は生じず、資産が入れ替わるだけです。"},{"c":"仕訳","t":"債権・債務","q":"営業所の賃借契約を結び、敷金(家賃2か月分)¥240,000と初月分の家賃¥120,000を当座預金口座から支払った。","ch":["(借)差入保証金 240,000、支払家賃 120,000 ／ (貸)当座預金 360,000","(借)支払家賃 360,000 ／ (貸)当座預金 360,000","(借)差入保証金 360,000 ／ (貸)当座預金 360,000","(借)前払金 240,000、支払家賃 120,000 ／ (貸)当座預金 360,000"],"e":"敷金は解約時に返還される権利なので差入保証金(資産)、家賃は支払家賃(費用)と分けて処理します。全額を費用にしないよう注意しましょう。"},{"c":"仕訳","t":"債権・債務","q":"不用になった営業用の車両(取得原価¥750,000、減価償却累計額¥450,000、間接法で記帳)を¥300,000で売却し、代金は月末に受け取ることとした。","ch":["(借)車両運搬具減価償却累計額 450,000、未収入金 300,000 ／ (貸)車両運搬具 750,000","(借)車両運搬具減価償却累計額 450,000、売掛金 300,000 ／ (貸)車両運搬具 750,000","(借)未収入金 300,000、固定資産売却損 450,000 ／ (貸)車両運搬具 750,000","(借)車両運搬具減価償却累計額 450,000、未収入金 300,000 ／ (貸)車両運搬具 750,000、固定資産売却益 300,000"],"e":"帳簿価額750,000−450,000=¥300,000と売却価額が同額なので、売却損益は生じません。商品以外の売却代金の未収分は未収入金で処理します。"},{"c":"仕訳","t":"債権・債務","q":"取引先への貸付金¥800,000のうち、¥500,000を現金で回収した。","ch":["(借)現金 500,000 ／ (貸)貸付金 500,000","(借)現金 800,000 ／ (貸)貸付金 800,000","(借)貸付金 500,000 ／ (貸)現金 500,000","(借)現金 500,000 ／ (貸)借入金 500,000"],"e":"回収した¥500,000の分だけ貸付金(資産)を減らします。貸付金の残高は¥300,000となります。"},{"c":"仕訳","t":"債権・債務","q":"営業用車両の車検を業者に依頼し、車検費用¥45,000は月末に支払うこととした。なお、車検費用は車両の現状を維持するための支出である。","ch":["(借)修繕費 45,000 ／ (貸)未払金 45,000","(借)車両運搬具 45,000 ／ (貸)未払金 45,000","(借)修繕費 45,000 ／ (貸)買掛金 45,000","(借)租税公課 45,000 ／ (貸)未払金 45,000"],"e":"現状維持のための車検費用は収益的支出なので修繕費(費用)で処理します。サービス代金の後払いなので貸方は未払金です。"},{"c":"仕訳","t":"株式会社","q":"株式会社の設立にあたり株式を発行したとき、株主からの払込金額は原則としてどの勘定で処理するか。","ch":["資本金","繰越利益剰余金","利益準備金","借入金"],"e":"株式の発行による払込金額は、原則として全額を資本金(純資産)とします。繰越利益剰余金や利益準備金は利益から生じる純資産の勘定です。"},{"c":"仕訳","t":"株式会社","q":"会社の設立にあたり、株式150株を1株につき¥40,000で発行し、全株式の払込みを受けた。払込金額の全額を資本金とした場合、資本金の増加額はいくらか。","ch":["¥6,000,000","¥4,000,000","¥600,000","¥1,500,000"],"e":"150株×@40,000=¥6,000,000です。株数と1株あたりの金額の掛け算を落ち着いて行いましょう。"},{"c":"仕訳","t":"株式会社","q":"株主総会で繰越利益剰余金からの配当が決議されたとき、配当額を貸方に記入する勘定として正しいものはどれか。","ch":["未払配当金","現金","繰越利益剰余金","資本金"],"e":"決議の時点ではまだ支払っていないため、株主に支払う義務を表す未払配当金(負債)を貸方に計上します。現金が動くのは実際に支払ったときです。"},{"c":"仕訳","t":"株式会社","q":"「利益準備金」は簿記の5要素のうちどれに分類されるか。","ch":["純資産","負債","収益","資産"],"e":"利益準備金は、配当の際に会社法の定めにより積み立てる純資産の勘定です。資本金・繰越利益剰余金と同じ純資産の区分に属します。"},{"c":"仕訳","t":"株式会社","q":"決算の結果、当期純損失を計上した場合の繰越利益剰余金勘定への記入として正しいものはどれか。","ch":["借方に記入され、残高が減少する","貸方に記入され、残高が増加する","記入されない","資本金勘定へ振り替えられる"],"e":"純損失は損益勘定から繰越利益剰余金勘定の借方へ振り替えられ、残高を減らします。純利益の場合(貸方に記入)と逆になります。"},{"c":"仕訳","t":"株式会社","q":"次の取引のうち、資本金勘定が増加するものはどれか。","ch":["増資により株式を発行し、払込みを受けた","株主総会で剰余金の配当が決議された","決算で当期純利益を計上した","銀行から資金を借り入れた"],"e":"資本金が増えるのは株式の発行(設立・増資)のときです。当期純利益は繰越利益剰余金を増やし、資本金は変わりません。"},{"c":"仕訳","t":"株式会社","q":"繰越利益剰余金の期首残高は¥350,000であった。当期中に配当¥100,000と利益準備金の積立て¥10,000を行い、決算で当期純利益¥200,000を計上した。繰越利益剰余金の期末残高はいくらか。","ch":["¥440,000","¥450,000","¥550,000","¥340,000"],"e":"350,000−100,000−10,000+200,000=¥440,000です。配当だけでなく利益準備金の積立ても繰越利益剰余金を減らすことに注意しましょう。"},{"c":"仕訳","t":"株式会社","q":"会社の設立にあたり、株式100株を1株につき¥30,000で発行し、払込金のうち¥2,000,000は当座預金、¥1,000,000は普通預金とした。なお、払込金額の全額を資本金とする。","ch":["(借)当座預金 2,000,000、普通預金 1,000,000 ／ (貸)資本金 3,000,000","(借)当座預金 3,000,000 ／ (貸)資本金 3,000,000","(借)資本金 3,000,000 ／ (貸)当座預金 2,000,000、普通預金 1,000,000","(借)当座預金 2,000,000、普通預金 1,000,000 ／ (貸)借入金 3,000,000"],"e":"100株×@30,000=¥3,000,000を資本金とし、借方は入金された口座ごとに分けて記入します。"},{"c":"仕訳","t":"証ひょう","q":"商品を仕入れ、次の納品書兼請求書を受け取った。「H商品 30個 @¥400 ¥12,000、I商品 10個 @¥800 ¥8,000、送料 ¥1,000、合計 ¥21,000。代金は月末までにお支払いください」。適切な仕訳はどれか。","ch":["(借)仕入 21,000 ／ (貸)買掛金 21,000","(借)仕入 20,000、発送費 1,000 ／ (貸)買掛金 21,000","(借)仕入 20,000 ／ (貸)買掛金 20,000","(借)仕入 21,000 ／ (貸)未払金 21,000"],"e":"送料は仕入諸掛として仕入の金額に含めるため、仕入は¥21,000です。商品代金の後払いなので貸方は買掛金とし、送料分もまとめて先方に支払います。"},{"c":"仕訳","t":"証ひょう","q":"本日の売上集計表は次のとおりであった。「現金売上 ¥40,000、クレジットカード売上 ¥60,000、合計 ¥100,000」。なお、クレジットカード売上については、信販会社への手数料(3%)を販売時に計上する。適切な仕訳はどれか。","ch":["(借)現金 40,000、クレジット売掛金 58,200、支払手数料 1,800 ／ (貸)売上 100,000","(借)現金 40,000、クレジット売掛金 60,000 ／ (貸)売上 100,000","(借)現金 40,000、クレジット売掛金 58,200 ／ (貸)売上 98,200","(借)現金 40,000、売掛金 58,200、支払手数料 1,800 ／ (貸)売上 100,000"],"e":"売上は総額¥100,000で計上します。手数料は60,000×3%=¥1,800で、クレジット売掛金は手数料を差し引いた¥58,200です。"},{"c":"仕訳","t":"証ひょう","q":"取引銀行から送付された当座勘定照合表に「○月25日 お引出し 電子記録債務決済 ¥180,000」との記載があった。適切な仕訳はどれか。","ch":["(借)電子記録債務 180,000 ／ (貸)当座預金 180,000","(借)当座預金 180,000 ／ (貸)電子記録債務 180,000","(借)電子記録債権 180,000 ／ (貸)当座預金 180,000","(借)買掛金 180,000 ／ (貸)当座預金 180,000"],"e":"電子記録債務の支払期日が到来し、当座預金から決済された取引です。債務が消滅するので電子記録債務を借方に記入します。"},{"c":"仕訳","t":"証ひょう","q":"取引銀行から送付された当座勘定照合表に「○月28日 お預入れ 電子記録債権入金 ¥220,000」との記載があった。適切な仕訳はどれか。","ch":["(借)当座預金 220,000 ／ (貸)電子記録債権 220,000","(借)電子記録債権 220,000 ／ (貸)当座預金 220,000","(借)当座預金 220,000 ／ (貸)電子記録債務 220,000","(借)当座預金 220,000 ／ (貸)売掛金 220,000"],"e":"電子記録債権の支払期日が到来し、当座預金に入金された取引です。債権(資産)が消滅するので電子記録債権を貸方に記入します。"},{"c":"仕訳","t":"証ひょう","q":"家具店で事務用の机を購入し、次の領収書を受け取った。「事務机 ¥95,000、配送・組立料 ¥5,000、合計 ¥100,000。上記金額を現金にて領収いたしました」。適切な仕訳はどれか。","ch":["(借)備品 100,000 ／ (貸)現金 100,000","(借)備品 95,000、発送費 5,000 ／ (貸)現金 100,000","(借)消耗品費 100,000 ／ (貸)現金 100,000","(借)備品 95,000 ／ (貸)現金 95,000"],"e":"事務机は備品で処理し、配送・組立料は使用可能にするための付随費用として取得原価に含めます。合計¥100,000が備品の金額です。"},{"c":"仕訳","t":"証ひょう","q":"当月の給与支給明細書は次のとおりであり、差引支給額を当座預金口座から従業員の口座へ振り込んだ。「支給総額 ¥350,000、控除: 所得税 ¥14,000・住民税 ¥21,000・社会保険料 ¥24,000、差引支給額 ¥291,000」。適切な仕訳はどれか。","ch":["(借)給料 350,000 ／ (貸)所得税預り金 14,000、住民税預り金 21,000、社会保険料預り金 24,000、当座預金 291,000","(借)給料 291,000 ／ (貸)当座預金 291,000","(借)給料 350,000 ／ (貸)法定福利費 59,000、当座預金 291,000","(借)給料 350,000 ／ (貸)所得税預り金 59,000、当座預金 291,000"],"e":"給料は支給総額¥350,000で計上し、控除額はそれぞれの預り金(負債)に分けます。差引支給額¥291,000が当座預金からの振込額です。"},{"c":"仕訳","t":"証ひょう","q":"商品を仕入れ、次の請求書を受け取った。「J商品 25個 @¥2,000 ¥50,000、消費税 ¥5,000、合計 ¥55,000。代金は月末までにお支払いください」。消費税は税抜方式で記帳している。適切な仕訳はどれか。","ch":["(借)仕入 50,000、仮払消費税 5,000 ／ (貸)買掛金 55,000","(借)仕入 55,000 ／ (貸)買掛金 55,000","(借)仕入 50,000、仮受消費税 5,000 ／ (貸)買掛金 55,000","(借)仕入 50,000 ／ (貸)買掛金 50,000"],"e":"税抜方式では、仕入は本体価格¥50,000で計上し、支払う消費税¥5,000は仮払消費税(資産)とします。買掛金は税込の¥55,000です。"},{"c":"仕訳","t":"証ひょう","q":"商工会議所から次の振込依頼書を受け取り、普通預金口座から振り込んだ。「年会費 ¥12,000。下記口座へお振込みください」。適切な仕訳はどれか。","ch":["(借)諸会費 12,000 ／ (貸)普通預金 12,000","(借)支払手数料 12,000 ／ (貸)普通預金 12,000","(借)租税公課 12,000 ／ (貸)普通預金 12,000","(借)雑損 12,000 ／ (貸)普通預金 12,000"],"e":"商工会議所や同業者団体などの会費は諸会費(費用)で処理します。手数料や税金ではない点に注意しましょう。"},{"c":"仕訳","t":"証ひょう","q":"得意先に商品を売り上げ、次の請求書(控)を発行した。「K商品 40個 @¥1,500 ¥60,000、送料 ¥2,000、合計 ¥62,000。代金は月末までにお支払いください」。なお、送料¥2,000は配送業者に現金で支払済みである。適切な仕訳はどれか。","ch":["(借)売掛金 62,000、発送費 2,000 ／ (貸)売上 62,000、現金 2,000","(借)売掛金 60,000、発送費 2,000 ／ (貸)売上 60,000、現金 2,000","(借)売掛金 62,000 ／ (貸)売上 60,000、現金 2,000","(借)売掛金 60,000、立替金 2,000 ／ (貸)売上 60,000、現金 2,000"],"e":"送料込みの合計額で請求しているため、売上・売掛金とも¥62,000で計上します。支払った送料は発送費(費用)として処理します。"},{"c":"仕訳","t":"証ひょう","q":"インターネットバンキングの出金明細に次の記載があった。「お振込 従業員給料 ¥280,000」「振込手数料 ¥550」。なお、この給料に控除項目はない。適切な仕訳はどれか。","ch":["(借)給料 280,000、支払手数料 550 ／ (貸)普通預金 280,550","(借)給料 280,550 ／ (貸)普通預金 280,550","(借)給料 280,000 ／ (貸)普通預金 280,000","(借)給料 280,000、支払手数料 550 ／ (貸)当座預金 280,550"],"e":"給料¥280,000と振込手数料¥550は別の費用として計上します。手数料を給料に含めないよう注意しましょう。"},{"c":"仕訳","t":"証ひょう","q":"文具店で次のレシートを受け取り、代金は現金で支払った。「コピー用紙 ¥2,000、プリンターインク ¥6,000、合計 ¥8,000」。なお、購入時に費用として処理している。適切な仕訳はどれか。","ch":["(借)消耗品費 8,000 ／ (貸)現金 8,000","(借)備品 8,000 ／ (貸)現金 8,000","(借)通信費 8,000 ／ (貸)現金 8,000","(借)雑費 8,000 ／ (貸)現金 8,000"],"e":"コピー用紙やインクなど、使うとなくなる事務用品は消耗品費で処理します。"},{"c":"仕訳","t":"証ひょう","q":"出張から戻った従業員が次の旅費精算書を提出したので、全額を現金で支払った。「電車賃 ¥3,500、バス代 ¥800、宿泊費 ¥9,700、合計 ¥14,000」。なお、従業員が立替払いしていた。適切な仕訳はどれか。","ch":["(借)旅費交通費 14,000 ／ (貸)現金 14,000","(借)旅費交通費 14,000 ／ (貸)仮払金 14,000","(借)立替金 14,000 ／ (貸)現金 14,000","(借)旅費交通費 4,300、雑費 9,700 ／ (貸)現金 14,000"],"e":"電車賃・バス代・宿泊費はすべて旅費交通費で処理します。従業員の立替払いを現金で精算しているので、貸方は現金です(概算払いをしていた場合は仮払金)。"},{"c":"仕訳","t":"頻出総合","q":"決算日において、未使用の郵便切手¥2,000と収入印紙¥5,000があることが判明したため、適切な勘定へ振り替える。なお、いずれも購入時に費用として処理している。","ch":["(借)貯蔵品 7,000 ／ (貸)通信費 2,000、租税公課 5,000","(借)貯蔵品 7,000 ／ (貸)通信費 5,000、租税公課 2,000","(借)通信費 2,000、租税公課 5,000 ／ (貸)貯蔵品 7,000","(借)消耗品費 7,000 ／ (貸)通信費 2,000、租税公課 5,000"],"e":"未使用分は貯蔵品(資産)へ振り替えます。切手は通信費から¥2,000、収入印紙は租税公課から¥5,000と、それぞれの費用勘定から減らします。"},{"c":"仕訳","t":"頻出総合","q":"かねてクレジット払いで販売した商品について、信販会社から手数料控除後の¥117,600が普通預金口座に入金された。","ch":["(借)普通預金 117,600 ／ (貸)クレジット売掛金 117,600","(借)普通預金 117,600 ／ (貸)売掛金 117,600","(借)普通預金 117,600 ／ (貸)売上 117,600","(借)普通預金 117,600、支払手数料 2,400 ／ (貸)クレジット売掛金 120,000"],"e":"手数料は販売時に計上済みなので、入金時は帳簿上のクレジット売掛金¥117,600を取り崩すだけです。入金時に再度手数料を計上しないよう注意しましょう。"},{"c":"仕訳","t":"頻出総合","q":"事務所の賃貸借契約を解約し、差し入れていた敷金¥180,000の全額が普通預金口座に返金された。","ch":["(借)普通預金 180,000 ／ (貸)差入保証金 180,000","(借)普通預金 180,000 ／ (貸)支払家賃 180,000","(借)差入保証金 180,000 ／ (貸)普通預金 180,000","(借)普通預金 180,000 ／ (貸)受取家賃 180,000"],"e":"敷金の差入時に計上した差入保証金(資産)が、返金により消滅します。全額返金なので費用や収益は生じません。"},{"c":"仕訳","t":"頻出総合","q":"仕入先に対する買掛金¥250,000について、取引銀行を通じて電子記録債務の発生記録を行った。","ch":["(借)買掛金 250,000 ／ (貸)電子記録債務 250,000","(借)電子記録債務 250,000 ／ (貸)買掛金 250,000","(借)買掛金 250,000 ／ (貸)電子記録債権 250,000","(借)仕入 250,000 ／ (貸)電子記録債務 250,000"],"e":"発生記録により、買掛金という債務が電子記録債務という債務に置き換わります。支払う側なので「債務」を使います。"},{"c":"仕訳","t":"頻出総合","q":"当座預金の残高が¥10,000のとき、水道光熱費¥15,000が当座預金口座から引き落とされた。なお、取引銀行と借越限度額¥500,000の当座借越契約を結んでおり、期中の取引はすべて当座預金勘定で処理している。","ch":["(借)水道光熱費 15,000 ／ (貸)当座預金 15,000","(借)水道光熱費 15,000 ／ (貸)当座預金 10,000、当座借越 5,000","(借)水道光熱費 15,000 ／ (貸)当座預金 10,000、借入金 5,000","(借)水道光熱費 10,000 ／ (貸)当座預金 10,000"],"e":"期中は残高を超えて引き落とされても、全額を当座預金勘定の貸方に記入します。貸方残高となった分は決算時にまとめて当座借越(または借入金)へ振り替えます。"},{"c":"決算","t":"決算整理仕訳","q":"決算にあたり、売上原価を売上原価勘定で算定する方法によっている。期首商品棚卸高は¥60,000であった。期首商品に関する決算整理仕訳として正しいものはどれか。","ch":["(借)売上原価 60,000 ／ (貸)繰越商品 60,000","(借)仕入 60,000 ／ (貸)繰越商品 60,000","(借)繰越商品 60,000 ／ (貸)売上原価 60,000","(借)売上原価 60,000 ／ (貸)仕入 60,000"],"e":"売上原価勘定で算定する方法では、期首商品を繰越商品勘定から売上原価勘定の借方へ振り替えます。仕入勘定を使う方法との違いに注意しましょう。"},{"c":"決算","t":"決算整理仕訳","q":"決算にあたり、売上原価を売上原価勘定で算定する方法によっている。当期商品仕入高は¥700,000であった。仕入勘定の残高を振り替える決算整理仕訳として正しいものはどれか。","ch":["(借)売上原価 700,000 ／ (貸)仕入 700,000","(借)仕入 700,000 ／ (貸)売上原価 700,000","(借)売上原価 700,000 ／ (貸)繰越商品 700,000","(借)損益 700,000 ／ (貸)仕入 700,000"],"e":"売上原価勘定で算定する方法では、当期仕入高も仕入勘定から売上原価勘定の借方へ振り替えます。損益勘定への振替は締切時の手続きなので区別しましょう。"},{"c":"決算","t":"決算整理仕訳","q":"当期の売上原価は¥520,000、期首商品棚卸高は¥60,000、当期商品仕入高は¥540,000であった。期末商品棚卸高はいくらか。","ch":["¥80,000","¥40,000","¥100,000","¥20,000"],"e":"売上原価＝期首＋仕入−期末の式を変形して、期末＝60,000＋540,000−520,000＝80,000です。式を逆算できるようにしておきましょう。"},{"c":"決算","t":"決算整理仕訳","q":"決算整理前の仕入勘定の残高は¥700,000(借方)である。期首商品棚卸高¥40,000、期末商品棚卸高¥60,000として売上原価を仕入勘定で算定した場合、決算整理後の仕入勘定の残高はいくらか。","ch":["¥680,000","¥720,000","¥700,000","¥740,000"],"e":"整理後の仕入勘定残高は売上原価を表します。700,000＋40,000−60,000＝680,000です。期首を加え期末を差し引く点に注意しましょう。"},{"c":"決算","t":"決算整理仕訳","q":"決算にあたり、売掛金残高¥450,000に対して2%の貸倒引当金を差額補充法により設定する。貸倒引当金の決算整理前残高は¥9,000である。決算整理として正しいものはどれか。","ch":["仕訳は不要である","(借)貸倒引当金繰入 9,000 ／ (貸)貸倒引当金 9,000","(借)貸倒引当金 9,000 ／ (貸)貸倒引当金戻入 9,000","(借)貸倒引当金繰入 18,000 ／ (貸)貸倒引当金 18,000"],"e":"見積額は450,000×2%＝9,000で、決算整理前残高9,000とちょうど一致します。差額補充法では差額がゼロなので仕訳は不要です。"},{"c":"決算","t":"決算整理仕訳","q":"決算にあたり、受取手形¥300,000と売掛金¥500,000の期末残高合計に対して2%の貸倒引当金を差額補充法で設定する。貸倒引当金の決算整理前残高は¥6,000である。正しい仕訳はどれか。","ch":["(借)貸倒引当金繰入 10,000 ／ (貸)貸倒引当金 10,000","(借)貸倒引当金繰入 16,000 ／ (貸)貸倒引当金 16,000","(借)貸倒引当金繰入 4,000 ／ (貸)貸倒引当金 4,000","(借)貸倒引当金 10,000 ／ (貸)貸倒引当金繰入 10,000"],"e":"見積額は(300,000＋500,000)×2%＝16,000。差額補充法なので16,000−6,000＝10,000を繰り入れます。売掛金だけで計算しないよう注意しましょう。"},{"c":"決算","t":"決算整理仕訳","q":"決算にあたり、売掛金残高¥700,000に対して3%の貸倒引当金を差額補充法で設定した。貸倒引当金の決算整理前残高は¥8,000であった。決算整理後の貸倒引当金勘定の残高はいくらか。","ch":["¥21,000","¥13,000","¥8,000","¥29,000"],"e":"整理後の残高は見積額そのものになります。700,000×3%＝21,000です。13,000は繰入額(21,000−8,000)であり、残高と混同しないようにしましょう。"},{"c":"決算","t":"決算整理仕訳","q":"決算にあたり、売掛金残高¥400,000に対して1%の貸倒引当金を設定する。貸倒引当金の決算整理前残高は¥6,500である。貸倒引当金戻入として計上される金額はいくらか。","ch":["¥2,500","¥4,000","¥6,500","¥10,500"],"e":"見積額は400,000×1%＝4,000。残高6,500の方が多いので、差額6,500−4,000＝2,500を貸倒引当金戻入(収益)とします。"},{"c":"決算","t":"決算整理仕訳","q":"当期の1月1日に建物¥3,600,000(耐用年数20年、残存価額ゼロ)を取得し、直ちに使用を開始した。決算日(3月31日)における定額法・間接法による減価償却の仕訳として正しいものはどれか。","ch":["(借)減価償却費 45,000 ／ (貸)建物減価償却累計額 45,000","(借)減価償却費 180,000 ／ (貸)建物減価償却累計額 180,000","(借)減価償却費 60,000 ／ (貸)建物減価償却累計額 60,000","(借)減価償却費 45,000 ／ (貸)建物 45,000"],"e":"年間償却費は3,600,000÷20年＝180,000。1月〜3月の3か月分を月割りして180,000×3/12＝45,000です。間接法なので貸方は累計額勘定を使います。"},{"c":"決算","t":"決算整理仕訳","q":"当期の7月1日に備品¥800,000(耐用年数6年、残存価額は取得原価の10%)を取得した。決算日(3月31日)における定額法による当期の減価償却費はいくらか。","ch":["¥90,000","¥120,000","¥100,000","¥60,000"],"e":"年間償却費は(800,000−80,000)÷6年＝120,000。7月〜3月の9か月分なので120,000×9/12＝90,000です。残存価額の控除と月割りの両方を忘れないようにしましょう。"},{"c":"決算","t":"決算整理仕訳","q":"前期の期首に取得した備品(取得原価¥750,000、耐用年数5年、残存価額ゼロ、定額法・間接法)について当期の決算整理を行った。決算整理後の備品減価償却累計額勘定の残高はいくらか。","ch":["¥300,000","¥150,000","¥450,000","¥750,000"],"e":"年間償却費は750,000÷5年＝150,000。前期分と当期分の2年分が累計されるので150,000×2＝300,000です。累計額は毎期積み上がっていきます。"},{"c":"決算","t":"決算整理仕訳","q":"事務所の家賃は毎月¥60,000で、翌月初めに支払う契約である。決算日(3月31日)時点で3月分の家賃が未払いとなっている。決算整理仕訳として正しいものはどれか。","ch":["(借)支払家賃 60,000 ／ (貸)未払家賃 60,000","(借)未払家賃 60,000 ／ (貸)支払家賃 60,000","(借)前払家賃 60,000 ／ (貸)支払家賃 60,000","(借)支払家賃 60,000 ／ (貸)現金 60,000"],"e":"3月分の家賃はまだ支払っていなくても当期の費用なので、支払家賃を計上し、相手科目は未払家賃(負債)とします。"},{"c":"決算","t":"決算整理仕訳","q":"当期の12月1日に土地を貸し付けた。地代は半年分¥90,000を毎年5月末と11月末に後払いで受け取る契約である。決算日(3月31日)の決算整理仕訳として正しいものはどれか。","ch":["(借)未収地代 60,000 ／ (貸)受取地代 60,000","(借)受取地代 60,000 ／ (貸)未収地代 60,000","(借)未収地代 90,000 ／ (貸)受取地代 90,000","(借)前受地代 60,000 ／ (貸)受取地代 60,000"],"e":"12月〜3月の4か月分はまだ受け取っていなくても当期の収益です。90,000×4/6＝60,000を未収地代(資産)として計上します。"},{"c":"決算","t":"決算整理仕訳","q":"保険料は毎年8月1日に向こう1年分¥144,000を支払っている。当期首に前期末計上分の再振替を行っており、決算整理前の保険料勘定の残高は¥192,000(16か月分)である。決算日(3月31日)の決算整理仕訳として正しいものはどれか。","ch":["(借)前払保険料 48,000 ／ (貸)保険料 48,000","(借)前払保険料 96,000 ／ (貸)保険料 96,000","(借)保険料 48,000 ／ (貸)前払保険料 48,000","(借)前払保険料 144,000 ／ (貸)保険料 144,000"],"e":"翌期分は4月〜7月の4か月です。月額は144,000÷12＝12,000なので、12,000×4か月＝48,000を前払保険料として繰り延べます。当期の費用はちょうど12か月分144,000になります。"},{"c":"決算","t":"決算整理仕訳","q":"当期の12月1日に向こう6か月分の家賃¥180,000を支払い、全額を支払家賃勘定で処理している。決算日(3月31日)の決算整理仕訳として正しいものはどれか。","ch":["(借)前払家賃 60,000 ／ (貸)支払家賃 60,000","(借)前払家賃 120,000 ／ (貸)支払家賃 120,000","(借)支払家賃 60,000 ／ (貸)前払家賃 60,000","(借)前払家賃 90,000 ／ (貸)支払家賃 90,000"],"e":"6か月分のうち当期分は12月〜3月の4か月、翌期分は4月・5月の2か月です。180,000×2/6＝60,000を前払家賃として繰り延べます。1年分ではなく6か月分である点に注意しましょう。"},{"c":"決算","t":"決算整理仕訳","q":"前期末の決算で未収利息¥9,000を計上している。当期首(4月1日)に行う再振替仕訳として正しいものはどれか。","ch":["(借)受取利息 9,000 ／ (貸)未収利息 9,000","(借)未収利息 9,000 ／ (貸)受取利息 9,000","(借)現金 9,000 ／ (貸)未収利息 9,000","(借)受取利息 9,000 ／ (貸)前受利息 9,000"],"e":"再振替仕訳は前期末の仕訳(借方 未収利息／貸方 受取利息)の貸借を逆にしたものです。これにより当期の受取時に全額を収益計上しても二重計上になりません。"},{"c":"決算","t":"決算整理仕訳","q":"前期末の決算で前受地代¥24,000を計上している。当期首(4月1日)に行う再振替仕訳として正しいものはどれか。","ch":["(借)前受地代 24,000 ／ (貸)受取地代 24,000","(借)受取地代 24,000 ／ (貸)前受地代 24,000","(借)前受地代 24,000 ／ (貸)現金 24,000","(借)未収地代 24,000 ／ (貸)受取地代 24,000"],"e":"前期末の仕訳(借方 受取地代／貸方 前受地代)の逆仕訳を期首に行い、前受分を当期の収益に振り戻します。"},{"c":"決算","t":"決算整理仕訳","q":"決算日に現金の実査を行ったところ、実際有高が帳簿残高より¥3,000少なかった。調査の結果、¥2,000は通信費の記帳漏れと判明したが、残額は原因不明である。決算整理仕訳として正しいものはどれか。","ch":["(借)通信費 2,000、雑損 1,000 ／ (貸)現金 3,000","(借)雑損 3,000 ／ (貸)現金 3,000","(借)通信費 2,000、雑益 1,000 ／ (貸)現金 3,000","(借)現金 3,000 ／ (貸)通信費 2,000、雑益 1,000"],"e":"不足額3,000のうち判明した2,000は通信費に、原因不明の1,000は雑損に計上し、現金勘定を実際有高に合わせます。"},{"c":"決算","t":"決算整理仕訳","q":"期中に計上した現金過不足勘定の借方残高¥5,000について、決算日に調査したところ¥4,000は水道光熱費の記入漏れと判明したが、残額は原因不明であった。決算整理仕訳として正しいものはどれか。","ch":["(借)水道光熱費 4,000、雑損 1,000 ／ (貸)現金過不足 5,000","(借)水道光熱費 4,000 ／ (貸)現金過不足 4,000","(借)雑損 5,000 ／ (貸)現金過不足 5,000","(借)現金過不足 5,000 ／ (貸)水道光熱費 4,000、雑益 1,000"],"e":"判明分4,000は水道光熱費へ、原因不明の残り1,000は雑損へ振り替え、現金過不足勘定の残高をゼロにして決算を迎えます。"},{"c":"決算","t":"決算整理仕訳","q":"決算日において、期中に内容不明の入金として処理していた仮受金¥50,000は、得意先からの売掛金の回収であることが判明した。決算における仕訳として正しいものはどれか。","ch":["(借)仮受金 50,000 ／ (貸)売掛金 50,000","(借)売掛金 50,000 ／ (貸)仮受金 50,000","(借)仮受金 50,000 ／ (貸)前受金 50,000","(借)現金 50,000 ／ (貸)売掛金 50,000"],"e":"内容が判明したら仮受金(負債)を取り崩し、正しい科目である売掛金の減少に振り替えます。入金自体は処理済みなので現金は動きません。"},{"c":"決算","t":"勘定の締切","q":"決算にあたり、支払家賃勘定の残高¥120,000と水道光熱費勘定の残高¥80,000をまとめて損益勘定へ振り替える仕訳として正しいものはどれか。","ch":["(借)損益 200,000 ／ (貸)支払家賃 120,000、水道光熱費 80,000","(借)支払家賃 120,000、水道光熱費 80,000 ／ (貸)損益 200,000","(借)損益 200,000 ／ (貸)支払家賃 80,000、水道光熱費 120,000","(借)繰越利益剰余金 200,000 ／ (貸)支払家賃 120,000、水道光熱費 80,000"],"e":"費用の勘定は貸方に記入して残高をゼロにし、損益勘定の借方へ振り替えます。複数の費用をまとめて1本の仕訳にすることもできます。"},{"c":"決算","t":"勘定の締切","q":"建物勘定(借方残高¥2,000,000)を英米式決算法により「次期繰越」と記入して締め切った。翌期首に建物勘定の借方に記入する語句と金額の組み合わせとして正しいものはどれか。","ch":["前期繰越 2,000,000","次期繰越 2,000,000","損益 2,000,000","開始残高 2,000,000"],"e":"翌期首には前期から引き継いだ残高を「前期繰越」として元の残高側(資産なら借方)に記入します。これを開始記入といいます。"},{"c":"決算","t":"勘定の締切","q":"決算日における借入金勘定の貸方残高は¥400,000であった。英米式決算法により借入金勘定を締め切るとき、借方に記入する語句と金額の組み合わせとして正しいものはどれか。","ch":["次期繰越 400,000","前期繰越 400,000","損益 400,000","支払利息 400,000"],"e":"負債の勘定は損益勘定へ振り替えず、残高のある貸方と反対側の借方に「次期繰越」と記入して締め切ります。"},{"c":"決算","t":"勘定の締切","q":"次の勘定のうち、決算において損益勘定に記入されないものはどれか。","ch":["売掛金","仕入","減価償却費","受取手数料"],"e":"損益勘定に振り替えるのは収益と費用の勘定だけです。売掛金は資産の勘定なので、次期繰越として締め切ります。"},{"c":"決算","t":"勘定の締切","q":"英米式決算法において、各勘定の締切後に繰越試算表を作成する目的として正しいものはどれか。","ch":["資産・負債・純資産の繰越記入が正しく行われたかを確かめるため","当期純利益の金額を計算するため","収益と費用の勘定を締め切るため","仕訳帳の記入漏れを発見するため"],"e":"繰越試算表は各勘定の次期繰越額を集めた表で、貸借が一致することで繰越記入の正確性を確認できます。損益の計算は損益勘定の役割です。"},{"c":"決算","t":"精算表・財務諸表","q":"精算表において、貸倒引当金は残高試算表欄の貸方に¥3,000、修正記入欄の貸方に¥5,000が記入されている。貸借対照表欄に記入される貸倒引当金の金額はいくらか。","ch":["¥8,000","¥2,000","¥5,000","¥3,000"],"e":"同じ貸方どうしは合計します。3,000＋5,000＝8,000が貸借対照表欄の貸方に記入されます。差し引いてしまう間違いに注意しましょう。"},{"c":"決算","t":"精算表・財務諸表","q":"精算表において、繰越商品は残高試算表欄の借方に¥45,000、修正記入欄の借方に¥55,000と貸方に¥45,000が記入されている。貸借対照表欄に記入される繰越商品の金額はいくらか。","ch":["¥55,000","¥45,000","¥100,000","¥10,000"],"e":"45,000(借方)−45,000(貸方)＋55,000(借方)＝55,000です。決算整理により繰越商品の残高は期末商品棚卸高の55,000になります。"},{"c":"決算","t":"精算表・財務諸表","q":"精算表において、仕入は残高試算表欄の借方に¥620,000、修正記入欄の借方に¥45,000と貸方に¥55,000が記入されている。損益計算書欄に記入される仕入(売上原価)の金額はいくらか。","ch":["¥610,000","¥630,000","¥620,000","¥720,000"],"e":"620,000＋45,000(期首商品)−55,000(期末商品)＝610,000です。これが当期の売上原価として損益計算書欄の借方に移ります。"},{"c":"決算","t":"精算表・財務諸表","q":"決算整理前の収益合計は¥2,000,000、費用合計は¥1,700,000であった。決算整理により減価償却費¥50,000と貸倒引当金繰入¥10,000を追加計上した。当期純利益はいくらか。","ch":["¥240,000","¥300,000","¥360,000","¥250,000"],"e":"整理前の利益300,000から追加の費用60,000を差し引き、2,000,000−(1,700,000＋50,000＋10,000)＝240,000です。決算整理の費用を忘れないようにしましょう。"},{"c":"決算","t":"精算表・財務諸表","q":"決算整理で計上した未払家賃(未払費用)は、財務諸表のどこに表示されるか。","ch":["貸借対照表の負債の部","貸借対照表の資産の部","損益計算書の費用","貸借対照表の純資産の部"],"e":"未払家賃は当期の費用をまだ支払っていない義務を表すので、負債として貸借対照表に表示されます。費用として表示されるのは支払家賃の方です。"},{"c":"決算","t":"精算表・財務諸表","q":"精算表で当期純損失が生じた場合、その金額が記入される欄の組み合わせとして正しいものはどれか。","ch":["損益計算書欄の貸方と貸借対照表欄の借方","損益計算書欄の借方と貸借対照表欄の貸方","損益計算書欄の貸方と貸借対照表欄の貸方","修正記入欄の借方と貸方"],"e":"純損失は費用が収益を上回った状態なので、損益計算書欄では貸方に、貸借対照表欄では純資産の減少として借方に記入されます。純利益のときと逆になります。"},{"c":"決算","t":"精算表・財務諸表","q":"期首商品棚卸高は¥70,000、当期商品仕入高は¥900,000、期末商品棚卸高は¥50,000、当期の売上高は¥1,200,000であった。売上総利益はいくらか。","ch":["¥280,000","¥300,000","¥260,000","¥920,000"],"e":"売上原価＝70,000＋900,000−50,000＝920,000。売上総利益＝1,200,000−920,000＝280,000です。"},{"c":"決算","t":"精算表・財務諸表","q":"精算表において、備品減価償却累計額は残高試算表欄の貸方に¥200,000、修正記入欄の貸方に¥100,000が記入されている。貸借対照表欄に記入される備品減価償却累計額の金額はいくらか。","ch":["¥300,000","¥100,000","¥200,000","¥400,000"],"e":"累計額は毎期の償却費が積み上がる勘定なので、貸方どうしを合計して200,000＋100,000＝300,000です。"},{"c":"決算","t":"精算表・財務諸表","q":"決算整理後の残高は、現金¥250,000、売掛金¥400,000、貸倒引当金¥8,000、繰越商品¥60,000、備品¥500,000、備品減価償却累計額¥180,000であった。貸借対照表の資産合計はいくらか。","ch":["¥1,022,000","¥1,210,000","¥1,030,000","¥1,202,000"],"e":"貸倒引当金と累計額は資産から控除します。250,000＋(400,000−8,000)＋60,000＋(500,000−180,000)＝1,022,000です。"},{"c":"決算","t":"精算表・財務諸表","q":"当期の収益合計は¥4,200,000、当期純利益は¥150,000であった。当期の費用合計はいくらか。","ch":["¥4,050,000","¥4,350,000","¥150,000","¥4,200,000"],"e":"費用合計＝収益合計−当期純利益＝4,200,000−150,000＝4,050,000です。加算してしまわないように注意しましょう。"},{"c":"決算","t":"精算表・財務諸表","q":"精算表の修正記入欄で未収利息¥4,000を計上した。この¥4,000が最終的に記入される欄として正しいものはどれか。","ch":["貸借対照表欄の借方","損益計算書欄の借方","貸借対照表欄の貸方","修正記入欄のみで完結する"],"e":"未収利息は資産の勘定なので、貸借対照表欄の借方へ移ります。相手側の受取利息(収益)は損益計算書欄の貸方に反映されます。"},{"c":"決算","t":"精算表・財務諸表","q":"決算整理後の繰越商品勘定の残高は¥80,000であった。この金額は貸借対照表にどの科目名で表示されるか。","ch":["商品","繰越商品","仕入","売上原価"],"e":"帳簿上の勘定科目は繰越商品ですが、貸借対照表では「商品」という表示科目で資産の部に記載します。"},{"c":"決算","t":"精算表・財務諸表","q":"期首の純資産は¥1,500,000、当期純利益は¥240,000、期末の資産総額は¥4,000,000であった。増資や配当はない。期末の負債総額はいくらか。","ch":["¥2,260,000","¥2,500,000","¥1,740,000","¥2,740,000"],"e":"期末純資産＝1,500,000＋240,000＝1,740,000。負債＝資産−純資産＝4,000,000−1,740,000＝2,260,000です。"},{"c":"決算","t":"精算表・財務諸表","q":"精算表の修正記入欄について、正しい記述はどれか。","ch":["借方合計と貸方合計は必ず一致する","借方合計が貸方合計より大きくなる","貸方合計が借方合計より大きくなる","合計が一致するとは限らない"],"e":"修正記入欄には決算整理仕訳が記入されます。仕訳は必ず貸借同額なので、借方合計と貸方合計は必ず一致します。"},{"c":"決算","t":"精算表・財務諸表","q":"建物(取得原価¥4,800,000、耐用年数24年、残存価額ゼロ、定額法)は期首時点で取得から2年経過しており、当期末で3年分の減価償却を行ったことになる。貸借対照表に表示される建物の帳簿価額(取得原価−減価償却累計額)はいくらか。","ch":["¥4,200,000","¥4,400,000","¥4,600,000","¥600,000"],"e":"年間償却費は4,800,000÷24年＝200,000。3年分の累計額は600,000なので、帳簿価額は4,800,000−600,000＝4,200,000です。"},{"c":"決算","t":"勘定の締切","q":"損益勘定の記入は次のとおりであった。借方: 仕入800,000・給料200,000・支払家賃150,000、貸方: 売上1,200,000・受取手数料30,000。繰越利益剰余金勘定へ振り替えられる当期純利益はいくらか。","ch":["¥80,000","¥50,000","¥110,000","¥1,230,000"],"e":"収益合計は1,200,000＋30,000＝1,230,000、費用合計は800,000＋200,000＋150,000＝1,150,000。当期純利益は1,230,000−1,150,000＝80,000です。"},{"c":"決算","t":"勘定の締切","q":"損益勘定の記入は次のとおりであった。貸方: 売上900,000・受取利息10,000、借方: 仕入600,000・給料180,000・繰越利益剰余金(金額不明)。借方の繰越利益剰余金の金額はいくらか。","ch":["¥130,000","¥120,000","¥310,000","¥110,000"],"e":"損益勘定は貸借が一致するように締め切ります。(900,000＋10,000)−(600,000＋180,000)＝130,000が当期純利益として繰越利益剰余金へ振り替えられます。"},{"c":"決算","t":"勘定の締切","q":"損益勘定の借方の最終行に「繰越利益剰余金 250,000」と記入されている。この記入が意味するものとして正しいものはどれか。","ch":["当期純利益¥250,000を繰越利益剰余金勘定へ振り替えた","当期純損失¥250,000を繰越利益剰余金勘定へ振り替えた","繰越利益剰余金¥250,000を配当した","繰越利益剰余金の期首残高が¥250,000であった"],"e":"損益勘定の借方に繰越利益剰余金とあるのは、収益が費用を上回った差額(当期純利益)を繰越利益剰余金勘定の貸方へ振り替えた記入です。"},{"c":"決算","t":"勘定の締切","q":"繰越利益剰余金勘定の記入は次のとおりであった。貸方: 前期繰越400,000・損益220,000、借方: 未払配当金100,000・利益準備金10,000・次期繰越(金額不明)。次期繰越の金額はいくらか。","ch":["¥510,000","¥620,000","¥290,000","¥400,000"],"e":"貸方合計は400,000＋220,000＝620,000、借方の配当関係は100,000＋10,000＝110,000。次期繰越は620,000−110,000＝510,000です。"},{"c":"決算","t":"勘定の締切","q":"繰越利益剰余金勘定の記入は次のとおりであった。貸方: 前期繰越300,000・損益(金額不明)、借方: 次期繰越480,000。期中に配当等は行っていない。損益勘定から振り替えられた当期純利益はいくらか。","ch":["¥180,000","¥480,000","¥300,000","¥780,000"],"e":"次期繰越480,000−前期繰越300,000＝180,000が当期純利益として損益勘定から振り替えられた金額です。"},{"c":"決算","t":"勘定の締切","q":"前払保険料勘定の記入は次のとおりであった。借方: 4月1日 前期繰越20,000、3月31日 保険料24,000。貸方: 4月1日 (相手科目不明)20,000、3月31日 次期繰越24,000。4月1日に貸方へ記入された相手科目はどれか。","ch":["保険料","損益","現金","次期繰越"],"e":"期首の4月1日には再振替仕訳(借方 保険料／貸方 前払保険料)を行うので、前払保険料勘定の貸方の相手科目は保険料です。"},{"c":"決算","t":"勘定の締切","q":"支払家賃勘定の記入は次のとおりであった。借方: 現金240,000。貸方: 3月31日 前払家賃40,000、3月31日 損益(金額不明)。損益勘定へ振り替えられた金額はいくらか。","ch":["¥200,000","¥240,000","¥280,000","¥40,000"],"e":"支払額240,000から翌期分の前払家賃40,000を差し引いた200,000が当期の費用として損益勘定へ振り替えられます。"},{"c":"決算","t":"勘定の締切","q":"受取利息勘定の記入は次のとおりであった。借方: 4月1日 未収利息6,000(再振替)。貸方: 期中 現金24,000、3月31日 未収利息8,000(決算整理)。決算で損益勘定へ振り替えられる受取利息の金額はいくらか。","ch":["¥26,000","¥24,000","¥22,000","¥38,000"],"e":"貸方合計(24,000＋8,000)−借方の再振替6,000＝26,000が当期の収益です。期首の再振替を差し引くのを忘れないようにしましょう。"},{"c":"決算","t":"勘定の締切","q":"売上勘定の記入は次のとおりであった。借方: 期中の返品30,000。貸方: 期中の売上合計1,530,000。決算で損益勘定へ振り替えられる金額はいくらか。","ch":["¥1,500,000","¥1,530,000","¥1,560,000","¥30,000"],"e":"売上勘定の残高は返品を差し引いた純売上高1,530,000−30,000＝1,500,000で、この金額が損益勘定の貸方へ振り替えられます。"},{"c":"決算","t":"勘定の締切","q":"未払給料勘定(負債)を英米式決算法により締め切る場合、「次期繰越」を記入する側として正しいものはどれか。","ch":["借方","貸方","借方と貸方の両方","損益勘定に振り替えるため記入しない"],"e":"未払給料は負債なので貸方残高です。締め切るときは残高と反対の借方に「次期繰越」と記入して貸借を一致させます。"},{"c":"決算","t":"決算整理仕訳","q":"消費税(税抜方式)について、前期の決算で計上した未払消費税¥45,000を、確定申告にあたり普通預金口座から納付した。正しい仕訳はどれか。","ch":["(借)未払消費税 45,000 ／ (貸)普通預金 45,000","(借)租税公課 45,000 ／ (貸)普通預金 45,000","(借)仮払消費税 45,000 ／ (貸)普通預金 45,000","(借)普通預金 45,000 ／ (貸)未払消費税 45,000"],"e":"決算で計上した未払消費税(負債)を納付したときは、未払消費税を借方に記入して取り崩します。費用の勘定は使いません。"},{"c":"決算","t":"決算整理仕訳","q":"税抜方式によっている。当期の売上はすべて税込¥5,500,000(消費税率10%)、仕入はすべて税込¥3,300,000であった。決算で計上される未払消費税はいくらか。","ch":["¥200,000","¥220,000","¥500,000","¥300,000"],"e":"仮受消費税は5,500,000×10/110＝500,000、仮払消費税は3,300,000×10/110＝300,000。未払消費税は500,000−300,000＝200,000です。"},{"c":"決算","t":"決算整理仕訳","q":"前期の決算で計上した未払法人税等¥90,000を、確定申告にあたり現金で納付した。正しい仕訳はどれか。","ch":["(借)未払法人税等 90,000 ／ (貸)現金 90,000","(借)法人税等 90,000 ／ (貸)現金 90,000","(借)仮払法人税等 90,000 ／ (貸)現金 90,000","(借)租税公課 90,000 ／ (貸)現金 90,000"],"e":"確定申告での納付は、決算で計上済みの未払法人税等(負債)の取り崩しです。費用(法人税等)は前期の決算ですでに計上されています。"},{"c":"決算","t":"決算整理仕訳","q":"決算にあたり、税引前当期純利益¥600,000に対して30%の法人税等を計上する。期中に中間納付額¥100,000を仮払法人税等として処理している。決算で計上される未払法人税等はいくらか。","ch":["¥80,000","¥180,000","¥100,000","¥280,000"],"e":"法人税等は600,000×30%＝180,000。中間納付分100,000を差し引いた180,000−100,000＝80,000が未払法人税等となります。"},{"c":"決算","t":"決算整理仕訳","q":"当期中に郵便切手¥80,000を購入し、全額を通信費として処理している。決算日に未使用の切手が¥12,000分残っていた。損益計算書に表示される通信費の金額はいくらか。","ch":["¥68,000","¥80,000","¥92,000","¥12,000"],"e":"未使用分12,000は貯蔵品(資産)へ振り替えるため、当期の通信費は80,000−12,000＝68,000になります。"},{"c":"決算","t":"決算整理仕訳","q":"決算日において、A銀行の当座預金勘定は¥120,000の借方残高、B銀行の当座預金勘定は¥45,000の貸方残高であった。決算整理仕訳として正しいものはどれか。","ch":["(借)当座預金 45,000 ／ (貸)借入金 45,000","(借)当座預金 120,000 ／ (貸)借入金 120,000","(借)借入金 45,000 ／ (貸)当座預金 45,000","(借)当座預金 75,000 ／ (貸)借入金 75,000"],"e":"貸方残高となっているB銀行の45,000だけを借入金へ振り替えます。A銀行の借方残高と相殺せず、それぞれ別々に処理する点に注意しましょう。"},{"c":"決算","t":"決算整理仕訳","q":"月次決算を行っており、備品の年間減価償却費の見積額¥144,000を毎月末に月割で計上している。毎月末に行う仕訳として正しいものはどれか。","ch":["(借)減価償却費 12,000 ／ (貸)備品減価償却累計額 12,000","(借)減価償却費 144,000 ／ (貸)備品減価償却累計額 144,000","(借)減価償却費 12,000 ／ (貸)備品 12,000","(借)備品減価償却累計額 12,000 ／ (貸)減価償却費 12,000"],"e":"月次決算では年間見積額144,000÷12か月＝12,000を毎月計上します。年度末にまとめて計上する方法との違いを押さえましょう。"},{"c":"決算","t":"決算整理仕訳","q":"月次決算により減価償却費を毎月¥15,000ずつ計上しており、2月末までの11か月分を計上済みである。年間の減価償却費の確定額は¥180,000であった。決算月である3月末に計上する減価償却費はいくらか。","ch":["¥15,000","¥180,000","¥165,000","¥30,000"],"e":"計上済みは15,000×11か月＝165,000なので、残り180,000−165,000＝15,000を3月末に計上します。"},{"c":"決算","t":"決算整理仕訳","q":"前期末の決算で未使用の郵便切手¥4,000を貯蔵品勘定へ振り替えている。当期首(4月1日)に行う再振替仕訳として正しいものはどれか。","ch":["(借)通信費 4,000 ／ (貸)貯蔵品 4,000","(借)貯蔵品 4,000 ／ (貸)通信費 4,000","(借)租税公課 4,000 ／ (貸)貯蔵品 4,000","(借)通信費 4,000 ／ (貸)現金 4,000"],"e":"期首に前期末の仕訳の逆仕訳を行い、貯蔵品を元の費用勘定へ戻します。郵便切手は通信費です。収入印紙(租税公課)と混同しないようにしましょう。"},{"c":"決算","t":"決算整理仕訳","q":"商品¥220,000(税込、消費税率10%)を仕入れ、代金は掛けとした。税抜方式による仕訳として正しいものはどれか。","ch":["(借)仕入 200,000、仮払消費税 20,000 ／ (貸)買掛金 220,000","(借)仕入 220,000 ／ (貸)買掛金 220,000","(借)仕入 200,000、仮受消費税 20,000 ／ (貸)買掛金 220,000","(借)仕入 220,000、仮払消費税 22,000 ／ (貸)買掛金 242,000"],"e":"税込220,000のうち本体価格は200,000、消費税は20,000です。支払った消費税は仮払消費税(資産)で処理します。"},{"c":"帳簿・理論","t":"補助簿","q":"次の取引のうち、どの補助簿にも記入されないものはどれか。","ch":["得意先から商品¥50,000の注文を受けた","商品¥50,000を現金で仕入れた","売掛金¥50,000を現金で回収した","商品¥50,000を掛けで売り上げた"],"e":"注文を受けただけでは資産や負債は増減しないため簿記上の取引にならず、帳簿には何も記入しません。"},{"c":"帳簿・理論","t":"補助簿","q":"売掛金元帳(得意先元帳)の説明として正しいものはどれか。","ch":["得意先ごとの売掛金の増減と残高を記録する補助簿","仕入先ごとの買掛金の増減と残高を記録する補助簿","売上取引の明細を発生順に記録する補助簿","すべての勘定の増減を記録する主要簿"],"e":"売掛金元帳は得意先ごとに口座を設けて売掛金を管理する補助元帳です。仕入先ごとに管理するのは買掛金元帳です。"},{"c":"帳簿・理論","t":"補助簿","q":"売掛金元帳のA商店勘定は、前月繰越¥80,000、当月の掛売上¥150,000、当月の回収¥120,000であった。月末のA商店に対する売掛金残高はいくらか。","ch":["¥110,000","¥150,000","¥50,000","¥230,000"],"e":"80,000＋150,000−120,000＝110,000です。掛売上で増加し、回収で減少します。"},{"c":"帳簿・理論","t":"補助簿","q":"買掛金元帳のB商店勘定は、前月繰越¥60,000、当月の掛仕入¥200,000、当月の支払¥180,000、仕入戻し¥10,000であった。月末のB商店に対する買掛金残高はいくらか。","ch":["¥70,000","¥80,000","¥60,000","¥90,000"],"e":"60,000＋200,000−180,000−10,000＝70,000です。仕入戻し(返品)も買掛金を減らすことを忘れないようにしましょう。"},{"c":"帳簿・理論","t":"補助簿","q":"受取手形記入帳に「摘要: 売掛金回収、金額¥100,000」という記入がある。この記入のもとになった取引の仕訳として正しいものはどれか。","ch":["(借)受取手形 100,000 ／ (貸)売掛金 100,000","(借)売掛金 100,000 ／ (貸)受取手形 100,000","(借)受取手形 100,000 ／ (貸)売上 100,000","(借)当座預金 100,000 ／ (貸)受取手形 100,000"],"e":"売掛金を手形で回収したので、受取手形(資産)が増え売掛金が減ります。摘要欄から取引の内容を読み取れるようにしましょう。"},{"c":"帳簿・理論","t":"補助簿","q":"営業用の土地¥5,000,000を購入し、代金は月末に支払うこととした。この取引で記入される補助簿として正しいものはどれか。","ch":["固定資産台帳","仕入帳と固定資産台帳","商品有高帳","当座預金出納帳と固定資産台帳"],"e":"土地は固定資産なので固定資産台帳に記入します。商品ではないので仕入帳や商品有高帳は使わず、代金も未払いなので出納帳への記入もありません。"},{"c":"帳簿・理論","t":"補助簿","q":"掛けで売り上げた商品のうち¥15,000が品違いのため返品された。この取引で記入される補助簿の組み合わせとして正しいものはどれか。","ch":["売上帳・売掛金元帳・商品有高帳","仕入帳・買掛金元帳・商品有高帳","売上帳・売掛金元帳","売上帳・現金出納帳・商品有高帳"],"e":"売上戻りは売上帳に記入し、売掛金の減少を売掛金元帳へ、商品が戻ってくるので商品有高帳の受入欄にも記入します。"},{"c":"帳簿・理論","t":"補助簿","q":"当座預金出納帳の記録によると、前月繰越¥200,000、当月の預入合計¥40,000、当月の小切手振出による引出合計¥260,000であった。月末の当座預金の状態として正しいものはどれか。","ch":["当座借越¥20,000(貸方残高)の状態である","借方残高¥20,000である","残高はちょうどゼロである","借方残高¥80,000である"],"e":"200,000＋40,000−260,000＝−20,000となり、残高を¥20,000超過して引き出した当座借越の状態です。"},{"c":"帳簿・理論","t":"商品有高帳","q":"商品有高帳を移動平均法で記帳している。月初在庫は20個(@¥400)、10日に30個(@¥450)を仕入れ、15日に30個を払い出し、25日に20個(@¥470)を仕入れた。25日の仕入直後の平均単価はいくらか。","ch":["¥450","¥440","¥460","¥430"],"e":"10日仕入後の平均単価は(20個×400＋30個×450)÷50個＝@430。払出後の残高は20個×430＝8,600で、25日仕入後は(8,600＋20個×470)÷40個＝18,000÷40＝@450です。"},{"c":"帳簿・理論","t":"商品有高帳","q":"商品有高帳を先入先出法で記帳している。月初在庫は30個(@¥80)、当月に50個(@¥90)を仕入れ、その後60個を払い出した。払出額(売上原価)はいくらか。","ch":["¥5,100","¥5,400","¥4,800","¥5,250"],"e":"先入先出法では月初の30個×80＝2,400を先に払い出し、残り30個は@90なので30個×90＝2,700。合計2,400＋2,700＝5,100です。"},{"c":"帳簿・理論","t":"商品有高帳","q":"掛けで売り上げた商品5個(原価@¥300)が返品された。商品有高帳への記入として正しいものはどれか。","ch":["受入欄に原価@¥300で記入する","払出欄に原価@¥300で記入する","受入欄に売価で記入する","商品有高帳には記入しない"],"e":"売上戻りは商品が手元に戻ってくる取引なので、受入欄に原価で記入します。商品有高帳は常に原価で記録します。"},{"c":"帳簿・理論","t":"商品有高帳","q":"商品有高帳を先入先出法で記帳している。月初在庫は10個(@¥200)、5日に40個(@¥220)を仕入れ、10日に30個を払い出し、20日に20個(@¥250)を仕入れ、25日に25個を払い出した。25日の払出額はいくらか。","ch":["¥5,650","¥6,250","¥5,500","¥5,900"],"e":"10日の払出で月初10個と@220のうち20個が出て、残りは@220が20個。25日は20個×220＝4,400と@250のうち5個×250＝1,250を払い出すので、合計5,650です。"},{"c":"帳簿・理論","t":"商品有高帳","q":"商品有高帳を移動平均法で記帳している。月初在庫は20個(@¥300)、当月に30個(@¥350)を仕入れ、その後35個を払い出した。月末在庫の金額はいくらか。","ch":["¥4,950","¥5,250","¥4,500","¥5,100"],"e":"平均単価＝(20個×300＋30個×350)÷50個＝16,500÷50＝@330。月末在庫は残り15個×330＝4,950です。"},{"c":"帳簿・理論","t":"商品有高帳","q":"商品有高帳を移動平均法で記帳している。月初在庫は10個(@¥240)、当月に30個(@¥280)を仕入れ、当月中に32個を1個あたり¥400で販売した。当月の売上総利益はいくらか。","ch":["¥4,160","¥4,480","¥3,840","¥8,640"],"e":"平均単価＝(10個×240＋30個×280)÷40個＝10,800÷40＝@270。売上原価は32個×270＝8,640、売上高は32個×400＝12,800なので、売上総利益は12,800−8,640＝4,160です。"},{"c":"帳簿・理論","t":"商品有高帳","q":"商品40個を1個あたり¥190で仕入れ、引取運賃¥400を現金で支払った。商品有高帳の受入欄に記入する単価はいくらか。","ch":["¥200","¥190","¥210","¥180"],"e":"引取運賃などの仕入諸掛は商品の取得原価に含めます。(40個×190＋400)÷40個＝8,000÷40＝@200です。"},{"c":"帳簿・理論","t":"伝票会計","q":"3伝票制を採用している。入金伝票の科目欄に「売掛金」、金額欄に「60,000」と記入されている。この伝票が表す仕訳として正しいものはどれか。","ch":["(借)現金 60,000 ／ (貸)売掛金 60,000","(借)売掛金 60,000 ／ (貸)現金 60,000","(借)売掛金 60,000 ／ (貸)売上 60,000","(借)現金 60,000 ／ (貸)売上 60,000"],"e":"入金伝票は借方が必ず現金です。科目欄の売掛金は貸方の相手科目なので、売掛金を現金で回収した仕訳になります。"},{"c":"帳簿・理論","t":"伝票会計","q":"3伝票制を採用している。出金伝票の科目欄に「消耗品費」、金額欄に「8,000」と記入されている。この伝票が表す仕訳として正しいものはどれか。","ch":["(借)消耗品費 8,000 ／ (貸)現金 8,000","(借)現金 8,000 ／ (貸)消耗品費 8,000","(借)消耗品費 8,000 ／ (貸)未払金 8,000","(借)消耗品費 8,000 ／ (貸)当座預金 8,000"],"e":"出金伝票は貸方が必ず現金です。科目欄の消耗品費は借方の相手科目なので、消耗品を現金で購入した仕訳になります。"},{"c":"帳簿・理論","t":"伝票会計","q":"商品¥90,000を仕入れ、代金のうち¥40,000は現金で支払い、残額は掛けとした。取引を分解する方法により、出金伝票に「仕入 40,000」と記入した場合、振替伝票に記入される仕訳はどれか。","ch":["(借)仕入 50,000 ／ (貸)買掛金 50,000","(借)仕入 90,000 ／ (貸)買掛金 90,000","(借)仕入 40,000 ／ (貸)現金 40,000","(借)買掛金 40,000 ／ (貸)現金 40,000"],"e":"分解する方法では、現金仕入40,000を出金伝票に、残りの掛け仕入50,000を振替伝票に記入します。出金伝票の科目が「仕入」であることが分解方式の目印です。"},{"c":"帳簿・理論","t":"伝票会計","q":"ある日の伝票を集計したところ、振替伝票に記入された掛売上の合計は¥140,000、入金伝票に記入された売掛金回収の合計は¥90,000であった。仕訳日計表の売掛金勘定の借方に集計される金額はいくらか。","ch":["¥140,000","¥90,000","¥230,000","¥50,000"],"e":"売掛金の借方は掛売上による増加140,000です。入金伝票の売掛金回収90,000は売掛金の減少なので貸方に集計されます。"},{"c":"帳簿・理論","t":"伝票会計","q":"3伝票制における振替伝票の記入方法として正しいものはどれか。","ch":["仕訳と同じように借方科目と貸方科目の両方を記入する","相手科目だけを記入する","貸方科目だけを記入する","金額のみを記入する"],"e":"振替伝票は現金以外の取引を記録するため、借方・貸方のどちらも決まっていません。そのため仕訳と同じ形式で両方の科目と金額を記入します。"},{"c":"帳簿・理論","t":"伝票会計","q":"3伝票制を採用している。商品¥70,000を売り上げ、代金は全額現金で受け取った。この取引の起票として正しいものはどれか。","ch":["入金伝票1枚を起票する","入金伝票と振替伝票の2枚を起票する","振替伝票1枚を起票する","出金伝票1枚を起票する"],"e":"全額が現金の入金なので入金伝票1枚で足ります。2枚に分けるのは一部現金・一部掛けなどの取引の場合です。"},{"c":"帳簿・理論","t":"伝票会計","q":"商品¥60,000を売り上げ、代金のうち¥10,000は現金で受け取り、残額は掛けとした。入金伝票に「売上 10,000」と記入されている場合、採用されている起票方法はどれか。","ch":["取引を現金売上と掛売上に分解する方法","全額をいったん掛売上とみなす方法","全額を現金売上とみなす方法","入金伝票のみで処理する方法"],"e":"入金伝票の科目が「売上」なら現金売上10,000と掛売上50,000に分解する方法です。科目が「売掛金」なら全額掛けとみなす方法になります。"},{"c":"帳簿・理論","t":"伝票会計","q":"出金伝票に「買掛金(A商店) 30,000」と記入されている。この伝票から買掛金元帳のA商店勘定へ転記する場合、記入する側として正しいものはどれか。","ch":["借方(買掛金の減少)","貸方(買掛金の増加)","借方と貸方の両方","買掛金元帳には転記しない"],"e":"買掛金を現金で支払った取引なので、A商店に対する買掛金が減少します。買掛金の減少は借方に記入します。"},{"c":"帳簿・理論","t":"理論・分類","q":"次の勘定科目のうち、費用に分類されないものはどれか。","ch":["未払利息","支払利息","減価償却費","貸倒引当金繰入"],"e":"未払利息は利息を支払う義務を表す負債です。支払利息(費用)と名前が似ているので混同しないようにしましょう。"},{"c":"帳簿・理論","t":"理論・分類","q":"次の勘定科目のうち、収益に分類されるものはどれか。","ch":["貸倒引当金戻入","貸倒引当金繰入","貸倒引当金","貸倒損失"],"e":"貸倒引当金戻入は多すぎた引当金を戻し入れたときの収益です。繰入と損失は費用、貸倒引当金は資産から控除する勘定です。"},{"c":"帳簿・理論","t":"理論・分類","q":"貸倒引当金の勘定としての性質について、正しいものはどれか。","ch":["売掛金などの資産から控除される評価勘定である","将来支払う義務を表す負債の勘定である","貸倒れに備えて積み立てた費用の勘定である","株主に帰属する純資産の勘定である"],"e":"貸倒引当金は売掛金や受取手形の回収不能見込額を示し、資産から差し引く形で表示される評価勘定です。"},{"c":"帳簿・理論","t":"理論・分類","q":"損益計算書が示すものとして正しいものはどれか。","ch":["一会計期間の経営成績","一定時点の財政状態","一定時点の現金残高","一会計期間の商品の増減"],"e":"損益計算書は一会計期間の収益と費用から経営成績(利益)を示します。一定時点の財政状態を示すのは貸借対照表です。"},{"c":"帳簿・理論","t":"理論・分類","q":"簿記の記帳から財務諸表作成までの流れとして正しい順序はどれか。","ch":["取引→仕訳帳→総勘定元帳→試算表→財務諸表","取引→総勘定元帳→仕訳帳→試算表→財務諸表","取引→試算表→仕訳帳→総勘定元帳→財務諸表","取引→仕訳帳→試算表→総勘定元帳→財務諸表"],"e":"取引をまず仕訳帳に仕訳し、総勘定元帳へ転記します。その記録をもとに試算表で確認し、財務諸表を作成します。"},{"c":"帳簿・理論","t":"理論・分類","q":"「仮払金」は簿記の5要素のうちどれに分類されるか。","ch":["資産","負債","費用","収益"],"e":"仮払金は内容や金額が確定するまで一時的に処理した支出で、あとで精算を受ける権利を表す資産です。内容が判明したら正しい科目へ振り替えます。"},{"c":"帳簿・理論","t":"理論・分類","q":"「法定福利費」は簿記の5要素のうちどれに分類されるか。","ch":["費用","負債","資産","純資産"],"e":"法定福利費は会社が負担する社会保険料で費用です。従業員から預かった分を処理する社会保険料預り金(負債)と区別しましょう。"},{"c":"帳簿・理論","t":"理論・分類","q":"仕訳から総勘定元帳への転記のルールとして正しいものはどれか。","ch":["仕訳の借方に記入した科目は、その勘定の借方に記入する","仕訳の借方に記入した科目は、その勘定の貸方に記入する","すべての科目を現金勘定に記入する","金額の大きい科目だけを転記する"],"e":"転記は仕訳と同じ側に行います。借方の科目はその勘定の借方へ、貸方の科目はその勘定の貸方へ記入し、相手科目を摘要欄に書きます。"},{"c":"帳簿・理論","t":"理論・分類","q":"補助簿のうち、特定の勘定の内訳明細を口座別に記録する補助元帳に分類されるものはどれか。","ch":["売掛金元帳","仕入帳","現金出納帳","売上帳"],"e":"売掛金元帳は売掛金勘定の内訳を得意先ごとに記録する補助元帳です。仕入帳・売上帳・現金出納帳は取引を発生順に記録する補助記入帳です。"},{"c":"帳簿・理論","t":"固定資産台帳","q":"固定資産台帳に次の記載がある。備品A: 取得日X1年4月1日、取得原価¥480,000、耐用年数8年、残存価額ゼロ、定額法。会計期間はX2年4月1日〜X3年3月31日である。X3年3月31日時点の減価償却累計額はいくらか。","ch":["¥120,000","¥60,000","¥180,000","¥240,000"],"e":"年間償却費は480,000÷8年＝60,000。X1年4月1日の取得からX3年3月31日まで2年分なので60,000×2＝120,000です。"},{"c":"帳簿・理論","t":"固定資産台帳","q":"固定資産台帳に次の記載がある。車両運搬具: 取得原価¥2,000,000、耐用年数5年、残存価額ゼロ、定額法。当期末で取得から3年分の減価償却が完了している。当期末の帳簿価額(取得原価−減価償却累計額)はいくらか。","ch":["¥800,000","¥1,200,000","¥400,000","¥1,600,000"],"e":"年間償却費は2,000,000÷5年＝400,000。3年分の累計額は1,200,000なので、帳簿価額は2,000,000−1,200,000＝800,000です。"},{"c":"帳簿・理論","t":"固定資産台帳","q":"固定資産台帳に次の記載がある。備品B: 取得日は当期の10月1日、取得原価¥600,000、耐用年数5年、残存価額ゼロ、定額法。決算日は3月31日である。当期の減価償却費はいくらか。","ch":["¥60,000","¥120,000","¥30,000","¥50,000"],"e":"年間償却費は600,000÷5年＝120,000。10月1日から3月31日までの6か月分を月割りして120,000×6/12＝60,000です。"},{"c":"帳簿・理論","t":"固定資産台帳","q":"固定資産台帳に次の記載がある。備品X: 期首以前に取得、当期の減価償却費¥60,000。備品Y: 当期の1月1日に取得、年間償却額¥80,000(定額法)。決算日は3月31日である。当期の減価償却費の合計はいくらか。","ch":["¥80,000","¥140,000","¥60,000","¥100,000"],"e":"備品Yは1月〜3月の3か月分80,000×3/12＝20,000だけ計上します。合計は60,000＋20,000＝80,000です。Yを1年分計上しないよう注意しましょう。"},{"c":"帳簿・理論","t":"試算表","q":"総勘定元帳の現金勘定は、借方合計¥580,000、貸方合計¥420,000であった。残高試算表の現金勘定に記入される金額として正しいものはどれか。","ch":["借方に¥160,000","借方に¥580,000","貸方に¥420,000","借方に¥1,000,000"],"e":"残高試算表には各勘定の残高だけを記入します。580,000−420,000＝160,000の借方残高です。580,000を記入するのは合計試算表です。"},{"c":"帳簿・理論","t":"試算表","q":"総勘定元帳の買掛金勘定は、借方合計¥300,000、貸方合計¥520,000であった。残高試算表の買掛金勘定に記入される金額として正しいものはどれか。","ch":["貸方に¥220,000","借方に¥220,000","貸方に¥520,000","貸方に¥820,000"],"e":"買掛金は負債なので貸方残高です。520,000−300,000＝220,000を貸方に記入します。合計額を記入しないよう注意しましょう。"},{"c":"帳簿・理論","t":"試算表","q":"試算表の貸借合計が一致していても発見できない誤りはどれか。","ch":["ある取引の仕訳をまるごと記入し忘れた誤り","仕訳の借方だけを転記し忘れた誤り","借方と貸方で異なる金額を転記した誤り","貸方の金額を二重に転記した誤り"],"e":"取引を丸ごと記入し忘れても借方・貸方の両方が漏れるため貸借は一致したままで、試算表では発見できません。片側だけの誤りは貸借が不一致になるので発見できます。"},{"c":"帳簿・理論","t":"試算表","q":"試算表の借方合計と貸方合計が必ず一致する理由として正しいものはどれか。","ch":["すべての取引が仕訳で借方と貸方に同じ金額で記録されるから","資産の金額が常に負債より大きいから","現金の残高が常にプラスになるから","収益と費用の金額が常に等しいから"],"e":"複式簿記ではどんな取引も借方と貸方に同額で記録します(貸借平均の原理)。そのため全勘定を集計した試算表の貸借合計は必ず一致します。"}];
