<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>簿記3級 過去問トレーニング 500問</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: linear-gradient(160deg, #1d5a96 0%, #0d2f52 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 16px;
    color: #333;
  }
  .app { width: 100%; max-width: 560px; }

  .card {
    background: #fff;
    border-radius: 16px;
    padding: 24px 20px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    margin-bottom: 16px;
  }

  /* ===== スタート画面 ===== */
  .title { text-align: center; color: #fff; padding: 20px 0 6px; }
  .title h1 { font-size: 26px; letter-spacing: 2px; }
  .title p { font-size: 13px; opacity: 0.85; margin-top: 6px; }
  .start-card h2 { font-size: 15px; color: #14528f; margin: 14px 0 8px; }
  .start-card h2:first-child { margin-top: 0; }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    border: 2px solid #dde7e3;
    background: #f7f9f8;
    color: #444;
    border-radius: 24px;
    padding: 10px 14px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
  }
  .chip.sel { background: #2277cc; border-color: #2277cc; color: #fff; font-weight: bold; }

  .btn {
    display: block; width: 100%;
    padding: 16px;
    border: none; border-radius: 12px;
    font-size: 17px; font-weight: bold;
    cursor: pointer;
    margin-top: 16px;
    transition: transform 0.1s;
    font-family: inherit;
  }
  .btn:active { transform: scale(0.97); }
  .btn-main { background: #2277cc; color: #fff; }
  .btn-sub  { background: #e7f0fa; color: #14528f; }
  .btn:disabled { opacity: 0.45; }

  .banner {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    background: #fff4dc;
    border: 1px solid #f0dfb8;
    border-radius: 10px;
    padding: 10px 14px;
    margin-top: 14px;
    font-size: 13px;
    color: #7a5a17;
  }
  .banner button {
    border: 1px solid #d8b96a;
    background: #fff;
    color: #7a5a17;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
  }

  /* ===== 問題画面 ===== */
  .status { display: flex; justify-content: space-between; align-items: center; color: #fff; font-size: 14px; padding: 4px 4px 10px; }
  .progress-bar { height: 8px; background: rgba(255,255,255,0.25); border-radius: 4px; overflow: hidden; margin-bottom: 14px; }
  .progress-fill { height: 100%; background: #ffd54f; width: 0%; transition: width 0.3s; }

  .tag {
    display: inline-block;
    background: #e7f0fa; color: #14528f;
    font-size: 12px; font-weight: bold;
    padding: 4px 12px; border-radius: 20px;
    margin-bottom: 12px; margin-right: 6px;
  }
  .question { font-size: 16px; line-height: 1.8; margin-bottom: 18px; font-weight: 500; white-space: pre-line; }

  .choice {
    display: block; width: 100%;
    text-align: left;
    background: #f7f9f8;
    border: 2px solid #dde7e3;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 15px;
    line-height: 1.6;
    margin-bottom: 10px;
    cursor: pointer;
    white-space: pre-line;
    font-family: inherit;
    color: #333;
  }
  .choice:active { background: #eef4f1; }
  .choice.correct { background: #e3f6e8; border-color: #34a853; font-weight: bold; }
  .choice.wrong   { background: #fdeaea; border-color: #ea4335; }
  .choice:disabled { cursor: default; opacity: 1; color: #333; }
  .choice.faded:disabled { opacity: 0.5; }

  .feedback { border-radius: 12px; padding: 16px; margin-top: 6px; font-size: 14px; line-height: 1.8; display: none; }
  .feedback.show { display: block; }
  .feedback.ok { background: #e3f6e8; }
  .feedback.ng { background: #fdeaea; }
  .feedback .mark { font-size: 18px; font-weight: bold; margin-bottom: 6px; }
  .feedback.ok .mark { color: #1e7e34; }
  .feedback.ng .mark { color: #c62828; }

  .quit { text-align: center; margin-top: 4px; }
  .quit button { background: none; border: none; color: rgba(255,255,255,0.7); font-size: 13px; text-decoration: underline; cursor: pointer; padding: 8px; font-family: inherit; }

  /* ===== 結果画面 ===== */
  .result-score { text-align: center; padding: 12px 0 20px; }
  .result-score .num { font-size: 52px; font-weight: bold; color: #14528f; }
  .result-score .num small { font-size: 20px; color: #888; }
  .result-score .msg { font-size: 16px; margin-top: 8px; color: #444; }
  .review-item { border-top: 1px solid #e5eae8; padding: 14px 4px; font-size: 14px; line-height: 1.7; }
  .review-item .rq { font-weight: bold; margin-bottom: 6px; white-space: pre-line; }
  .review-item .ra { color: #1e7e34; white-space: pre-line; }
  .review-title { font-size: 15px; font-weight: bold; color: #c62828; margin-bottom: 4px; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="app">

  <div class="title">
    <h1>📘 簿記3級</h1>
    <p id="subtitle">過去問形式トレーニング</p>
  </div>

  <!-- スタート画面 -->
  <div id="screen-start">
    <div class="card start-card">
      <h2>1. 分野を選ぶ</h2>
      <div class="chips" id="cat-chips"></div>
      <h2>2. 問題数を選ぶ</h2>
      <div class="chips" id="num-chips"></div>
      <button class="btn btn-main" onclick="startQuiz()">スタート ▶</button>
      <button class="btn btn-sub" id="btn-review" onclick="startReview()"></button>
      <div class="banner hidden" id="wrong-banner">
        <span id="wrong-banner-text"></span>
        <button onclick="resetWrong()">リセット</button>
      </div>
    </div>
  </div>

  <!-- 問題画面 -->
  <div id="screen-quiz" class="hidden">
    <div class="status">
      <span id="q-count"></span>
      <span id="q-score"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <div class="card">
      <span class="tag" id="q-tag"></span><span class="tag" id="q-tag2"></span>
      <div class="question" id="q-text"></div>
      <div id="q-choices"></div>
      <div class="feedback" id="feedback">
        <div class="mark" id="fb-mark"></div>
        <div id="fb-text"></div>
      </div>
      <button class="btn btn-main hidden" id="btn-next" onclick="nextQuestion()">次の問題へ ▶</button>
    </div>
    <div class="quit"><button onclick="if(confirm('中断してトップに戻りますか?')) location.reload()">中断する</button></div>
  </div>

  <!-- 結果画面 -->
  <div id="screen-result" class="hidden">
    <div class="card">
      <div class="result-score">
        <div class="num"><span id="r-score"></span><small> / <span id="r-total"></span>問</small></div>
        <div class="msg" id="r-msg"></div>
      </div>
      <button class="btn btn-main" onclick="location.reload()">トップに戻る</button>
    </div>
    <div class="card" id="review-card">
      <div class="review-title">✍️ 間違えた問題の復習</div>
      <div id="review-list"></div>
    </div>
  </div>

</div>

<script>
// ============================================================
// 問題データ(過去問形式のオリジナル問題)
// c: 分野 / t: 論点 / q: 問題文 / ch: 選択肢(先頭が正解) / e: 解説
// ============================================================
const QUESTIONS = [{"c":"仕訳","t":"商品売買","q":"商品¥30,000を仕入れ、代金は掛けとした。","ch":["(借)仕入 30,000 ／ (貸)買掛金 30,000","(借)仕入 30,000 ／ (貸)未払金 30,000","(借)買掛金 30,000 ／ (貸)仕入 30,000","(借)仕入 30,000 ／ (貸)支払手形 30,000"],"e":"商品を掛けで仕入れたときに生じる債務は買掛金勘定で処理します。未払金は商品以外(備品など)を後払いで購入したときに使う勘定なので区別しましょう。"},{"c":"仕訳","t":"商品売買","q":"商品¥50,000を売り上げ、代金は掛けとした。","ch":["(借)売掛金 50,000 ／ (貸)売上 50,000","(借)未収入金 50,000 ／ (貸)売上 50,000","(借)売上 50,000 ／ (貸)売掛金 50,000","(借)受取手形 50,000 ／ (貸)売上 50,000"],"e":"商品を掛けで販売したときの債権は売掛金勘定で処理します。未収入金は商品以外(固定資産など)を売却した際の未収額に使う勘定です。"},{"c":"仕訳","t":"商品売買","q":"仕入先に対する買掛金¥40,000を現金で支払った。","ch":["(借)買掛金 40,000 ／ (貸)現金 40,000","(借)現金 40,000 ／ (貸)買掛金 40,000","(借)未払金 40,000 ／ (貸)現金 40,000","(借)仕入 40,000 ／ (貸)現金 40,000"],"e":"買掛金という負債を支払って減らすので、買掛金を借方に記入します。仕入時にすでに仕入勘定は計上済みなので、支払時に再び仕入としないよう注意しましょう。"},{"c":"仕訳","t":"商品売買","q":"得意先に対する売掛金¥60,000の回収として、得意先振出しの小切手を受け取った。","ch":["(借)現金 60,000 ／ (貸)売掛金 60,000","(借)当座預金 60,000 ／ (貸)売掛金 60,000","(借)受取手形 60,000 ／ (貸)売掛金 60,000","(借)売掛金 60,000 ／ (貸)現金 60,000"],"e":"他人(得意先)振出しの小切手は、銀行に持ち込めばすぐ換金できる通貨代用証券なので、簿記上は現金勘定で処理します。当座預金とするのは自分が小切手を振り出したときです。"},{"c":"仕訳","t":"商品売買","q":"商品¥80,000を仕入れ、代金は小切手を振り出して支払った。","ch":["(借)仕入 80,000 ／ (貸)当座預金 80,000","(借)仕入 80,000 ／ (貸)現金 80,000","(借)仕入 80,000 ／ (貸)買掛金 80,000","(借)当座預金 80,000 ／ (貸)仕入 80,000"],"e":"小切手を自分で振り出したときは、当座預金口座から支払われるため当座預金勘定の減少とします。小切手を受け取った場合(現金)との違いに注意しましょう。"},{"c":"仕訳","t":"商品売買","q":"商品¥70,000を仕入れ、代金として約束手形を振り出して支払った。","ch":["(借)仕入 70,000 ／ (貸)支払手形 70,000","(借)仕入 70,000 ／ (貸)受取手形 70,000","(借)仕入 70,000 ／ (貸)買掛金 70,000","(借)支払手形 70,000 ／ (貸)仕入 70,000"],"e":"約束手形を振り出すと、期日に代金を支払う義務が生じるので支払手形勘定(負債)で処理します。受取手形は手形を受け取った側が使う勘定です。"},{"c":"仕訳","t":"商品売買","q":"商品¥90,000を売り上げ、代金として得意先振出しの約束手形を受け取った。","ch":["(借)受取手形 90,000 ／ (貸)売上 90,000","(借)支払手形 90,000 ／ (貸)売上 90,000","(借)売掛金 90,000 ／ (貸)売上 90,000","(借)現金 90,000 ／ (貸)売上 90,000"],"e":"約束手形を受け取ると、期日に代金を受け取る権利が生じるので受取手形勘定(資産)で処理します。小切手と異なり、手形は現金勘定にはしません。"},{"c":"仕訳","t":"商品売買","q":"かねて商品代金として振り出していた約束手形¥70,000が本日満期日となり、当座預金口座から支払われた。","ch":["(借)支払手形 70,000 ／ (貸)当座預金 70,000","(借)当座預金 70,000 ／ (貸)支払手形 70,000","(借)買掛金 70,000 ／ (貸)当座預金 70,000","(借)支払手形 70,000 ／ (貸)現金 70,000"],"e":"手形代金の支払いによって支払義務が消滅するので、支払手形(負債)を借方に記入して減らし、当座預金の減少を貸方に記入します。"},{"c":"仕訳","t":"商品売買","q":"かねて受け取っていた約束手形¥90,000が本日満期日となり、手形代金が当座預金口座に入金された。","ch":["(借)当座預金 90,000 ／ (貸)受取手形 90,000","(借)受取手形 90,000 ／ (貸)当座預金 90,000","(借)当座預金 90,000 ／ (貸)売掛金 90,000","(借)現金 90,000 ／ (貸)受取手形 90,000"],"e":"手形代金を受け取る権利が消滅するので、受取手形(資産)を貸方に記入して減らし、入金された当座預金の増加を借方に記入します。"},{"c":"仕訳","t":"商品売買","q":"仕入先に対する買掛金¥100,000について、取引銀行を通じて電子記録債務の発生記録を行った。","ch":["(借)買掛金 100,000 ／ (貸)電子記録債務 100,000","(借)電子記録債務 100,000 ／ (貸)買掛金 100,000","(借)買掛金 100,000 ／ (貸)電子記録債権 100,000","(借)買掛金 100,000 ／ (貸)支払手形 100,000"],"e":"発生記録により買掛金という債務が電子記録債務という債務に置き換わるので、買掛金を減らし電子記録債務(負債)を計上します。支払う側なので「債務」を使う点がポイントです。"},{"c":"仕訳","t":"商品売買","q":"得意先に対する売掛金¥120,000について、取引銀行を通じて電子記録債権の発生記録を行った。","ch":["(借)電子記録債権 120,000 ／ (貸)売掛金 120,000","(借)売掛金 120,000 ／ (貸)電子記録債権 120,000","(借)電子記録債務 120,000 ／ (貸)売掛金 120,000","(借)受取手形 120,000 ／ (貸)売掛金 120,000"],"e":"発生記録により売掛金という債権が電子記録債権という債権に置き換わるので、売掛金を減らし電子記録債権(資産)を計上します。受け取る側なので「債権」を使います。"},{"c":"仕訳","t":"商品売買","q":"電子記録債務¥100,000の支払期日が到来し、当座預金口座から引き落とされた。","ch":["(借)電子記録債務 100,000 ／ (貸)当座預金 100,000","(借)当座預金 100,000 ／ (貸)電子記録債務 100,000","(借)電子記録債権 100,000 ／ (貸)当座預金 100,000","(借)買掛金 100,000 ／ (貸)当座預金 100,000"],"e":"支払いによって電子記録債務という負債が消滅するので借方に記入し、引き落とされた当座預金の減少を貸方に記入します。"},{"c":"仕訳","t":"商品売買","q":"電子記録債権¥120,000の支払期日が到来し、普通預金口座に振り込まれた。","ch":["(借)普通預金 120,000 ／ (貸)電子記録債権 120,000","(借)電子記録債権 120,000 ／ (貸)普通預金 120,000","(借)普通預金 120,000 ／ (貸)電子記録債務 120,000","(借)普通預金 120,000 ／ (貸)売掛金 120,000"],"e":"入金によって電子記録債権という資産が消滅するので貸方に記入し、普通預金の増加を借方に記入します。発生記録の時点で売掛金はすでに減っている点に注意しましょう。"},{"c":"仕訳","t":"商品売買","q":"商品¥200,000をクレジット払いの条件で販売した。なお、信販会社への手数料(販売代金の4%)は販売時に計上する。","ch":["(借)クレジット売掛金 192,000、支払手数料 8,000 ／ (貸)売上 200,000","(借)クレジット売掛金 200,000 ／ (貸)売上 200,000","(借)クレジット売掛金 192,000 ／ (貸)売上 192,000","(借)売掛金 192,000、支払手数料 8,000 ／ (貸)売上 200,000"],"e":"売上は販売代金の総額¥2 方で減らし、普通預金の増加を借方に記入します。売上は販売時にすでに計上済みなので再計上しません。"},{"c":"仕訳","t":"商品売買","q":"商品¥45,000を仕入れ、代金は掛けとした。なお、当社負担の引取運賃¥1,500は仕入先が立替払いしており、この金額も掛け代金に含めて後日支払うこととした。","ch":["(借)仕入 46,500 ／ (貸)買掛金 46,500","(借)仕入 45,000、発送費 1,500 ／ (貸)買掛金 46,500","(借)仕入 45,000 ／ (貸)買掛金 45,000","(借)仕入 46,500 ／ (貸)買掛金 45,000、現金 1,500"],"e":"当社負担の引取運賃は仕入諸掛りとして仕入の金額に含めます。運賃分も後日まとめて支払うため、買掛金は合計¥46,500となります。"},{"c":"仕訳","t":"商品売買","q":"商品¥140,000を売り上げ、代金のうち¥60,000は先方振出しの約束手形で受け取り、残額は掛けとした。","ch":["(借)受取手形 60,000、売掛金 80,000 ／ (貸)売上 140,000","(借)現金 60,000、売掛金 80,000 ／ (貸)売上 140,000","(借)支払手形 60,000、売掛金 80,000 ／ (貸)売上 140,000","(借)受取手形 80,000、売掛金 60,000 ／ (貸)売上 140,000"],"e":"約束手形を受け取ったら受取手形勘定(資産)で処理します。売上は総額¥140,000で計上し、借方を受取手形¥60,000と売掛金¥80,000に分けます。"},{"c":"仕訳","t":"商品売買","q":"仕入先に対する買掛金¥85,000を当座預金口座から振り込んで支払った。なお、振込手数料¥300(当社負担)も同口座から引き落とされた。","ch":["(借)買掛金 85,000、支払手数料 300 ／ (貸)当座預金 85,300","(借)買掛金 85,300 ／ (貸)当座預金 85,300","(借)買掛金 85,000 ／ (貸)当座預金 85,000","(借)買掛金 85,000、受取手数料 300 ／ (貸)当座預金 85,300"],"e":"買掛金の支払額は¥85,000のままで、当社負担の振込手数料¥300は支払手数料勘定(費用)で処理します。当座預金からは合計¥85,300が引き落とされます。"},{"c":"仕訳","t":"現金・預金","q":"得意先から売掛金¥35,000の回収として、送金小切手を受け取った。","ch":["(借)現金 35,000 ／ (貸)売掛金 35,000","(借)当座預金 35,000 ／ (貸)売掛金 35,000","(借)受取手形 35,000 ／ (貸)売掛金 35,000","(借)普通預金 35,000 ／ (貸)売掛金 35,000"],"e":"送金小切手は銀行に持ち込めばすぐに換金できる通貨代用証券なので、簿記上は現金勘定で処理します。"},{"c":"仕訳","t":"現金・預金","q":"得意先から売掛金¥25,000の回収として、普通為替証書を受け取った。","ch":["(借)現金 25,000 ／ (貸)売掛金 25,000","(借)普通預金 25,000 ／ (貸)売掛金 25,000","(借)受取手形 25,000 ／ (貸)売掛金 25,000","(借)売掛金 25,000 ／ (貸)現金 25,000"],"e":"普通為替証書(郵便為替)も通貨代用証券であり、簿記上の現金に含まれます。紙幣・硬貨でなくても現金勘定で処理する点がポイントです。"},{"c":"仕訳","t":"現金・預金","q":"現金の実際有高を調べたところ、帳簿残高¥80,000に対して実際有高は¥77,000であった。この差異の原因は不明である。","ch":["(借)現金過不足 3,000 ／ (貸)現金 3,000","(借)現金 3,000 ／ (貸)現金過不足 3,000","(借)雑損 3,000 ／ (貸)現金 3,000","(借)現金過不足 3,000 ／ (貸)雑益 3,000"],"e":"帳簿残高を実際有高に合わせるため、現金を¥3,000減らします。原因が不明な段階では、相手勘定は一時的に現金過不足勘定とします。雑損に振り替えるのは決算まで原因が判明しなかった場合です。"},{"c":"仕訳","t":"現金・預金","q":"現金の実際有高を調べたところ、帳簿残高¥50,000に対して実際有高は¥52,000であった。この差異の原因は不明である。","ch":["(借)現金 2,000 ／ (貸)現金過不足 2,000","(借)現金過不足 2,000 ／ (貸)現金 2,000","(借)現金 2,000 ／ (貸)雑益 2,000","(借)現金過不足 2,000 ／ (貸)雑損 2,000"],"e":"実際有高のほうが多いので、帳簿の現金を¥2,000増やして実際有高に合わせます。原因不明のため貸方は現金過不足勘定とします。"},{"c":"仕訳","t":"現金・預金","q":"かねて現金の実際有高が帳簿残高より¥3,000不足していたため現金過不足勘定で処理していたが、本日、このうち¥2,500は通信費の記帳漏れであることが判明した。","ch":["(借)通信費 2,500 ／ (貸)現金過不足 2,500","(借)現金過不足 2,500 ／ (貸)通信費 2,500","(借)通信費 2,500 ／ (貸)現金 2,500","(借)雑損 2,500 ／ (貸)現金過不足 2,500"],"e":"原因が判明したら、現金過不足勘定から正しい勘定へ振り替えます。不足の場合、現金過不足は借方残高なので、貸方に記入して減らし、借方に通信費を計上します。"},{"c":"仕訳","t":"現金・預金","q":"かねて現金の実際有高が帳簿残高より¥2,000多かったため現金過不足勘定で処理していたが、本日、その全額が受取手数料の記帳漏れであることが判明した。","ch":["(借)現金過不足 2,000 ／ (貸)受取手数料 2,000","(借)受取手数料 2,000 ／ (貸)現金過不足 2,000","(借)現金 2,000 ／ (貸)受取手数料 2,000","(借)現金過不足 2,000 ／ (貸)雑益 2,000"],"e":"過剰の場合、現金過不足は貸方残高なので、借方に記入して減らし、貸方に本来の勘定である受取手数料を計上します。雑益とするのは決算まで原因不明の場合です。"},{"c":"仕訳","t":"現金・預金","q":"普通預金口座から当座預金口座に¥300,000を預け替えた。","ch":["(借)当座預金 300,000 ／ (貸)普通預金 300,000","(借)普通預金 300,000 ／ (貸)当座預金 300,000","(借)当座預金 300,000 ／ (貸)現金 300,000","(借)現金 300,000 ／ (貸)普通預金 300,000"],"e":"増える口座(当座預金)を借方、減る口座(普通預金)を貸方に記入します。どちらの口座が増減するのかを問題文から正確に読み取りましょう。"},{"c":"仕訳","t":"現金・預金","q":"現金¥100,000を普通預金口座に預け入れた。","ch":["(借)普通預金 100,000 ／ (貸)現金 100,000","(借)現金 100,000 ／ (貸)普通預金 100,000","(借)当座預金 100,000 ／ (貸)現金 100,000","(借)定期預金 100,000 ／ (貸)現金 100,000"],"e":"手元の現金が減り、普通預金が増える取引です。増える普通預金を借方、減る現金を貸方に記入します。"},{"c":"仕訳","t":"現金・預金","q":"X銀行の普通預金口座からY銀行の普通預金口座へ¥200,000を振り替えた。なお、口座の管理のため、銀行名を付した勘定を用いている。","ch":["(借)普通預金Y銀行 200,000 ／ (貸)普通預金X銀行 200,000","(借)普通預金X銀行 200,000 ／ (貸)普通預金Y銀行 200,000","(借)当座預金Y銀行 200,000 ／ (貸)普通預金X銀行 200,000","(借)現金 200,000 ／ (貸)普通預金X銀行 200,000"],"e":"複数の口座を管理する場合、銀行名を付した勘定を使います。入金先のY銀行の口座が増えるので借方、出金元のX銀行の口座が減るので貸方です。"},{"c":"仕訳","t":"現金・預金","q":"A銀行の普通預金口座からB銀行の当座預金口座に¥150,000を振り込んだ。なお、振込手数料¥400はA銀行の普通預金口座から引き落とされた。口座の管理のため、銀行名を付した勘定を用いている。","ch":["(借)当座預金B銀行 150,000、支払手数料 400 ／ (貸)普通預金A銀行 150,400","(借)当座預金B銀行 150,400 ／ (貸)普通預金A銀行 150,400","(借)当座預金B銀行 150,000 ／ (貸)普通預金A銀行 150,000","(借)普通預金B銀行 150,000、支払手数料 400 ／ (貸)普通預金A銀行 150,400"],"e":"B銀行の当座預金には¥150,000だけが入金され、振込手数料¥400は支払手数料勘定(費用)で処理します。A銀行の口座からは合計¥150,400が引き落とされます。"},{"c":"仕訳","t":"現金・預金","q":"決算にあたり、当座預金勘定が¥80,000の貸方残高となっていたため、適切な勘定に振り替える。","ch":["(借)当座預金 80,000 ／ (貸)当座借越 80,000","(借)当座借越 80,000 ／ (貸)当座預金 80,000","(借)当座預金 80,000 ／ (貸)買掛金 80,000","(借)雑損 80,000 ／ (貸)当座預金 80,000"],"e":"当座預金の貸方残高は銀行からの一時的な借入れを意味するので、決算時に当座借越勘定(または借入金勘定)という負債に振り替えます。当座預金を借方に記入して残高をゼロにします。"},{"c":"仕訳","t":"現金・預金","q":"買掛金¥120,000の支払いのため小切手を振り出した。当座預金残高は¥100,000であったが、取引銀行と借越限度額¥500,000の当座借越契約を結んでいる。なお、期中の引出しはすべて当座預金勘定で処理している。","ch":["(借)買掛金 120,000 ／ (貸)当座預金 120,000","(借)買掛金 120,000 ／ (貸)当座預金 100,000、当座借越 20,000","(借)買掛金 120,000 ／ (貸)現金 120,000","(借)買掛金 120,000 ／ (貸)当座預金 100,000、借入金 20,000"],"e":"期中は残高を超えて引き出しても、そのまま当座預金勘定の貸方に記入します。貸方残高となった分は、決算時にまとめて当座借越勘定などへ振り替えます。"},{"c":"仕訳","t":"現金・預金","q":"定額資金前渡制度(インプレスト・システム)を採用し、小口現金として小切手¥30,000を振り出して小口係(用度係)に前渡しした。","ch":["(借)小口現金 30,000 ／ (貸)当座預金 30,000","(借)当座預金 30,000 ／ (貸)小口現金 30,000","(借)小口現金 30,000 ／ (貸)現金 30,000","(借)現金 30,000 ／ (貸)当座預金 30,000"],"e":"小口係に前渡しした資金は小口現金勘定(資産)で処理します。小切手の振出しによる支払いなので、貸方は当座預金です。"},{"c":"仕訳","t":"現金・預金","q":"小口係から、小口現金で旅費交通費¥8,000、消耗品費¥5,000、雑費¥2,000を支払った旨の報告を受けた。なお、資金の補給は後日行う。","ch":["(借)旅費交通費 8,000、消耗品費 5,000、雑費 2,000 ／ (貸)小口現金 15,000","(借)旅費交通費 8,000、消耗品費 5,000、雑費 2,000 ／ (貸)現金 15,000","(借)小口現金 15,000 ／ (貸)旅費交通費 8,000、消耗品費 5,000、雑費 2,000","(借)旅費交通費 8,000、消耗品費 5,000、雑費 2,000 ／ (貸)当座預金 15,000"],"e":"支払報告を受けた時点で各費用を計上し、使った分だけ小口現金(資産)を減らします。補給前なので当座預金はまだ動きません。"},{"c":"仕訳","t":"現金・預金","q":"小口係から通信費¥6,000および旅費交通費¥4,000を支払った旨の報告を受け、ただちに同額の小切手を振り出して資金を補給した。","ch":["(借)通信費 6,000、旅費交通費 4,000 ／ (貸)当座預金 10,000","(借)通信費 6,000、旅費交通費 4,000 ／ (貸)小口現金 10,000","(借)小口現金 10,000 ／ (貸)当座預金 10,000","(借)通信費 6,000、旅費交通費 4,000 ／ (貸)現金 10,000"],"e":"報告と同時に補給する場合、小口現金の減少と増加が相殺されるため、費用の計上と当座預金の減少を直接結び付けて仕訳できます。"},{"c":"仕訳","t":"現金・預金","q":"小口係からすでに支払報告を受けていた小口現金の使用額¥12,000について、本日、小切手を振り出して資金を補給した。","ch":["(借)小口現金 12,000 ／ (貸)当座預金 12,000","(借)当座預金 12,000 ／ (貸)小口現金 12,000","(借)小口現金 12,000 ／ (貸)現金 12,000","(借)雑費 12,000 ／ (貸)当座預金 12,000"],"e":"費用はすでに支払報告時に計上済みなので、補給時は小口現金(資産)を元の定額に戻す仕訳のみを行います。小切手の振出しなので貸方は当座預金です。"},{"c":"仕訳","t":"現金・預金","q":"得意先から売掛金¥45,000の回収として同店振出しの小切手を受け取り、ただちに当座預金口座に預け入れた。","ch":["(借)当座預金 45,000 ／ (貸)売掛金 45,000","(借)現金 45,000 ／ (貸)売掛金 45,000","(借)受取手形 45,000 ／ (貸)売掛金 45,000","(借)当座預金 45,000 ／ (貸)売上 45,000"],"e":"受け取った小切手をただちに当座預金に預け入れた場合は、現金勘定を経由せず直接当座預金の増加として処理できます。"},{"c":"仕訳","t":"現金・預金","q":"得意先から売掛金¥65,000の回収として、かつて当社が振り出した小切手を受け取った。","ch":["(借)当座預金 65,000 ／ (貸)売掛金 65,000","(借)現金 65,000 ／ (貸)売掛金 65,000","(借)受取手形 65,000 ／ (貸)売掛金 65,000","(借)売掛金 65,000 ／ (貸)当座預金 65,000"],"e":"自己振出小切手が戻ってきた場合、振出時に減らした当座預金の支払いが不要になるため、当座預金の増加として処理します。他人振出小切手(現金)との違いに注意しましょう。"},{"c":"仕訳","t":"現金・預金","q":"普通預金口座に利息¥500が入金された。","ch":["(借)普通預金 500 ／ (貸)受取利息 500","(借)受取利息 500 ／ (貸)普通預金 500","(借)普通預金 500 ／ (貸)受取手数料 500","(借)普通預金 500 ／ (貸)支払利息 500"],"e":"預金に付く利息は受取利息勘定(収益)で処理します。収益の発生は貸方に記入し、増えた普通預金を借方に記入します。"},{"c":"仕訳","t":"現金・預金","q":"現金¥500,000を定期預金口座に預け入れた。","ch":["(借)定期預金 500,000 ／ (貸)現金 500,000","(借)現金 500,000 ／ (貸)定期預金 500,000","(借)普通預金 500,000 ／ (貸)現金 500,000","(借)当座預金 500,000 ／ (貸)現金 500,000"],"e":"定期預金も預金の一種で、資産の勘定です。増える定期預金を借方、減る現金を貸方に記入します。"},{"c":"仕訳","t":"固定資産","q":"事務用の備品¥300,000を購入し、引取運賃¥5,000を含めた代金は月末に支払うこととした。","ch":["(借)備品 305,000 ／ (貸)未払金 305,000","(借)備品 300,000、発送費 5,000 ／ (貸)未払金 305,000","(借)備品 305,000 ／ (貸)買掛金 305,000","(借)備品 300,000 ／ (貸)未払金 300,000"],"e":"引取運賃などの付随費用は固定資産の取得原価に含めるため、備品は¥305,000で計上します。商品以外の後払いなので、買掛金ではなく未払金を使います。"},{"c":"仕訳","t":"固定資産","q":"土地¥2,000,000を購入し、不動産会社への仲介手数料¥60,000とともに小切手を振り出して支払った。","ch":["(借)土地 2,060,000 ／ (貸)当座預金 2,060,000","(借)土地 2,000,000、支払手数料 60,000 ／ (貸)当座預金 2,060,000","(借)土地 2,060,000 ／ (貸)現金 2,060,000","(借)土地 2,000,000 ／ (貸)当座預金 2,000,000"],"e":"固定資産の購入にかかる仲介手数料は付随費用として取得原価に含めるため、土地は¥2,060,000で計上します。費用(支払手数料)として処理しないよう注意しましょう。"},{"c":"仕訳","t":"固定資産","q":"店舗用の建物¥3,000,000を購入し、登記料¥150,000および仲介手数料¥90,000を含めた総額を普通預金口座から振り込んで支払った。","ch":["(借)建物 3,240,000 ／ (貸)普通預金 3,240,000","(借)建物 3,000,000、支払手数料 240,000 ／ (貸)普通預金 3,240,000","(借)建物 3,090,000、租税公課 150,000 ／ (貸)普通預金 3,240,000","(借)建物 3,240,000 ／ (貸)当座預金 3,240,000"],"e":"登記料や仲介手数料などの付随費用はすべて建物の取得原価に含めます。3,000,000+150,000+90,000=¥3,240,000が建物の金額です。"},{"c":"仕訳","t":"固定資産","q":"営業用の自動車¥1,500,000を購入し、代金は翌月末に支払うこととした。","ch":["(借)車両運搬具 1,500,000 ／ (貸)未払金 1,500,000","(借)車両運搬具 1,500,000 ／ (貸)買掛金 1,500,000","(借)備品 1,500,000 ／ (貸)未払金 1,500,000","(借)車両運搬具 1,500,000 ／ (貸)当座預金 1,500,000"],"e":"営業用の自動車は車両運搬具勘定(資産)で処理します。商品以外のものを後払いで購入したときの債務は、買掛金ではなく未払金です。"},{"c":"仕訳","t":"固定資産","q":"駐車場用に購入した土地の整地費用¥80,000を現金で支払った。","ch":["(借)土地 80,000 ／ (貸)現金 80,000","(借)修繕費 80,000 ／ (貸)現金 80,000","(借)雑費 80,000 ／ (貸)現金 80,000","(借)支払手数料 80,000 ／ (貸)現金 80,000"],"e":"土地を使用できる状態にするための整地費用は付随費用にあたるため、費用とせず土地の取得原価に含めます。"},{"c":"仕訳","t":"固定資産","q":"期首に、備品(取得原価¥400,000、減価償却累計額¥240,000、間接法で記帳)を¥180,000で売却し、代金は月末に受け取ることとした。","ch":["(借)備品減価償却累計額 240,000、未収入金 180,000 ／ (貸)備品 400,000、固定資産売却益 20,000","(借)未収入金 180,000、固定資産売却損 220,000 ／ (貸)備品 400,000","(借)備品減価償却累計額 240,000、売掛金 180,000 ／ (貸)備品 400,000、固定資産売却益 20,000","(借)備品減価償却累計額 240,000、未収入金 180,000 ／ (貸)備品 400,000、雑益 20,000"],"e":"帳簿価額は400,000−240,000=¥160,000で、売却価額¥180,000との差額¥20,000が固定資産売却益です。間接法では備品を取得原価で減らし、累計額も借方で取り消します。"},{"c":"仕訳","t":"固定資産","q":"期首に、備品(取得原価¥500,000、減価償却累計額¥300,000、間接法で記帳)を¥150,000で売却し、代金は現金で受け取った。","ch":["(借)備品減価償却累計額 300,000、現金 150,000、固定資産売却損 50,000 ／ (貸)備品 500,000","(借)現金 150,000、固定資産売却損 350,000 ／ (貸)備品 500,000","(借)備品減価償却累計額 300,000、現金 150,000、固定資産売却益 50,000 ／ (貸)備品 500,000","(借)備品減価償却累計額 300,000、未収入金 150,000、固定資産売却損 50,000 ／ (貸)備品 500,000"],"e":"帳簿価額は500,000−300,000=¥200,000で、売却価額¥150,000のほうが低いため差額¥50,000は固定資産売却損(借方)です。減価償却累計額を取り消し忘れないようにしましょう。"},{"c":"仕訳","t":"固定資産","q":"×8年7月31日に、備品(取得原価¥600,000、期首の減価償却累計額¥216,000、耐用年数5年、残存価額ゼロ、定額法、間接法で記帳)を¥350,000で売却し、代金は月末に受け取ることとした。当期の減価償却費は月割で計上する。なお、決算日は3月31日である。","ch":["(借)備品減価償却累計額 216,000、減価償却費 40,000、未収入金 350,000 ／ (貸)備品 600,000、固定資産売却益 6,000","(借)備品減価償却累計額 216,000、未収入金 350,000、固定資産売却損 34,000 ／ (貸)備品 600,000","(借)備品減価償却累計額 216,000、減価償却費 120,000、未収入金 350,000 ／ (貸)備品 600,000、固定資産売却益 86,000","(借)備品減価償却累計額 216,000、減価償却費 40,000、売掛金 350,000 ／ (貸)備品 600,000、固定資産売却益 6,000"],"e":"期中売却では期首から売却日までの減価償却費を月割計上します。年間600,000÷5年=120,000、4月〜7月の4か月分で¥40,000です。帳簿価額は600,000−216,000−40,000=¥344,000となり、売却価額¥350,000との差額¥6,000が売却益です。"},{"c":"仕訳","t":"固定資産","q":"×5年11月30日に、車両運搬具(取得原価¥1,200,000、期首の減価償却累計額¥450,000、耐用年数8年、残存価額ゼロ、定額法、間接法で記帳)を¥580,000で売却し、代金は先方振出しの小切手で受け取った。当期の減価償却費は月割で計上する。なお、決算日は3月31日である。","ch":["(借)車両運搬具減価償却累計額 450,000、減価償却費 100,000、現金 580,000、固定資産売却損 70,000 ／ (貸)車両運搬具 1,200,000","(借)車両運搬具減価償却累計額 450,000、減価償却費 100,000、当座預金 580,000、固定資産売却損 70,000 ／ (貸)車両運搬具 1,200,000","(借)車両運搬具減価償却累計額 450,000、現金 580,000、固定資産売却損 170,000 ／ (貸)車両運搬具 1,200,000","(借)車両運搬具減価償却累計額 450,000、減価償却費 87,500、現金 580,000、固定資産売却損 82,500 ／ (貸)車両運搬具 1,200,000"],"e":"年間償却費は1,200,000÷8年=150,000で、4月〜11月の8か月分¥100,000を月割計上します。帳簿価額は1,200,000−450,000−100,000=¥650,000で、売却価額¥580,000との差額¥70,000が売却損です。他人振出小切手は現金勘定で処理します。"},{"c":"仕訳","t":"固定資産","q":"建物の増改築を行い、代金¥800,000を小切手を振り出して支払った。このうち¥600,000は建物の価値を高める資本的支出であり、残額は現状を維持するための収益的支出である。","ch":["(借)建物 600,000、修繕費 200,000 ／ (貸)当座預金 800,000","(借)修繕費 800,000 ／ (貸)当座預金 800,000","(借)建物 800,000 ／ (貸)当座預金 800,000","(借)建物 200,000、修繕費 600,000 ／ (貸)当座預金 800,000"],"e":"資本的支出(価値を高める・耐用年数を延ばす支出)は建物の取得原価に加え、収益的支出(現状維持のための支出)は修繕費勘定(費用)で処理します。"},{"c":"仕訳","t":"固定資産","q":"事務所の窓ガラスが破損したため新しいものに取り替え、代金¥30,000を現金で支払った。","ch":["(借)修繕費 30,000 ／ (貸)現金 30,000","(借)建物 30,000 ／ (貸)現金 30,000","(借)消耗品費 30,000 ／ (貸)現金 30,000","(借)雑費 30,000 ／ (貸)現金 30,000"],"e":"破損箇所を元の状態に戻すための支出は収益的支出なので、修繕費勘定(費用)で処理します。建物の価値を高める支出ではないため、建物には計上しません。"},{"c":"仕訳","t":"固定資産","q":"建物に避難階段を増設する工事(資本的支出に該当)を行い、代金¥500,000を普通預金口座から支払った。","ch":["(借)建物 500,000 ／ (貸)普通預金 500,000","(借)修繕費 500,000 ／ (貸)普通預金 500,000","(借)備品 500,000 ／ (貸)普通預金 500,000","(借)普通預金 500,000 ／ (貸)建物 500,000"],"e":"避難階段の増設のように建物の価値を高める支出は資本的支出なので、費用ではなく建物勘定(資産)に計上します。"},{"c":"仕訳","t":"固定資産","q":"先月売却した土地の未収代金¥2,300,000が、本日、当座預金口座に振り込まれた。","ch":["(借)当座預金 2,300,000 ／ (貸)未収入金 2,300,000","(借)当座預金 2,300,000 ／ (貸)売掛金 2,300,000","(借)当座預金 2,300,000 ／ (貸)土地 2,300,000","(借)未収入金 2,300,000 ／ (貸)当座預金 2,300,000"],"e":"固定資産の売却代金の未収額は未収入金勘定で処理しているため、回収時はこれを貸方に記入して減らします。商品売買の売掛金と区別しましょう。"},{"c":"仕訳","t":"固定資産","q":"営業用のトラック¥2,400,000を購入し、納車費用¥30,000を含めた代金は翌月に支払うこととした。","ch":["(借)車両運搬具 2,430,000 ／ (貸)未払金 2,430,000","(借)車両運搬具 2,400,000、発送費 30,000 ／ (貸)未払金 2,430,000","(借)車両運搬具 2,430,000 ／ (貸)買掛金 2,430,000","(借)車両運搬具 2,400,000、雑費 30,000 ／ (貸)未払金 2,430,000"],"e":"納車費用は車両を使用可能にするための付随費用なので、取得原価に含めて車両運搬具¥2,430,000とします。商品以外の後払いなので貸方は未払金です。"},{"c":"仕訳","t":"固定資産","q":"先月購入した備品の未払代金¥305,000を、小切手を振り出して支払った。","ch":["(借)未払金 305,000 ／ (貸)当座預金 305,000","(借)買掛金 305,000 ／ (貸)当座預金 305,000","(借)備品 305,000 ／ (貸)当座預金 305,000","(借)未払金 305,000 ／ (貸)現金 305,000"],"e":"備品購入時に計上した未払金(負債)を支払って減らすので借方に記入します。備品は購入時にすでに計上済みです。"},{"c":"仕訳","t":"固定資産","q":"土地(帳簿価額¥2,000,000)を¥2,300,000で売却し、代金は月末に受け取ることとした。","ch":["(借)未収入金 2,300,000 ／ (貸)土地 2,000,000、固定資産売却益 300,000","(借)売掛金 2,300,000 ／ (貸)土地 2,000,000、固定資産売却益 300,000","(借)未収入金 2,300,000 ／ (貸)土地 2,300,000","(借)未収入金 2,300,000 ／ (貸)土地 2,000,000、売上 300,000"],"e":"売却価額¥2,300,000と帳簿価額¥2,000,000の差額¥300,000が固定資産売却益です。商品以外の売却代金の未収分は、売掛金ではなく未収入金で処理します。"},{"c":"仕訳","t":"固定資産","q":"土地(帳簿価額¥1,500,000)を¥1,350,000で売却し、代金は普通預金口座に振り込まれた。","ch":["(借)普通預金 1,350,000、固定資産売却損 150,000 ／ (貸)土地 1,500,000","(借)普通預金 1,350,000 ／ (貸)土地 1,350,000","(借)普通預金 1,500,000 ／ (貸)土地 1,350,000、固定資産売却益 150,000","(借)普通預金 1,350,000、雑損 150,000 ／ (貸)土地 1,500,000"],"e":"売却価額¥1,350,000が帳簿価額¥1,500,000を下回るため、差額¥150,000は固定資産売却損(費用)として借方に計上します。土地は帳簿価額の全額を貸方に記入します。"},{"c":"仕訳","t":"固定資産","q":"期首に、備品(取得原価¥360,000、減価償却累計額¥240,000、間接法で記帳)を¥120,000で売却し、代金は現金で受け取った。","ch":["(借)備品減価償却累計額 240,000、現金 120,000 ／ (貸)備品 360,000","(借)備品減価償却累計額 240,000、現金 120,000 ／ (貸)備品 360,000、固定資産売却益 120,000","(借)現金 120,000、固定資産売却損 240,000 ／ (貸)備品 360,000","(借)現金 120,000 ／ (貸)備品 120,000"],"e":"帳簿価額は360,000−240,000=¥120,000で、売却価額と一致するため売却損益は生じません。減価償却累計額を借方で取り消し、備品を取得原価で貸方に記入します。"},{"c":"仕訳","t":"固定資産","q":"決算(年1回)にあたり、建物(取得原価¥3,600,000、耐用年数30年、残存価額ゼロ、定額法)について減価償却を行う。記帳は間接法による。","ch":["(借)減価償却費 120,000 ／ (貸)建物減価償却累計額 120,000","(借)減価償却費 120,000 ／ (貸)建物 120,000","(借)建物減価償却累計額 120,000 ／ (貸)減価償却費 120,000","(借)減価償却費 108,000 ／ (貸)建物減価償却累計額 108,000"],"e":"減価償却費は3,600,000÷30年=¥120,000です。間接法では建物を直接減らさず、建物減価償却累計額勘定の貸方に記入します。"},{"c":"仕訳","t":"固定資産","q":"決算日(3月31日)にあたり、当期の12月1日に取得した備品¥480,000(耐用年数4年、残存価額ゼロ、定額法)について月割で減価償却を行う。記帳は間接法による。","ch":["(借)減価償却費 40,000 ／ (貸)備品減価償却累計額 40,000","(借)減価償却費 120,000 ／ (貸)備品減価償却累計額 120,000","(借)減価償却費 30,000 ／ (貸)備品減価償却累計額 30,000","(借)減価償却費 40,000 ／ (貸)備品 40,000"],"e":"年間の減価償却費は480,000÷4年=¥120,000ですが、当期は12月から3月までの4か月分しか使用していないため、120,000×4/12=¥40,000を月割計上します。"},{"c":"仕訳","t":"固定資産","q":"期首に、建物(取得原価¥5,000,000、減価償却累計額¥2,700,000、間接法で記帳)を¥2,500,000で売却し、代金のうち¥500,000は現金で受け取り、残額は月末に受け取ることとした。","ch":["(借)建物減価償却累計額 2,700,000、現金 500,000、未収入金 2,000,000 ／ (貸)建物 5,000,000、固定資産売却益 200,000","(借)建物減価償却累計額 2,700,000、現金 500,000、売掛金 2,000,000 ／ (貸)建物 5,000,000、固定資産売却益 200,000","(借)現金 500,000、未収入金 2,000,000、固定資産売却損 2,500,000 ／ (貸)建物 5,000,000","(借)建物減価償却累計額 2,700,000、現金 500,000、未収入金 2,000,000 ／ (貸)建物 5,000,000、売上 200,000"],"e":"帳簿価額は5,000,000−2,700,000=¥2,300,000で、売却価額¥2,500,000との差額¥200,000が固定資産売却益です。未収分は未収入金で処理します。"},{"c":"仕訳","t":"固定資産","q":"営業用トラックの定期点検を行い、点検・オイル交換費用¥25,000を現金で支払った。","ch":["(借)修繕費 25,000 ／ (貸)現金 25,000","(借)車両運搬具 25,000 ／ (貸)現金 25,000","(借)旅費交通費 25,000 ／ (貸)現金 25,000","(借)消耗品費 25,000 ／ (貸)現金 25,000"],"e":"定期点検やオイル交換は車両の現状を維持するための収益的支出なので、修繕費勘定(費用)で処理します。車両の価値を高めるわけではないため資産には計上しません。"},{"c":"仕訳","t":"固定資産","q":"店舗の外壁工事を行い、代金¥400,000は月末に支払うこととした。このうち¥300,000は耐用年数を延長させる支出であり、残額は定期的な塗り替えのための支出である。","ch":["(借)建物 300,000、修繕費 100,000 ／ (貸)未払金 400,000","(借)修繕費 400,000 ／ (貸)未払金 400,000","(借)建物 400,000 ／ (貸)未払金 400,000","(借)建物 300,000、修繕費 100,000 ／ (貸)買掛金 400,000"],"e":"耐用年数を延長させる支出¥300,000は資本的支出として建物に計上し、定期的な塗り替え¥100,000は収益的支出として修繕費で処理します。工事代金の後払いは未払金です。"},{"c":"仕訳","t":"固定資産","q":"商品陳列用の棚¥180,000を購入し、送料¥4,000および据付費¥6,000を含めた総額を普通預金口座から支払った。","ch":["(借)備品 190,000 ／ (貸)普通預金 190,000","(借)備品 180,000、発送費 10,000 ／ (貸)普通預金 190,000","(借)備品 184,000、修繕費 6,000 ／ (貸)普通預金 190,000","(借)備品 180,000 ／ (貸)普通預金 180,000"],"e":"商品陳列棚は備品勘定で処理し、送料や据付費などの付随費用も取得原価に含めます。180,000+4,000+6,000=¥190,000が備品の金額です。"},{"c":"仕訳","t":"固定資産","q":"決算にあたり、備品(取得原価¥800,000、耐用年数8年、残存価額ゼロ、定額法)について2年目の減価償却を行う。記帳は間接法による。","ch":["(借)減価償却費 100,000 ／ (貸)備品減価償却累計額 100,000","(借)減価償却費 200,000 ／ (貸)備品減価償却累計額 200,000","(借)減価償却費 100,000 ／ (貸)備品 100,000","(借)備品減価償却累計額 100,000 ／ (貸)減価償却費 100,000"],"e":"定額法では毎期同額を償却するため、2年目も800,000÷8年=¥100,000です。累計額勘定の残高は増えていきますが、毎期の仕訳の金額は変わりません。"},{"c":"仕訳","t":"その他の費用・収益","q":"事務所の電話料金¥12,000が普通預金口座から引き落とされた。","ch":["(借)通信費 12,000 ／ (貸)普通預金 12,000","(借)水道光熱費 12,000 ／ (貸)普通預金 12,000","(借)普通預金 12,000 ／ (貸)通信費 12,000","(借)雑費 12,000 ／ (貸)普通預金 12,000"],"e":"電話料金やインターネット利用料、切手代などは通信費勘定(費用)で処理します。費用の発生は借方に記入します。"},{"c":"仕訳","t":"その他の費用・収益","q":"郵便切手¥5,000を購入し、代金は現金で支払った。なお、切手は購入時に費用として処理している。","ch":["(借)通信費 5,000 ／ (貸)現金 5,000","(借)消耗品費 5,000 ／ (貸)現金 5,000","(借)租税公課 5,000 ／ (貸)現金 5,000","(借)発送費 5,000 ／ (貸)現金 5,000"],"e":"郵便切手は通信のために使うものなので、通信費勘定で処理します。収入印紙(租税公課)と混同しやすいので注意しましょう。"},{"c":"仕訳","t":"その他の費用・収益","q":"従業員が営業のため利用した電車賃・バス代¥3,600を現金で支払った。","ch":["(借)旅費交通費 3,600 ／ (貸)現金 3,600","(借)通信費 3,600 ／ (貸)現金 3,600","(借)雑費 3,600 ／ (貸)現金 3,600","(借)発送費 3,600 ／ (貸)現金 3,600"],"e":"電車賃・バス代・タクシー代や出張の宿泊費などは旅費交通費勘定(費用)で処理します。"},{"c":"仕訳","t":"その他の費用・収益","q":"得意先に商品を発送し、当社負担の発送運賃¥2,500を現金で支払った。","ch":["(借)発送費 2,500 ／ (貸)現金 2,500","(借)仕入 2,500 ／ (貸)現金 2,500","(借)旅費交通費 2,500 ／ (貸)現金 2,500","(借)通信費 2,500 ／ (貸)現金 2,500"],"e":"商品を販売して発送する際の当社負担の運賃は発送費勘定(費用)で処理します。仕入時の引取運賃(仕入に含める)と区別しましょう。"},{"c":"仕訳","t":"その他の費用・収益","q":"新聞折込チラシの代金¥45,000を、普通預金口座から振り込んで支払った。","ch":["(借)広告宣伝費 45,000 ／ (貸)普通預金 45,000","(借)通信費 45,000 ／ (貸)普通預金 45,000","(借)雑費 45,000 ／ (貸)普通預金 45,000","(借)支払手数料 45,000 ／ (貸)普通預金 45,000"],"e":"チラシやウェブ広告など宣伝のための支出は広告宣伝費勘定(費用)で処理します。"},{"c":"仕訳","t":"その他の費用・収益","q":"税理士に対する顧問料¥30,000を現金で支払った。","ch":["(借)支払手数料 30,000 ／ (貸)現金 30,000","(借)受取手数料 30,000 ／ (貸)現金 30,000","(借)給料 30,000 ／ (貸)現金 30,000","(借)雑費 30,000 ／ (貸)現金 30,000"],"e":"税理士や司法書士への報酬、振込手数料などは支払手数料勘定(費用)で処理します。受取手数料は手数料を受け取ったときの収益の勘定です。"},{"c":"仕訳","t":"その他の費用・収益","q":"事務所の今月分の家賃¥150,000が当座預金口座から引き落とされた。","ch":["(借)支払家賃 150,000 ／ (貸)当座預金 150,000","(借)受取家賃 150,000 ／ (貸)当座預金 150,000","(借)支払地代 150,000 ／ (貸)当座預金 150,000","(借)当座預金 150,000 ／ (貸)支払家賃 150,000"],"e":"建物を借りて支払う賃借料は支払家賃勘定(費用)で処理します。土地を借りた場合の支払地代と区別しましょう。"},{"c":"仕訳","t":"その他の費用・収益","q":"所有する建物の一部を貸しており、今月分の家賃¥80,000が普通預金口座に振り込まれた。","ch":["(借)普通預金 80,000 ／ (貸)受取家賃 80,000","(借)受取家賃 80,000 ／ (貸)普通預金 80,000","(借)普通預金 80,000 ／ (貸)支払家賃 80,000","(借)普通預金 80,000 ／ (貸)受取手数料 80,000"],"e":"建物を貸して受け取る家賃は受取家賃勘定(収益)で処理します。収益の発生は貸方に記入し、増えた普通預金を借方に記入します。"},{"c":"仕訳","t":"その他の費用・収益","q":"事務所の電気料金¥18,000が普通預金口座から引き落とされた。","ch":["(借)水道光熱費 18,000 ／ (貸)普通預金 18,000","(借)通信費 18,000 ／ (貸)普通預金 18,000","(借)消耗品費 18,000 ／ (貸)普通預金 18,000","(借)雑費 18,000 ／ (貸)普通預金 18,000"],"e":"電気・ガス・水道の料金は水道光熱費勘定(費用)で処理します。"},{"c":"仕訳","t":"その他の費用・収益","q":"店舗の建物に対する1年分の火災保険料¥36,000を現金で支払った。なお、支払時に全額を費用として処理する。","ch":["(借)保険料 36,000 ／ (貸)現金 36,000","(借)建物 36,000 ／ (貸)現金 36,000","(借)前払保険料 36,000 ／ (貸)現金 36,000","(借)修繕費 36,000 ／ (貸)現金 36,000"],"e":"火災保険料などの掛金は保険料勘定(費用)で処理します。支払時は全額費用とし、決算時に未経過分があれば前払処理を行います。"},{"c":"仕訳","t":"その他の費用・収益","q":"新聞の購読料¥4,000を現金で支払った。なお、金額が少額であるため雑費として処理する。","ch":["(借)雑費 4,000 ／ (貸)現金 4,000","(借)雑損 4,000 ／ (貸)現金 4,000","(借)通信費 4,000 ／ (貸)現金 4,000","(借)広告宣伝費 4,000 ／ (貸)現金 4,000"],"e":"どの費用にもあてはまらない少額の支出は雑費勘定で処理します。雑損は現金過不足の原因が不明な場合などに使う勘定で、別物です。"},{"c":"仕訳","t":"その他の費用・収益","q":"駐車場として借りている土地の今月分の地代¥20,000を現金で支払った。","ch":["(借)支払地代 20,000 ／ (貸)現金 20,000","(借)支払家賃 20,000 ／ (貸)現金 20,000","(借)土地 20,000 ／ (貸)現金 20,000","(借)旅費交通費 20,000 ／ (貸)現金 20,000"],"e":"土地を借りて支払う賃借料は支払地代勘定(費用)で処理します。建物を借りた場合の支払家賃と区別しましょう。"},{"c":"仕訳","t":"その他の費用・収益","q":"取引の仲介を行い、その手数料として¥15,000を先方振出しの小切手で受け取った。","ch":["(借)現金 15,000 ／ (貸)受取手数料 15,000","(借)当座預金 15,000 ／ (貸)受取手数料 15,000","(借)現金 15,000 ／ (貸)売上 15,000","(借)支払手数料 15,000 ／ (貸)現金 15,000"],"e":"仲介などのサービス提供で受け取る手数料は受取手数料勘定(収益)で処理します。他人振出しの小切手は現金勘定です。"},{"c":"仕訳","t":"その他の費用・収益","q":"コピー用紙やボールペンなどの事務用品¥6,000を購入し、代金は現金で支払った。なお、購入時に費用として処理している。","ch":["(借)消耗品費 6,000 ／ (貸)現金 6,000","(借)備品 6,000 ／ (貸)現金 6,000","(借)雑費 6,000 ／ (貸)現金 6,000","(借)通信費 6,000 ／ (貸)現金 6,000"],"e":"コピー用紙や文房具などすぐに使ってなくなるものは消耗品費勘定(費用)で処理します。長期間使用する机やパソコンなどの備品(資産)と区別しましょう。"},{"c":"仕訳","t":"その他の費用・収益","q":"不動産会社を通じて新たに事務所を借り、1か月分の家賃¥100,000と不動産会社への仲介手数料¥50,000を普通預金口座から振り込んだ。","ch":["(借)支払家賃 100,000、支払手数料 50,000 ／ (貸)普通預金 150,000","(借)支払家賃 150,000 ／ (貸)普通預金 150,000","(借)支払家賃 100,000、支払手数料 50,000 ／ (貸)当座預金 150,000","(借)支払手数料 100,000、支払家賃 50,000 ／ (貸)普通預金 150,000"],"e":"家賃¥100,000は支払家賃、不動産会社への仲介手数料¥50,000は支払手数料と、それぞれ別の費用勘定で処理します。"},{"c":"仕訳","t":"訂正仕訳","q":"得意先から売掛金¥30,000を現金で回収した際、誤って借方と貸方を逆に仕訳していたことが判明した。これを訂正する仕訳はどれか。","ch":["(借)現金 60,000 ／ (貸)売掛金 60,000","(借)現金 30,000 ／ (貸)売掛金 30,000","(借)売掛金 60,000 ／ (貸)現金 60,000","(借)売掛金 30,000 ／ (貸)現金 30,000"],"e":"訂正仕訳は「誤った仕訳の逆仕訳」と「正しい仕訳」を合わせたものです。誤りの取消しで(借)現金30,000／(貸)売掛金30,000、正しい仕訳も同じ形なので、合計して金額が2倍の¥60,000になります。"},{"c":"仕訳","t":"訂正仕訳","q":"備品購入代金の未払分¥50,000を現金で支払った際、誤って買掛金の支払いとして処理していたことが判明した。これを訂正する仕訳はどれか。","ch":["(借)未払金 50,000 ／ (貸)買掛金 50,000","(借)買掛金 50,000 ／ (貸)未払金 50,000","(借)未払金 50,000 ／ (貸)現金 50,000","(借)買掛金 50,000 ／ (貸)現金 50,000"],"e":"誤った仕訳(借)買掛金／(貸)現金を取り消し、正しい仕訳(借)未払金／(貸)現金を行うと、現金は相殺されて(借)未払金／(貸)買掛金だけが残ります。備品の未払分は買掛金ではなく未払金です。"},{"c":"仕訳","t":"訂正仕訳","q":"商品¥90,000を掛けで仕入れた際、誤って金額を¥9,000と記帳していたことが判明した。これを訂正する仕訳はどれか。","ch":["(借)仕入 81,000 ／ (貸)買掛金 81,000","(借)仕入 90,000 ／ (貸)買掛金 90,000","(借)仕入 9,000 ／ (貸)買掛金 9,000","(借)買掛金 81,000 ／ (貸)仕入 81,000"],"e":"仕訳の形は正しく金額だけが¥81,000不足しているため、不足分を追加する仕訳を行います。90,000−9,000=¥81,000です。"},{"c":"仕訳","t":"訂正仕訳","q":"商品の注文を受けて手付金¥20,000を現金で受け取った際、誤って売上として処理していたことが判明した。これを訂正する仕訳はどれか。","ch":["(借)売上 20,000 ／ (貸)前受金 20,000","(借)前受金 20,000 ／ (貸)売上 20,000","(借)現金 20,000 ／ (貸)前受金 20,000","(借)売上 20,000 ／ (貸)現金 20,000"],"e":"誤った仕訳(借)現金／(貸)売上を取り消し、正しい仕訳(借)現金／(貸)前受金を行うと、現金は相殺されて(借)売上／(貸)前受金が残ります。商品引渡し前は売上ではなく前受金です。"},{"c":"仕訳","t":"訂正仕訳","q":"土地の売却代金の未収分¥500,000を回収し当座預金に預け入れた際、誤って売掛金の回収として処理していたことが判明した。これを訂正する仕訳はどれか。","ch":["(借)売掛金 500,000 ／ (貸)未収入金 500,000","(借)未収入金 500,000 ／ (貸)売掛金 500,000","(借)当座預金 500,000 ／ (貸)未収入金 500,000","(借)売掛金 500,000 ／ (貸)当座預金 500,000"],"e":"誤って減らした売掛金を借方で元に戻し、本来減らすべき未収入金を貸方で減らします。固定資産の売却代金の未収分は売掛金ではなく未収入金です。"},{"c":"仕訳","t":"訂正仕訳","q":"売掛金¥70,000の回収として当社振出しの小切手を受け取った際、誤って現金勘定で処理していたことが判明した。これを訂正する仕訳はどれか。","ch":["(借)当座預金 70,000 ／ (貸)現金 70,000","(借)現金 70,000 ／ (貸)当座預金 70,000","(借)当座預金 70,000 ／ (貸)売掛金 70,000","(借)現金 70,000 ／ (貸)売掛金 70,000"],"e":"自己振出小切手の受取りは当座預金の増加として処理すべきです。誤って計上した現金を貸方で取り消し、当座預金を借方に計上します。"},{"c":"仕訳","t":"訂正仕訳","q":"商品¥40,000を掛けで仕入れ、引取運賃¥1,000を現金で支払った際、引取運賃を誤って発送費として処理していたことが判明した。これを訂正する仕訳はどれか。","ch":["(借)仕入 1,000 ／ (貸)発送費 1,000","(借)発送費 1,000 ／ (貸)仕入 1,000","(借)仕入 1,000 ／ (貸)現金 1,000","(借)仕入 41,000 ／ (貸)発送費 41,000"],"e":"仕入時の引取運賃は仕入の取得原価に含めるべきです。誤って計上した発送費を貸方で取り消し、仕入に¥1,000を追加します。"},{"c":"仕訳","t":"訂正仕訳","q":"建物の価値を高めるための改良工事の代金¥300,000(資本的支出)を現金で支払った際、誤って全額を修繕費として処理していたことが判明した。これを訂正する仕訳はどれか。","ch":["(借)建物 300,000 ／ (貸)修繕費 300,000","(借)修繕費 300,000 ／ (貸)建物 300,000","(借)建物 300,000 ／ (貸)現金 300,000","(借)修繕費 300,000 ／ (貸)現金 300,000"],"e":"資本的支出は建物(資産)に計上すべきです。誤って計上した修繕費を貸方で取り消し、建物を借方に計上します。現金の支払い自体は正しいので現金は動かしません。"},{"c":"仕訳","t":"訂正仕訳","q":"商品を注文し手付金¥15,000を現金で支払った際、誤って仕入として処理していたことが判明した。これを訂正する仕訳はどれか。","ch":["(借)前払金 15,000 ／ (貸)仕入 15,000","(借)仕入 15,000 ／ (貸)前払金 15,000","(借)前払金 15,000 ／ (貸)現金 15,000","(借)前受金 15,000 ／ (貸)仕入 15,000"],"e":"商品を受け取る前の手付金は前払金(資産)で処理すべきです。誤って計上した仕入を貸方で取り消し、前払金を借方に計上します。"},{"c":"仕訳","t":"訂正仕訳","q":"売掛金¥25,000を現金で回収した取引について、誤って同じ仕訳を二重に記帳していたことが判明した。これを訂正する仕訳はどれか。","ch":["(借)売掛金 25,000 ／ (貸)現金 25,000","(借)現金 25,000 ／ (貸)売掛金 25,000","(借)売掛金 50,000 ／ (貸)現金 50,000","(借)現金 50,000 ／ (貸)売掛金 50,000"],"e":"二重に記帳した場合は、余分な1回分だけを取り消します。誤った仕訳(借)現金／(貸)売掛金の逆仕訳を1回分(¥25,000)行います。"},{"c":"仕訳","t":"給料・税金","q":"従業員への給料¥300,000の支払いにあたり、所得税の源泉徴収額¥12,000を差し引き、残額を現金で支給した。","ch":["(借)給料 300,000 ／ (貸)所得税預り金 12,000、現金 288,000","(借)給料 288,000 ／ (貸)現金 288,000","(借)給料 288,000、所得税預り金 12,000 ／ (貸)現金 300,000","(借)給料 300,000 ／ (貸)仮受金 12,000、現金 288,000"],"e":"給料は控除前の総額¥300,000で費用計上します。源泉徴収した所得税は、会社が従業員に代わって後日納付する義務なので「所得税預り金」(負債)で処理し、手取額¥288,000だけ現金が減少します。"},{"c":"仕訳","t":"給料・税金","q":"従業員への給料¥250,000の支払いにあたり、住民税¥15,000を差し引き、残額を普通預金口座から従業員の口座へ振り込んだ。","ch":["(借)給料 250,000 ／ (貸)住民税預り金 15,000、普通預金 235,000","(借)給料 235,000 ／ (貸)普通預金 235,000","(借)給料 250,000 ／ (貸)従業員立替金 15,000、普通預金 235,000","(借)給料 235,000、住民税預り金 15,000 ／ (貸)普通預金 250,000"],"e":"給料は総額¥250,000で計上します。差し引いた住民税は後日会社が納付するため「住民税預り金」(負債)とし、差額¥235,000が普通預金の減少になります。"},{"c":"仕訳","t":"給料・税金","q":"従業員への給料¥400,000の支払いにあたり、従業員負担分の社会保険料¥24,000を差し引き、残額を当座預金口座から支給した。","ch":["(借)給料 400,000 ／ (貸)社会保険料預り金 24,000、当座預金 376,000","(借)給料 376,000 ／ (貸)当座預金 376,000","(借)給料 400,000 ／ (貸)法定福利費 24,000、当座預金 376,000","(借)給料 400,000、法定福利費 24,000 ／ (貸)社会保険料預り金 24,000、当座預金 400,000"],"e":"給料から差し引いた従業員負担分の社会保険料は「社会保険料預り金」(負債)で処理します。法定福利費は会社負担分の社会保険料に使う勘定科目なので、ここでは使いません。"},{"c":"仕訳","t":"給料・税金","q":"従業員への給料¥350,000の支払いにあたり、源泉所得税¥14,000と従業員負担分の社会保険料¥21,000を差し引き、残額を普通預金口座から振り込んだ。","ch":["(借)給料 350,000 ／ (貸)所得税預り金 14,000、社会保険料預り金 21,000、普通預金 315,000","(借)給料 315,000 ／ (貸)普通預金 315,000","(借)給料 350,000 ／ (貸)所得税預り金 35,000、普通預金 315,000","(借)給料 350,000、所得税預り金 14,000、社会保険料預り金 21,000 ／ (貸)普通預金 385,000"],"e":"給料は総額¥350,000で費用計上し、控除額はそれぞれ「所得税預り金」「社会保険料預り金」という負債の勘定で区別して処理します。手取額は¥350,000−¥14,000−¥21,000=¥315,000です。"},{"c":"仕訳","t":"給料・税金","q":"従業員への給料¥280,000の支払いにあたり、所得税¥11,000と住民税¥18,000を差し引き、残額を普通預金口座から振り込んだ。","ch":["(借)給料 280,000 ／ (貸)所得税預り金 11,000、住民税預り金 18,000、普通預金 251,000","(借)給料 280,000 ／ (貸)所得税預り金 18,000、住民税預り金 11,000、普通預金 251,000","(借)給料 251,000 ／ (貸)普通預金 251,000","(借)給料 251,000、租税公課 29,000 ／ (貸)普通預金 280,000"],"e":"所得税¥11,000は所得税預り金、住民税¥18,000は住民税預り金として貸方に計上します。これらは従業員本人が負担する税金を会社が一時的に預かっているだけなので、会社の費用(租税公課)にはなりません。"},{"c":"仕訳","t":"給料・税金","q":"従業員への給料¥300,000の支払いにあたり、かねて会社が立て替えていた従業員負担の生命保険料¥20,000と源泉所得税¥12,000を差し引き、残額を現金で支給した。","ch":["(借)給料 300,000 ／ (貸)従業員立替金 20,000、所得税預り金 12,000、現金 268,000","(借)給料 300,000 ／ (貸)従業員預り金 20,000、所得税預り金 12,000、現金 268,000","(借)給料 268,000 ／ (貸)現金 268,000","(借)給料 300,000、従業員立替金 20,000 ／ (貸)所得税預り金 12,000、現金 308,000"],"e":"立替払いしていた¥20,000を給料から差し引くことで、資産である「従業員立替金」を回収したことになるため貸方に記入します。源泉所得税は所得税預り金(負債)で処理します。"},{"c":"仕訳","t":"給料・税金","q":"給料支払時に源泉徴収していた従業員の所得税¥12,000を、税務署に現金で納付した。","ch":["(借)所得税預り金 12,000 ／ (貸)現金 12,000","(借)租税公課 12,000 ／ (貸)現金 12,000","(借)法人税等 12,000 ／ (貸)現金 12,000","(借)現金 12,000 ／ (貸)所得税預り金 12,000"],"e":"納付によって従業員から預かっていたお金を支払う義務がなくなるので、負債である所得税預り金を借方に記入して減らします。従業員本人の税金なので、会社の費用(租税公課や法人税等)にはなりません。"},{"c":"仕訳","t":"給料・税金","q":"源泉所得税の納期の特例の適用を受けている当社は、過去6か月分の源泉所得税¥72,000をまとめて普通預金口座から納付した。","ch":["(借)所得税預り金 72,000 ／ (貸)普通預金 72,000","(借)租税公課 72,000 ／ (貸)普通預金 72,000","(借)給料 72,000 ／ (貸)普通預金 72,000","(借)仮払法人税等 72,000 ／ (貸)普通預金 72,000"],"e":"6か月分をまとめて納付しても処理は同じで、給料から預かっていた所得税預り金(負債)を取り崩します。会社の法人税の前払い(仮払法人税等)と混同しないよう注意しましょう。"},{"c":"仕訳","t":"給料・税金","q":"従業員の給料から差し引いていた住民税¥18,000を、現金で納付した。","ch":["(借)住民税預り金 18,000 ／ (貸)現金 18,000","(借)租税公課 18,000 ／ (貸)現金 18,000","(借)法定福利費 18,000 ／ (貸)現金 18,000","(借)現金 18,000 ／ (貸)住民税預り金 18,000"],"e":"給料から差し引いた時点で計上していた住民税預り金(負債)を、納付により借方に記入して減らします。従業員が負担する税金なので会社の費用にはなりません。"},{"c":"仕訳","t":"給料・税金","q":"従業員の給料から差し引いていた社会保険料¥30,000に、会社負担分¥30,000を加えた合計¥60,000を普通預金口座から納付した。","ch":["(借)社会保険料預り金 30,000、法定福利費 30,000 ／ (貸)普通預金 60,000","(借)社会保険料預り金 60,000 ／ (貸)普通預金 60,000","(借)法定福利費 60,000 ／ (貸)普通預金 60,000","(借)社会保険料預り金 30,000、福利厚生費 30,000 ／ (貸)普通預金 60,000"],"e":"従業員負担分は預かっていた社会保険料預り金(負債)の減少、会社負担分は「法定福利費」(費用)として処理します。負担者ごとに勘定科目を分けるのがポイントです。"},{"c":"仕訳","t":"給料・税金","q":"健康保険料¥48,000を当座預金口座から納付した。このうち¥24,000は従業員の給料から差し引いた従業員負担分であり、残額は会社負担分である。","ch":["(借)社会保険料預り金 24,000、法定福利費 24,000 ／ (貸)当座預金 48,000","(借)法定福利費 48,000 ／ (貸)当座預金 48,000","(借)社会保険料預り金 48,000 ／ (貸)当座預金 48,000","(借)社会保険料預り金 24,000、給料 24,000 ／ (貸)当座預金 48,000"],"e":"従業員負担分¥24,000は社会保険料預り金(負債)の取り崩し、会社負担分¥24,000は法定福利費(費用)です。全額を費用または全額を預り金とするのはよくある間違いです。"},{"c":"仕訳","t":"給料・税金","q":"労働保険料のうち、全額が会社負担である労災保険料¥18,000を現金で納付した。","ch":["(借)法定福利費 18,000 ／ (貸)現金 18,000","(借)福利厚生費 18,000 ／ (貸)現金 18,000","(借)社会保険料預り金 18,000 ／ (貸)現金 18,000","(借)保険料 18,000 ／ (貸)現金 18,000"],"e":"社会保険料や労働保険料の会社負担分は、法律で会社に負担が義務づけられているため「法定福利費」(費用)で処理します。従業員負担分がないので預り金は使いません。"},{"c":"仕訳","t":"給料・税金","q":"建物と土地に対する固定資産税¥80,000を現金で納付した。","ch":["(借)租税公課 80,000 ／ (貸)現金 80,000","(借)法人税等 80,000 ／ (貸)現金 80,000","(借)建物 80,000 ／ (貸)現金 80,000","(借)現金 80,000 ／ (貸)租税公課 80,000"],"e":"固定資産税は会社の費用となる税金であり、「租税公課」で処理します。法人税等は会社の利益に対して課される税金に使う勘定科目なので区別しましょう。"},{"c":"仕訳","t":"給料・税金","q":"固定資産税の第1期分¥30,000を、納付書にもとづき当座預金口座から納付した。","ch":["(借)租税公課 30,000 ／ (貸)当座預金 30,000","(借)法人税等 30,000 ／ (貸)当座預金 30,000","(借)仮払金 30,000 ／ (貸)当座預金 30,000","(借)未払法人税等 30,000 ／ (貸)当座預金 30,000"],"e":"固定資産税は納付時に「租税公課」(費用)として処理します。分割納付(第1期分)であっても、納付した金額をそのまま費用に計上します。"},{"c":"仕訳","t":"給料・税金","q":"収入印紙¥4,000を現金で購入し、ただちに契約書に貼付して使用した。","ch":["(借)租税公課 4,000 ／ (貸)現金 4,000","(借)通信費 4,000 ／ (貸)現金 4,000","(借)消耗品費 4,000 ／ (貸)現金 4,000","(借)貯蔵品 4,000 ／ (貸)現金 4,000"],"e":"収入印紙は印紙税という税金を納めるためのものなので「租税公課」(費用)で処理します。郵便切手(通信費)との混同に注意しましょう。"},{"c":"仕訳","t":"給料・税金","q":"郵便局で収入印紙¥10,000と郵便切手¥5,000を購入し、代金は現金で支払った。なお、いずれもただちに使用した。","ch":["(借)租税公課 10,000、通信費 5,000 ／ (貸)現金 15,000","(借)通信費 15,000 ／ (貸)現金 15,000","(借)租税公課 15,000 ／ (貸)現金 15,000","(借)通信費 10,000、租税公課 5,000 ／ (貸)現金 15,000"],"e":"収入印紙は印紙税の納付なので租税公課、郵便切手は郵便サービスの利用なので通信費と、内容に応じて勘定科目を使い分けます。"},{"c":"仕訳","t":"給料・税金","q":"決算日において、購入時に費用として処理していた収入印紙のうち、未使用分が¥3,000あることが判明したため、適切な勘定へ振り替える。","ch":["(借)貯蔵品 3,000 ／ (貸)租税公課 3,000","(借)租税公課 3,000 ／ (貸)貯蔵品 3,000","(借)消耗品費 3,000 ／ (貸)租税公課 3,000","(借)貯蔵品 3,000 ／ (貸)通信費 3,000"],"e":"未使用の収入印紙はまだ費用になっていないので、決算で費用(租税公課)から資産(貯蔵品)へ振り替えます。収入印紙は購入時に租税公課で処理しているため、貸方は租税公課です。"},{"c":"仕訳","t":"給料・税金","q":"法人税等の中間申告を行い、¥200,000を当座預金口座から納付した。","ch":["(借)仮払法人税等 200,000 ／ (貸)当座預金 200,000","(借)法人税等 200,000 ／ (貸)当座預金 200,000","(借)未払法人税等 200,000 ／ (貸)当座預金 200,000","(借)租税公課 200,000 ／ (貸)当座預金 200,000"],"e":"中間申告での納付額は、当期の法人税額がまだ確定していない段階での前払いなので「仮払法人税等」(資産)で処理します。決算で税額が確定したときに精算されます。"},{"c":"仕訳","t":"給料・税金","q":"法人税の中間申告を行い、前年度の法人税額の2分の1に相当する¥150,000を普通預金口座から納付した。","ch":["(借)仮払法人税等 150,000 ／ (貸)普通預金 150,000","(借)法人税等 150,000 ／ (貸)普通預金 150,000","(借)仮払金 150,000 ／ (貸)普通預金 150,000","(借)租税公課 150,000 ／ (貸)普通預金 150,000"],"e":"中間納付額は税額確定前の仮の支払いなので「仮払法人税等」を用います。内容がはっきりしているため、使途不明の支出に使う仮払金ではなく、専用の勘定科目で処理します。"},{"c":"仕訳","t":"給料・税金","q":"決算にあたり、当期の法人税、住民税及び事業税が¥500,000と確定した。なお、中間申告時に¥200,000を納付しており、仮払法人税等として処理している。","ch":["(借)法人税等 500,000 ／ (貸)仮払法人税等 200,000、未払法人税等 300,000","(借)法人税等 300,000 ／ (貸)未払法人税等 300,000","(借)法人税等 500,000 ／ (貸)未払法人税等 500,000","(借)法人税等 500,000 ／ (貸)仮払法人税等 300,000、未払法人税等 200,000"],"e":"確定した税額の全額¥500,000を法人税等(費用)として計上します。中間納付済みの仮払法人税等¥200,000を取り崩し、差額¥300,000がこれから納付する未払法人税等(負債)になります。"},{"c":"仕訳","t":"給料・税金","q":"決算の結果、当期の法人税等が¥450,000と計算された。中間納付額¥180,000は仮払法人税等として処理している。","ch":["(借)法人税等 450,000 ／ (貸)仮払法人税等 180,000、未払法人税等 270,000","(借)法人税等 270,000 ／ (貸)未払法人税等 270,000","(借)法人税等 450,000 ／ (貸)未払法人税等 450,000","(借)法人税等 450,000、仮払法人税等 180,000 ／ (貸)未払法人税等 630,000"],"e":"法人税等は確定額の¥450,000で計上します。中間納付分は資産(仮払法人税等)の減少として貸方に記入し、残りの¥270,000(=450,000−180,000)が未払法人税等となります。"},{"c":"仕訳","t":"給料・税金","q":"法人税の確定申告を行い、決算で計上していた未払法人税等¥300,000を普通預金口座から納付した。","ch":["(借)未払法人税等 300,000 ／ (貸)普通預金 300,000","(借)法人税等 300,000 ／ (貸)普通預金 300,000","(借)仮払法人税等 300,000 ／ (貸)普通預金 300,000","(借)租税公課 300,000 ／ (貸)普通預金 300,000"],"e":"費用(法人税等)は決算のときにすでに計上済みです。納付時は、負債である未払法人税等を借方に記入して減らすだけで、費用を二重に計上しないよう注意します。"},{"c":"仕訳","t":"給料・税金","q":"商品¥200,000(税抜価額)を仕入れ、消費税¥20,000を含めた代金は掛けとした。なお、消費税は税抜方式で記帳している。","ch":["(借)仕入 200,000、仮払消費税 20,000 ／ (貸)買掛金 220,000","(借)仕入 220,000 ／ (貸)買掛金 220,000","(借)仕入 200,000、仮受消費税 20,000 ／ (貸)買掛金 220,000","(借)仕入 200,000、租税公課 20,000 ／ (貸)買掛金 220,000"],"e":"税抜方式では、仕入は税抜価額¥200,000で計上し、支払った消費税は「仮払消費税」(資産)として分けて処理します。買掛金は税込の¥220,000です。"},{"c":"仕訳","t":"給料・税金","q":"商品を仕入れ、税込価額¥110,000(消費税率10%)を現金で支払った。なお、消費税は税抜方式で記帳している。","ch":["(借)仕入 100,000、仮払消費税 10,000 ／ (貸)現金 110,000","(借)仕入 110,000 ／ (貸)現金 110,000","(借)仕入 99,000、仮払消費税 11,000 ／ (貸)現金 110,000","(借)仕入 100,000、仮受消費税 10,000 ／ (貸)現金 110,000"],"e":"税込¥110,000は税抜価額の110%にあたるので、税抜価額は110,000÷1.1=¥100,000、消費税は¥10,000です。支払った消費税は仮払消費税で処理します。"},{"c":"仕訳","t":"給料・税金","q":"商品¥300,000(税抜価額)を売り上げ、消費税¥30,000を含めた代金は掛けとした。なお、消費税は税抜方式で記帳している。","ch":["(借)売掛金 330,000 ／ (貸)売上 300,000、仮受消費税 30,000","(借)売掛金 330,000 ／ (貸)売上 330,000","(借)売掛金 330,000 ／ (貸)売上 300,000、仮払消費税 30,000","(借)売掛金 300,000、仮受消費税 30,000 ／ (貸)売上 330,000"],"e":"売上は税抜価額¥300,000で計上し、受け取った消費税は後で国に納めるため「仮受消費税」(負債)で処理します。売掛金は税込の¥330,000です。"},{"c":"仕訳","t":"給料・税金","q":"商品を売り上げ、税込価額¥440,000(消費税率10%)を現金で受け取った。なお、消費税は税抜方式で記帳している。","ch":["(借)現金 440,000 ／ (貸)売上 400,000、仮受消費税 40,000","(借)現金 440,000 ／ (貸)売上 440,000","(借)現金 440,000 ／ (貸)売上 396,000、仮受消費税 44,000","(借)現金 440,000 ／ (貸)売上 400,000、未払消費税 40,000"],"e":"税込¥440,000を1.1で割ると税抜価額¥400,000、消費税は¥40,000です。売上時に預かった消費税は仮受消費税で処理し、未払消費税は決算で納付額が確定したときに使います。"},{"c":"仕訳","t":"給料・税金","q":"決算にあたり、消費税の納付額を計算する。仮払消費税の残高は¥150,000、仮受消費税の残高は¥240,000であった(税抜方式)。","ch":["(借)仮受消費税 240,000 ／ (貸)仮払消費税 150,000、未払消費税 90,000","(借)仮払消費税 150,000、未払消費税 90,000 ／ (貸)仮受消費税 240,000","(借)仮受消費税 240,000 ／ (貸)仮払消費税 90,000、未払消費税 150,000","(借)租税公課 90,000 ／ (貸)未払消費税 90,000"],"e":"決算では仮受消費税と仮払消費税を相殺し、差額を納付します。仮受¥240,000−仮払¥150,000=¥90,000が納付額となり、「未払消費税」(負債)として計上します。"},{"c":"仕訳","t":"給料・税金","q":"決算にあたり、消費税の納付額を確定する。仮払消費税の残高は¥180,000、仮受消費税の残高は¥310,000であった(税抜方式)。","ch":["(借)仮受消費税 310,000 ／ (貸)仮払消費税 180,000、未払消費税 130,000","(借)仮受消費税 310,000 ／ (貸)仮払消費税 130,000、未払消費税 180,000","(借)仮払消費税 180,000、未払消費税 130,000 ／ (貸)仮受消費税 310,000","(借)未払消費税 130,000 ／ (貸)仮受消費税 130,000"],"e":"仮受消費税¥310,000を借方で全額取り消し、仮払消費税¥180,000を貸方で全額取り消します。差額の¥130,000が納付すべき未払消費税です。"},{"c":"仕訳","t":"給料・税金","q":"消費税の確定申告を行い、決算で計上していた未払消費税¥90,000を現金で納付した。","ch":["(借)未払消費税 90,000 ／ (貸)現金 90,000","(借)仮受消費税 90,000 ／ (貸)現金 90,000","(借)租税公課 90,000 ／ (貸)現金 90,000","(借)仮払消費税 90,000 ／ (貸)現金 90,000"],"e":"決算時に納付額を未払消費税(負債)として計上済みなので、納付時はこれを取り崩すだけです。仮受消費税・仮払消費税は決算時にすでに相殺されています。"},{"c":"仕訳","t":"給料・税金","q":"従業員への給料¥320,000の支払いにあたり、所得税¥13,000、住民税¥17,000、従業員負担分の社会保険料¥20,000を差し引き、残額を普通預金口座から振り込んだ。","ch":["(借)給料 320,000 ／ (貸)所得税預り金 13,000、住民税預り金 17,000、社会保険料預り金 20,000、普通預金 270,000","(借)給料 270,000 ／ (貸)普通預金 270,000","(借)給料 320,000 ／ (貸)所得税預り金 13,000、住民税預り金 17,000、法定福利費 20,000、普通預金 270,000","(借)給料 320,000、預り金 50,000 ／ (貸)普通預金 370,000"],"e":"給料は総額¥320,000で計上し、控除項目はすべて預り金(負債)として貸方に記入します。手取額は¥320,000−¥50,000=¥270,000です。法定福利費は会社負担分に使う科目なので誤りです。"},{"c":"仕訳","t":"債権・債務","q":"取引先に対して¥600,000を貸し付け、現金を渡した。なお、借用証書を受け取っている。","ch":["(借)貸付金 600,000 ／ (貸)現金 600,000","(借)借入金 600,000 ／ (貸)現金 600,000","(借)現金 600,000 ／ (貸)貸付金 600,000","(借)手形貸付金 600,000 ／ (貸)現金 600,000"],"e":"お金を貸したときは、後で返してもらう権利(債権)として「貸付金」(資産)を借方に計上します。借用証書による貸付けなので、手形貸付金ではなく貸付金を使います。"},{"c":"仕訳","t":"債権・債務","q":"取引先への貸付金¥600,000について、満期日に利息とともに現金で回収した。なお、貸付期間は9か月、利率は年2%である。","ch":["(借)現金 609,000 ／ (貸)貸付金 600,000、受取利息 9,000","(借)現金 612,000 ／ (貸)貸付金 600,000、受取利息 12,000","(借)現金 609,000 ／ (貸)貸付金 600,000、支払利息 9,000","(借)現金 600,000、受取利息 9,000 ／ (貸)貸付金 609,000"],"e":"利息は月割計算で¥600,000×2%×9か月/12か月=¥9,000です。受け取る利息は「受取利息」(収益)として貸方に計上します。年利をそのまま掛けないよう注意しましょう。"},{"c":"仕訳","t":"債権・債務","q":"銀行から¥1,000,000を借り入れ、同額が当座預金口座に入金された。なお、借用証書を差し入れている。","ch":["(借)当座預金 1,000,000 ／ (貸)借入金 1,000,000","(借)借入金 1,000,000 ／ (貸)当座預金 1,000,000","(借)当座預金 1,000,000 ／ (貸)手形借入金 1,000,000","(借)当座預金 1,000,000 ／ (貸)貸付金 1,000,000"],"e":"お金を借りたときは、後で返す義務(債務)として「借入金」(負債)を貸方に計上します。当座預金という資産が増えるので借方は当座預金です。"},{"c":"仕訳","t":"債権・債務","q":"銀行からの借入金¥1,000,000を、利息とともに当座預金口座から返済した。なお、借入期間は8か月、利率は年3%である。","ch":["(借)借入金 1,000,000、支払利息 20,000 ／ (貸)当座預金 1,020,000","(借)借入金 1,020,000 ／ (貸)当座預金 1,020,000","(借)借入金 1,000,000、支払利息 30,000 ／ (貸)当座預金 1,030,000","(借)借入金 1,000,000、受取利息 20,000 ／ (貸)当座預金 1,020,000"],"e":"利息は¥1,000,000×3%×8か月/12か月=¥20,000です。支払う利息は「支払利息」(費用)として借方に計上し、元金と合わせて¥1,020,000が当座預金から減少します。"},{"c":"仕訳","t":"債権・債務","q":"銀行から¥800,000を借り入れ、利息¥12,000を差し引かれた残額が普通預金口座に入金された。","ch":["(借)普通預金 788,000、支払利息 12,000 ／ (貸)借入金 800,000","(借)普通預金 788,000 ／ (貸)借入金 788,000","(借)普通預金 800,000 ／ (貸)借入金 788,000、受取利息 12,000","(借)普通預金 788,000、受取利息 12,000 ／ (貸)借入金 800,000"],"e":"借入金は返済義務のある¥800,000の全額で計上します。差し引かれた利息¥12,000は支払利息(費用)、実際の入金額は差額の¥788,000です。"},{"c":"仕訳","t":"債権・債務","q":"当社の役員に対して¥500,000を貸し付け、小切手を振り出して渡した。なお、役員に対する貸付けであることを明示する勘定科目を用いること。","ch":["(借)役員貸付金 500,000 ／ (貸)当座預金 500,000","(借)役員借入金 500,000 ／ (貸)当座預金 500,000","(借)役員貸付金 500,000 ／ (貸)現金 500,000","(借)貸付金 500,000 ／ (貸)現金 500,000"],"e":"役員への貸付けは「役員貸付金」(資産)で処理します。小切手を振り出したときは当座預金の減少となる点にも注意しましょう。"},{"c":"仕訳","t":"債権・債務","q":"取引先に¥400,000を貸し付け、同額の約束手形を受け取り、現金を渡した。","ch":["(借)手形貸付金 400,000 ／ (貸)現金 400,000","(借)受取手形 400,000 ／ (貸)現金 400,000","(借)貸付金 400,000 ／ (貸)現金 400,000","(借)手形借入金 400,000 ／ (貸)現金 400,000"],"e":"借用証書の代わりに手形を受け取って貸し付けた場合は「手形貸付金」(資産)を使います。受取手形は商品売買代金として手形を受け取ったときに使う勘定科目なので区別が必要です。"},{"c":"仕訳","t":"債権・債務","q":"銀行から¥700,000を借り入れ、同額の約束手形を振り出した。借入額は普通預金口座に入金された。","ch":["(借)普通預金 700,000 ／ (貸)手形借入金 700,000","(借)普通預金 700,000 ／ (貸)支払手形 700,000","(借)普通預金 700,000 ／ (貸)借入金 700,000","(借)手形借入金 700,000 ／ (貸)普通預金 700,000"],"e":"手形を振り出して借り入れた場合は「手形借入金」(負債)で処理します。支払手形は商品売買にともなって手形を振り出したときの勘定科目なので使いません。"},{"c":"仕訳","t":"債権・債務","q":"手形借入金¥700,000を利息¥7,000とともに当座預金口座から返済し、手形の返却を受けた。","ch":["(借)手形借入金 700,000、支払利息 7,000 ／ (貸)当座預金 707,000","(借)支払手形 700,000、支払利息 7,000 ／ (貸)当座預金 707,000","(借)手形借入金 707,000 ／ (貸)当座預金 707,000","(借)手形借入金 700,000 ／ (貸)当座預金 693,000、受取利息 7,000"],"e":"返済によって手形借入金(負債)が減少し、支払った利息¥7,000は支払利息(費用)として借方に計上します。合計¥707,000が当座預金の減少です。"},{"c":"仕訳","t":"債権・債務","q":"不用になった備品(帳簿価額¥50,000)を¥50,000で売却し、代金は月末に受け取ることにした。","ch":["(借)未収入金 50,000 ／ (貸)備品 50,000","(借)売掛金 50,000 ／ (貸)備品 50,000","(借)未払金 50,000 ／ (貸)備品 50,000","(借)備品 50,000 ／ (貸)未収入金 50,000"],"e":"商品以外のもの(備品など)を売却して代金を後日受け取る場合は「未収入金」(資産)を使います。売掛金は商品を売り上げたときの未回収代金に使う勘定科目です。"},{"c":"仕訳","t":"債権・債務","q":"土地(帳簿価額¥2,000,000)を¥2,300,000で売却し、代金は月末に受け取ることにした。","ch":["(借)未収入金 2,300,000 ／ (貸)土地 2,000,000、固定資産売却益 300,000","(借)売掛金 2,300,000 ／ (貸)土地 2,000,000、固定資産売却益 300,000","(借)未収入金 2,300,000 ／ (貸)土地 2,300,000","(借)未収入金 2,000,000、固定資産売却損 300,000 ／ (貸)土地 2,300,000"],"e":"土地は帳簿価額¥2,000,000で貸方に記入して減らし、売却価額との差額¥300,000は固定資産売却益(収益)です。商品以外の売却代金なので未収入金を使います。"},{"c":"仕訳","t":"債権・債務","q":"事務用のパソコン¥250,000を購入し、代金は翌月末に支払うことにした。","ch":["(借)備品 250,000 ／ (貸)未払金 250,000","(借)備品 250,000 ／ (貸)買掛金 250,000","(借)仕入 250,000 ／ (貸)買掛金 250,000","(借)消耗品費 250,000 ／ (貸)未払金 250,000"],"e":"商品以外のもの(備品など)を購入して代金を後日支払う場合は「未払金」(負債)を使います。買掛金は商品を仕入れたときの未払代金に使う勘定科目なので区別しましょう。"},{"c":"仕訳","t":"債権・債務","q":"事務用の文房具¥8,000を購入し、代金は月末に支払うことにした。なお、文房具は費用として処理する。","ch":["(借)消耗品費 8,000 ／ (貸)未払金 8,000","(借)消耗品費 8,000 ／ (貸)買掛金 8,000","(借)仕入 8,000 ／ (貸)買掛金 8,000","(借)備品 8,000 ／ (貸)未払金 8,000"],"e":"文房具は販売用の商品ではないので、後払いの代金は未払金で処理します。仕入・買掛金は商品売買に使う勘定科目です。"},{"c":"仕訳","t":"債権・債務","q":"先月購入した備品の代金(未払金)¥250,000を、小切手を振り出して支払った。","ch":["(借)未払金 250,000 ／ (貸)当座預金 250,000","(借)買掛金 250,000 ／ (貸)当座預金 250,000","(借)未払金 250,000 ／ (貸)現金 250,000","(借)備品 250,000 ／ (貸)当座預金 250,000"],"e":"支払いによって負債である未払金が減少するため、借方に記入します。小切手の振出しは当座預金の減少です。備品は購入時に計上済みなので、再度計上してはいけません。"},{"c":"仕訳","t":"債権・債務","q":"先月売却した備品の代金(未収入金)¥50,000を、現金で受け取った。","ch":["(借)現金 50,000 ／ (貸)未収入金 50,000","(借)現金 50,000 ／ (貸)売掛金 50,000","(借)未収入金 50,000 ／ (貸)現金 50,000","(借)現金 50,000 ／ (貸)未払金 50,000"],"e":"代金の回収によって資産である未収入金が減少するので、貸方に記入します。備品売却の代金なので売掛金ではありません。"},{"c":"仕訳","t":"債権・債務","q":"商品¥500,000を注文し、手付金として¥100,000を現金で支払った。","ch":["(借)前払金 100,000 ／ (貸)現金 100,000","(借)仕入 100,000 ／ (貸)現金 100,000","(借)前受金 100,000 ／ (貸)現金 100,000","(借)前払費用 100,000 ／ (貸)現金 100,000"],"e":"手付金を支払うと、後で商品を受け取る権利が生じるため「前払金」(資産)で処理します。商品はまだ受け取っていないので、注文時点では仕入を計上しません。"},{"c":"仕訳","t":"債権・債務","q":"かねて注文していた商品¥500,000を受け取り、注文時に支払った手付金¥100,000を差し引いた残額は掛けとした。","ch":["(借)仕入 500,000 ／ (貸)前払金 100,000、買掛金 400,000","(借)仕入 500,000 ／ (貸)買掛金 500,000","(借)仕入 400,000 ／ (貸)買掛金 400,000","(借)仕入 500,000 ／ (貸)前受金 100,000、買掛金 400,000"],"e":"商品を受け取った時点で仕入¥500,000を計上します。注文時の前払金¥100,000は商品受取りにより権利が消滅するので貸方に記入し、残額¥400,000が買掛金となります。"},{"c":"仕訳","t":"債権・債務","q":"得意先から商品¥300,000の注文を受け、手付金として¥60,000が普通預金口座に振り込まれた。","ch":["(借)普通預金 60,000 ／ (貸)前受金 60,000","(借)普通預金 60,000 ／ (貸)売上 60,000","(借)普通預金 60,000 ／ (貸)前払金 60,000","(借)普通預金 60,000 ／ (貸)仮受金 60,000"],"e":"手付金を受け取ると、後で商品を引き渡す義務が生じるため「前受金」(負債)で処理します。商品はまだ引き渡していないので売上は計上しません。"},{"c":"仕訳","t":"債権・債務","q":"かねて注文を受けていた商品¥300,000を得意先に引き渡し、受け取っていた手付金¥60,000を差し引いた残額は掛けとした。","ch":["(借)前受金 60,000、売掛金 240,000 ／ (貸)売上 300,000","(借)売掛金 300,000 ／ (貸)売上 300,000","(借)前払金 60,000、売掛金 240,000 ／ (貸)売上 300,000","(借)売掛金 240,000 ／ (貸)売上 240,000"],"e":"商品を引き渡した時点で売上¥300,000を計上します。引渡しにより前受金(負債)の義務が果たされたので借方に記入し、残額¥240,000が売掛金となります。"},{"c":"仕訳","t":"債権・債務","q":"従業員の出張にあたり、旅費の概算額¥80,000を現金で渡した。","ch":["(借)仮払金 80,000 ／ (貸)現金 80,000","(借)旅費交通費 80,000 ／ (貸)現金 80,000","(借)従業員立替金 80,000 ／ (貸)現金 80,000","(借)前払金 80,000 ／ (貸)現金 80,000"],"e":"概算額を渡した時点では金額も内容も確定していないため、「仮払金」(資産)で処理します。旅費交通費は出張から戻って金額が確定したときに計上します。"},{"c":"仕訳","t":"債権・債務","q":"出張から戻った従業員が旅費を精算し、旅費は¥72,000と確定した。出発時に概算額¥80,000を仮払金として渡しており、残額¥8,000は現金で返金を受けた。","ch":["(借)旅費交通費 72,000、現金 8,000 ／ (貸)仮払金 80,000","(借)旅費交通費 80,000 ／ (貸)仮払金 80,000","(借)旅費交通費 72,000 ／ (貸)仮払金 72,000","(借)旅費交通費 72,000、現金 8,000 ／ (貸)仮受金 80,000"],"e":"精算時に確定した¥72,000を旅費交通費(費用)に計上し、返金¥8,000は現金の増加とします。仮払金は渡した全額¥80,000を貸方に記入して取り崩します。"},{"c":"仕訳","t":"債権・債務","q":"出張から戻った従業員が旅費を精算したところ、旅費は¥56,000であった。出発時に概算額¥50,000を仮払金として渡しており、不足額は現金で支払った。","ch":["(借)旅費交通費 56,000 ／ (貸)仮払金 50,000、現金 6,000","(借)旅費交通費 56,000 ／ (貸)仮払金 56,000","(借)旅費交通費 50,000、現金 6,000 ／ (貸)仮払金 56,000","(借)旅費交通費 6,000 ／ (貸)現金 6,000"],"e":"確定した旅費¥56,000を全額費用に計上します。仮払金¥50,000を取り崩してもなお¥6,000不足するため、その分を現金で追加払いしたと考えます。"},{"c":"仕訳","t":"債権・債務","q":"出張中の従業員から当座預金口座に¥300,000の入金があったが、その内容は不明である。","ch":["(借)当座預金 300,000 ／ (貸)仮受金 300,000","(借)当座預金 300,000 ／ (貸)売掛金 300,000","(借)当座預金 300,000 ／ (貸)仮払金 300,000","(借)仮受金 300,000 ／ (貸)当座預金 300,000"],"e":"内容が不明な入金は、判明するまで「仮受金」(負債)で処理します。仮払金は当社がお金を支払ったときに使う勘定科目なので混同しないよう注意しましょう。"},{"c":"仕訳","t":"債権・債務","q":"かねて内容不明の入金として仮受金で処理していた¥300,000は、得意先に対する売掛金の回収であることが判明した。","ch":["(借)仮受金 300,000 ／ (貸)売掛金 300,000","(借)売掛金 300,000 ／ (貸)仮受金 300,000","(借)仮受金 300,000 ／ (貸)売上 300,000","(借)仮払金 300,000 ／ (貸)売掛金 300,000"],"e":"内容が判明したら、仮受金(負債)を借方に記入して取り崩し、正しい勘定科目に振り替えます。売掛金の回収なので、資産である売掛金を貸方に記入して減らします。"},{"c":"仕訳","t":"債権・債務","q":"仮受金として処理していた¥200,000について、¥150,000は売掛金の回収、¥50,000は商品注文の手付金であることが判明した。","ch":["(借)仮受金 200,000 ／ (貸)売掛金 150,000、前受金 50,000","(借)仮受金 200,000 ／ (貸)売掛金 150,000、前払金 50,000","(借)仮受金 200,000 ／ (貸)売掛金 50,000、前受金 150,000","(借)売掛金 150,000、前受金 50,000 ／ (貸)仮受金 200,000"],"e":"仮受金¥200,000を全額取り崩し、売掛金の回収分¥150,000と手付金¥50,000に振り分けます。受け取った手付金は前受金(負債)であり、前払金(資産)ではありません。"},{"c":"仕訳","t":"債権・債務","q":"従業員が負担すべき生命保険料¥15,000を、会社が現金で立て替えて支払った。","ch":["(借)従業員立替金 15,000 ／ (貸)現金 15,000","(借)保険料 15,000 ／ (貸)現金 15,000","(借)従業員預り金 15,000 ／ (貸)現金 15,000","(借)仮払金 15,000 ／ (貸)現金 15,000"],"e":"従業員の代わりに支払ったお金は後で返してもらう権利なので「従業員立替金」(資産)で処理します。会社の費用ではないため保険料勘定は使いません。"},{"c":"仕訳","t":"債権・債務","q":"従業員への給料¥250,000の支払いにあたり、かねて立て替えていた¥15,000を差し引き、残額を普通預金口座から振り込んだ。","ch":["(借)給料 250,000 ／ (貸)従業員立替金 15,000、普通預金 235,000","(借)給料 235,000 ／ (貸)普通預金 235,000","(借)給料 250,000 ／ (貸)所得税預り金 15,000、普通預金 235,000","(借)給料 250,000、従業員立替金 15,000 ／ (貸)普通預金 265,000"],"e":"給料は総額¥250,000で計上します。給料から差し引くことで立替金を回収したことになるため、資産である従業員立替金を貸方に記入して減らします。"},{"c":"仕訳","t":"債権・債務","q":"商品¥100,000を売り上げ、代金は掛けとした。その際、先方負担の発送費¥3,000を現金で支払った。なお、発送費は立替金勘定で処理する。","ch":["(借)売掛金 100,000、立替金 3,000 ／ (貸)売上 100,000、現金 3,000","(借)売掛金 100,000、発送費 3,000 ／ (貸)売上 100,000、現金 3,000","(借)売掛金 103,000 ／ (貸)売上 103,000","(借)売掛金 100,000、仮払金 3,000 ／ (貸)売上 100,000、現金 3,000"],"e":"先方(買い手)が負担すべき発送費を当社が代わりに支払ったので、立替金(資産)で処理します。当社負担であれば発送費(費用)になりますが、この問題では先方負担です。"},{"c":"仕訳","t":"債権・債務","q":"事務所の賃借にあたり、敷金¥240,000を現金で差し入れた。","ch":["(借)差入保証金 240,000 ／ (貸)現金 240,000","(借)支払家賃 240,000 ／ (貸)現金 240,000","(借)支払手数料 240,000 ／ (貸)現金 240,000","(借)前払金 240,000 ／ (貸)現金 240,000"],"e":"敷金は退去時に返還されるお金なので、費用ではなく「差入保証金」(資産)で処理します。家賃や手数料と混同しないよう注意しましょう。"},{"c":"仕訳","t":"債権・債務","q":"事務所の賃借契約を結び、敷金¥300,000、不動産会社への仲介手数料¥100,000、1か月分の家賃¥100,000を普通預金口座から支払った。","ch":["(借)差入保証金 300,000、支払手数料 100,000、支払家賃 100,000 ／ (貸)普通預金 500,000","(借)支払家賃 500,000 ／ (貸)普通預金 500,000","(借)差入保証金 400,000、支払家賃 100,000 ／ (貸)普通預金 500,000","(借)差入保証金 300,000、支払家賃 200,000 ／ (貸)普通預金 500,000"],"e":"敷金は返還されるので差入保証金(資産)、仲介手数料は支払手数料(費用)、家賃は支払家賃(費用)と、内容ごとに勘定科目を分けます。"},{"c":"仕訳","t":"債権・債務","q":"事務所の賃貸借契約を解約し、差し入れていた敷金¥300,000のうち、修繕費¥80,000を差し引かれた残額が普通預金口座に返金された。","ch":["(借)普通預金 220,000、修繕費 80,000 ／ (貸)差入保証金 300,000","(借)普通預金 220,000 ／ (貸)差入保証金 220,000","(借)普通預金 300,000 ／ (貸)差入保証金 220,000、修繕費 80,000","(借)差入保証金 300,000 ／ (貸)普通預金 220,000、修繕費 80,000"],"e":"差入保証金は差し入れていた全額¥300,000を貸方に記入して減らします。差し引かれた¥80,000は修繕費(費用)として借方に計上し、実際の入金は¥220,000です。"},{"c":"仕訳","t":"債権・債務","q":"商品¥40,000を売り上げ、代金として自治体が発行した商品券を受け取った。","ch":["(借)受取商品券 40,000 ／ (貸)売上 40,000","(借)現金 40,000 ／ (貸)売上 40,000","(借)売掛金 40,000 ／ (貸)売上 40,000","(借)売上 40,000 ／ (貸)受取商品券 40,000"],"e":"他者が発行した商品券を受け取ったときは、後日発行元に代金を請求できる権利として「受取商品券」(資産)で処理します。"},{"c":"仕訳","t":"債権・債務","q":"商品¥60,000を売り上げ、代金のうち¥50,000は自治体発行の商品券で受け取り、残額は現金で受け取った。","ch":["(借)受取商品券 50,000、現金 10,000 ／ (貸)売上 60,000","(借)現金 60,000 ／ (貸)売上 60,000","(借)受取商品券 60,000 ／ (貸)売上 60,000","(借)受取商品券 10,000、現金 50,000 ／ (貸)売上 60,000"],"e":"売上は¥60,000で計上し、受け取った手段ごとに受取商品券¥50,000と現金¥10,000に分けて借方に記入します。"},{"c":"仕訳","t":"債権・債務","q":"保有していた商品券¥90,000について発行元に精算を請求し、同額が普通預金口座に振り込まれた。","ch":["(借)普通預金 90,000 ／ (貸)受取商品券 90,000","(借)普通預金 90,000 ／ (貸)売上 90,000","(借)受取商品券 90,000 ／ (貸)普通預金 90,000","(借)普通預金 90,000 ／ (貸)未収入金 90,000"],"e":"精算により商品券を換金する権利がなくなるので、資産である受取商品券を貸方に記入して減らします。売上は商品を売ったときにすでに計上済みです。"},{"c":"仕訳","t":"債権・債務","q":"取引先への貸付金¥900,000(貸付期間6か月、利率年4%)について、満期日に利息とともに普通預金口座に振り込まれた。","ch":["(借)普通預金 918,000 ／ (貸)貸付金 900,000、受取利息 18,000","(借)普通預金 936,000 ／ (貸)貸付金 900,000、受取利息 36,000","(借)普通預金 918,000 ／ (貸)借入金 900,000、受取利息 18,000","(借)貸付金 900,000、受取利息 18,000 ／ (貸)普通預金 918,000"],"e":"利息は¥900,000×4%×6か月/12か月=¥18,000です。貸付期間が6か月なので、年利率による利息¥36,000の半分になります。元金と利息の合計¥918,000が入金されます。"},{"c":"仕訳","t":"株式会社","q":"会社の設立にあたり、株式100株を1株あたり¥50,000で発行し、全株式について払込みを受け、払込金は当座預金とした。なお、払込金額の全額を資本金とする。","ch":["(借)当座預金 5,000,000 ／ (貸)資本金 5,000,000","(借)資本金 5,000,000 ／ (貸)当座預金 5,000,000","(借)当座預金 5,000,000 ／ (貸)借入金 5,000,000","(借)当座預金 5,000,000 ／ (貸)資本金 2,500,000、資本準備金 2,500,000"],"e":"払込金額は100株×¥50,000=¥5,000,000です。株主からの出資は返済義務のない元手なので、全額を「資本金」(純資産)として貸方に計上します。"},{"c":"仕訳","t":"株式会社","q":"会社の設立にあたり、株式200株を1株につき¥30,000で発行し、全株式の払込みを受け、払込金は普通預金とした。なお、払込金額の全額を資本金とする。","ch":["(借)普通預金 6,000,000 ／ (貸)資本金 6,000,000","(借)普通預金 6,000,000 ／ (貸)借入金 6,000,000","(借)資本金 6,000,000 ／ (貸)普通預金 6,000,000","(借)現金 6,000,000 ／ (貸)資本金 6,000,000"],"e":"払込金額は200株×¥30,000=¥6,000,000で、全額を資本金とします。株主からの払込みは借入金と異なり返済する必要がない点がポイントです。"},{"c":"仕訳","t":"株式会社","q":"事業拡大のため、新たに株式50株を1株につき¥60,000で発行し(増資)、払込金は当座預金とした。なお、払込金額の全額を資本金とする。","ch":["(借)当座預金 3,000,000 ／ (貸)資本金 3,000,000","(借)当座預金 3,000,000 ／ (貸)利益準備金 3,000,000","(借)資本金 3,000,000 ／ (貸)当座預金 3,000,000","(借)当座預金 3,000,000 ／ (貸)繰越利益剰余金 3,000,000"],"e":"増資でも設立時と同じく、払込金額50株×¥60,000=¥3,000,000を資本金として貸方に計上します。利益準備金や繰越利益剰余金は会社の利益から生じるもので、株主の出資とは異なります。"},{"c":"仕訳","t":"株式会社","q":"取締役会の決議により、新たに株式100株を1株あたり¥40,000で発行して増資を行い、払込金は普通預金とした。なお、払込金額の全額を資本金とする。","ch":["(借)普通預金 4,000,000 ／ (貸)資本金 4,000,000","(借)普通預金 4,000,000 ／ (貸)借入金 4,000,000","(借)普通預金 4,000,000 ／ (貸)資本金 2,000,000、利益準備金 2,000,000","(借)資本金 4,000,000 ／ (貸)普通預金 4,000,000"],"e":"払込金額は100株×¥40,000=¥4,000,000です。「全額を資本金とする」という指示どおり、資本金以外の科目には振り分けません。"},{"c":"仕訳","t":"株式会社","q":"株主総会において、繰越利益剰余金を財源として株主への配当¥1,000,000と、利益準備金の積立て¥100,000が決議された。","ch":["(借)繰越利益剰余金 1,100,000 ／ (貸)未払配当金 1,000,000、利益準備金 100,000","(借)繰越利益剰余金 1,000,000 ／ (貸)未払配当金 1,000,000","(借)繰越利益剰余金 1,100,000 ／ (貸)現金 1,000,000、利益準備金 100,000","(借)未払配当金 1,000,000、利益準備金 100,000 ／ (貸)繰越利益剰余金 1,100,000"],"e":"決議の時点では配当金はまだ支払っていないので「未払配当金」(負債)で処理します。配当額と利益準備金の合計¥1,100,000だけ繰越利益剰余金が減少します。"},{"c":"仕訳","t":"株式会社","q":"株主総会において、繰越利益剰余金から¥800,000の配当を行うことが決議された。あわせて、会社法の規定にもとづき配当額の10分の1を利益準備金として積み立てる。","ch":["(借)繰越利益剰余金 880,000 ／ (貸)未払配当金 800,000、利益準備金 80,000","(借)繰越利益剰余金 800,000 ／ (貸)未払配当金 720,000、利益準備金 80,000","(借)繰越利益剰余金 800,000 ／ (貸)未払配当金 800,000","(借)繰越利益剰余金 880,000 ／ (貸)未払配当金 800,000、資本金 80,000"],"e":"利益準備金は配当額¥800,000の10分の1で¥80,000です。配当¥800,000と準備金¥80,000の合計¥880,000が繰越利益剰余金から減少します。配当額の中から準備金を差し引くのではない点に注意しましょう。"},{"c":"仕訳","t":"株式会社","q":"株主総会において、繰越利益剰余金から¥300,000の配当を行うことが決議された。なお、利益準備金の積立ては行わないものとする。","ch":["(借)繰越利益剰余金 300,000 ／ (貸)未払配当金 300,000","(借)繰越利益剰余金 300,000 ／ (貸)当座預金 300,000","(借)未払配当金 300,000 ／ (貸)繰越利益剰余金 300,000","(借)損益 300,000 ／ (貸)未払配当金 300,000"],"e":"配当の決議時点では支払いはまだ行われていないため、支払義務を「未払配当金」(負債)として計上します。実際にお金が動くのは後日の支払時です。"},{"c":"仕訳","t":"株式会社","q":"株主総会で決議されていた配当金¥1,000,000を、当座預金口座から支払った。","ch":["(借)未払配当金 1,000,000 ／ (貸)当座預金 1,000,000","(借)繰越利益剰余金 1,000,000 ／ (貸)当座預金 1,000,000","(借)未払金 1,000,000 ／ (貸)当座預金 1,000,000","(借)利益準備金 1,000,000 ／ (貸)当座預金 1,000,000"],"e":"配当の決議時に計上した未払配当金(負債)を、支払いによって取り崩します。繰越利益剰余金は決議時にすでに減らしているため、支払時に再度減らすと二重計上になります。"},{"c":"仕訳","t":"株式会社","q":"株主総会で決議されていた配当金¥300,000を、普通預金口座から株主に支払った。","ch":["(借)未払配当金 300,000 ／ (貸)普通預金 300,000","(借)繰越利益剰余金 300,000 ／ (貸)普通預金 300,000","(借)未払配当金 300,000 ／ (貸)現金 300,000","(借)未払金 300,000 ／ (貸)普通預金 300,000"],"e":"支払時は決議時に計上した未払配当金を減らすだけです。配当に関する未払いは、未払金ではなく専用の「未払配当金」を使います。"},{"c":"仕訳","t":"株式会社","q":"決算の結果、当期純利益¥800,000を計上した。損益勘定から資本の勘定へ振り替える仕訳として正しいものはどれか。","ch":["(借)損益 800,000 ／ (貸)繰越利益剰余金 800,000","(借)繰越利益剰余金 800,000 ／ (貸)損益 800,000","(借)損益 800,000 ／ (貸)資本金 800,000","(借)損益 800,000 ／ (貸)利益準備金 800,000"],"e":"当期純利益は株式会社では「繰越利益剰余金」(純資産)へ振り替えます。利益が出ると損益勘定は貸方残高になるため、借方を損益として残高をゼロにします。"},{"c":"仕訳","t":"株式会社","q":"決算の結果、当期純損失¥200,000を計上した。損益勘定から資本の勘定へ振り替える仕訳として正しいものはどれか。","ch":["(借)繰越利益剰余金 200,000 ／ (貸)損益 200,000","(借)損益 200,000 ／ (貸)繰越利益剰余金 200,000","(借)資本金 200,000 ／ (貸)損益 200,000","(借)損益 200,000 ／ (貸)資本金 200,000"],"e":"純損失の場合は損益勘定が借方残高になるため、貸方を損益として振り替えます。損失は繰越利益剰余金の減少(借方)となり、資本金は直接減らしません。"},{"c":"仕訳","t":"株式会社","q":"増資の際に普通預金口座へ入金された払込金¥2,000,000について、誤って借方を普通預金、貸方を借入金として記帳していたことが判明した。これを訂正するための仕訳として正しいものはどれか。","ch":["(借)借入金 2,000,000 ／ (貸)資本金 2,000,000","(借)資本金 2,000,000 ／ (貸)借入金 2,000,000","(借)普通預金 2,000,000 ／ (貸)資本金 2,000,000","(借)借入金 2,000,000 ／ (貸)普通預金 2,000,000"],"e":"誤って計上した借入金を借方に記入して取り消し、正しい資本金を貸方に計上します。普通預金の記帳は正しいので、訂正仕訳では動かしません。"},{"c":"仕訳","t":"株式会社","q":"かねて決議されていた配当金¥500,000を当座預金口座から支払った際、誤って借方を繰越利益剰余金として記帳していた。これを訂正するための仕訳として正しいものはどれか。","ch":["(借)未払配当金 500,000 ／ (貸)繰越利益剰余金 500,000","(借)繰越利益剰余金 500,000 ／ (貸)未払配当金 500,000","(借)未払配当金 500,000 ／ (貸)当座預金 500,000","(借)当座預金 500,000 ／ (貸)未払配当金 500,000"],"e":"支払時の正しい借方は未払配当金です。誤って借方に記入した繰越利益剰余金を貸方に記入して取り消し、本来減らすべき未払配当金を借方に記入します。"},{"c":"仕訳","t":"株式会社","q":"決算において、収益総額は¥9,700,000、費用総額は¥8,500,000であった。損益勘定の残高を資本の勘定へ振り替える仕訳として正しいものはどれか。","ch":["(借)損益 1,200,000 ／ (貸)繰越利益剰余金 1,200,000","(借)繰越利益剰余金 1,200,000 ／ (貸)損益 1,200,000","(借)損益 1,200,000 ／ (貸)資本金 1,200,000","(借)損益 1,200,000 ／ (貸)未払配当金 1,200,000"],"e":"収益¥9,700,000−費用¥8,500,000=当期純利益¥1,200,000です。純利益は損益勘定から繰越利益剰余金勘定の貸方へ振り替えます。"},{"c":"仕訳","t":"株式会社","q":"配当金¥400,000を当座預金口座から支払った際、誤って「(借)未払金 400,000 ／ (貸)当座預金 400,000」と記帳していたことが判明した。これを訂正するための仕訳として正しいものはどれか。","ch":["(借)未払配当金 400,000 ／ (貸)未払金 400,000","(借)未払金 400,000 ／ (貸)未払配当金 400,000","(借)未払配当金 400,000 ／ (貸)当座預金 400,000","(借)繰越利益剰余金 400,000 ／ (貸)未払金 400,000"],"e":"誤って減らした未払金を貸方に記入して元に戻し、本来減らすべき未払配当金を借方に記入します。当座預金の減少は正しく記帳されているため動かしません。"},{"c":"仕訳","t":"証ひょう","q":"商品を仕入れ、次の納品書兼請求書を受け取った。「A商品 10個 @¥500 ¥5,000、B商品 20個 @¥300 ¥6,000、合計 ¥11,000。代金は月末までにお支払いください」。適切な仕訳はどれか(消費税は考慮しない)。","ch":["(借)仕入 11,000 ／ (貸)買掛金 11,000","(借)仕入 11,000 ／ (貸)未払金 11,000","(借)仕入 11,000 ／ (貸)現金 11,000","(借)買掛金 11,000 ／ (貸)仕入 11,000"],"e":"納品書兼請求書から、商品を受け取り済みで代金が後払い(月末払い)であることが読み取れます。商品代金の後払いなので、未払金ではなく買掛金(負債)を使います。"},{"c":"仕訳","t":"証ひょう","q":"得意先に商品を発送し、次の請求書(控)を発行した。「C商品 30個 @¥800 ¥24,000、D商品 10個 @¥600 ¥6,000、合計 ¥30,000。代金は翌月20日までに当社指定の普通預金口座へお振込みください」。適切な仕訳はどれか。","ch":["(借)売掛金 30,000 ／ (貸)売上 30,000","(借)普通預金 30,000 ／ (貸)売上 30,000","(借)未収入金 30,000 ／ (貸)売上 30,000","(借)売上 30,000 ／ (貸)売掛金 30,000"],"e":"商品はすでに発送しているので売上を計上します。代金は翌月振込みでまだ受け取っていないため、売掛金(資産)で処理します。振込前に普通預金を計上してはいけません。"},{"c":"仕訳","t":"証ひょう","q":"事務用のパソコンを購入し、次の領収書を受け取った。「パソコン本体 ¥180,000、セッティング作業料 ¥20,000、合計 ¥200,000。上記金額を現金にて領収いたしました」。適切な仕訳はどれか。","ch":["(借)備品 200,000 ／ (貸)現金 200,000","(借)備品 180,000、支払手数料 20,000 ／ (貸)現金 200,000","(借)消耗品費 200,000 ／ (貸)現金 200,000","(借)備品 180,000、消耗品費 20,000 ／ (貸)現金 200,000"],"e":"セッティング作業料のような、使用するまでにかかった付随費用は備品の取得原価に含めます。したがって備品¥200,000として計上します。"},{"c":"仕訳","t":"証ひょう","q":"従業員が営業活動のためタクシーを利用し、次の領収書を提出したので現金で精算した。「乗車運賃 ¥3,200。上記金額を領収いたしました。○○タクシー株式会社」。適切な仕訳はどれか。","ch":["(借)旅費交通費 3,200 ／ (貸)現金 3,200","(借)発送費 3,200 ／ (貸)現金 3,200","(借)雑費 3,200 ／ (貸)現金 3,200","(借)車両運搬具 3,200 ／ (貸)現金 3,200"],"e":"業務のための電車代・バス代・タクシー代は「旅費交通費」(費用)で処理します。車両運搬具は自社で車を購入したときに使う資産の勘定科目です。"},{"c":"仕訳","t":"証ひょう","q":"取引銀行から送付された当座勘定照合表に、次の記載があった。「○月15日 お引出し 融資ご返済 ¥400,000」「○月15日 お引出し 融資お利息 ¥4,000」。この取引の仕訳として適切なものはどれか。","ch":["(借)借入金 400,000、支払利息 4,000 ／ (貸)当座預金 404,000","(借)借入金 404,000 ／ (貸)当座預金 404,000","(借)貸付金 400,000、支払利息 4,000 ／ (貸)当座預金 404,000","(借)借入金 400,000、受取利息 4,000 ／ (貸)当座預金 404,000"],"e":"「融資ご返済」は銀行からの借入金の返済を意味します。元金¥400,000は借入金の減少、利息¥4,000は支払利息(費用)として分けて処理します。"},{"c":"仕訳","t":"証ひょう","q":"取引銀行から送付された当座勘定照合表に「○月10日 お引出し 約束手形決済 ¥250,000」との記載があった。これは当社が仕入代金の支払いのために振り出していた約束手形の決済である。適切な仕訳はどれか。","ch":["(借)支払手形 250,000 ／ (貸)当座預金 250,000","(借)受取手形 250,000 ／ (貸)当座預金 250,000","(借)買掛金 250,000 ／ (貸)当座預金 250,000","(借)手形借入金 250,000 ／ (貸)当座預金 250,000"],"e":"当社が振り出した約束手形は「支払手形」(負債)で計上されており、決済によって当座預金から引き落とされるため、支払手形を借方に記入して減らします。"},{"c":"仕訳","t":"証ひょう","q":"事務所の賃借契約にあたり、不動産会社から次の振込依頼書を受け取り、全額を普通預金口座から振り込んだ。「敷金 ¥300,000、初月賃料 ¥100,000、仲介手数料 ¥100,000、合計 ¥500,000」。適切な仕訳はどれか。","ch":["(借)差入保証金 300,000、支払家賃 100,000、支払手数料 100,000 ／ (貸)普通預金 500,000","(借)支払家賃 500,000 ／ (貸)普通預金 500,000","(借)差入保証金 500,000 ／ (貸)普通預金 500,000","(借)差入保証金 300,000、支払家賃 200,000 ／ (貸)普通預金 500,000"],"e":"振込依頼書の内訳ごとに勘定科目を分けます。敷金は返還されるため差入保証金(資産)、賃料は支払家賃(費用)、仲介手数料は支払手数料(費用)です。"},{"c":"仕訳","t":"証ひょう","q":"当月の給与支給明細書は次のとおりであり、差引支給額を普通預金口座から従業員の口座へ振り込んだ。「支給総額 ¥300,000、控除:所得税 ¥8,000、住民税 ¥12,000、社会保険料 ¥30,000、差引支給額 ¥250,000」。適切な仕訳はどれか。","ch":["(借)給料 300,000 ／ (貸)所得税預り金 8,000、住民税預り金 12,000、社会保険料預り金 30,000、普通預金 250,000","(借)給料 250,000 ／ (貸)普通預金 250,000","(借)給料 300,000 ／ (貸)所得税預り金 8,000、住民税預り金 12,000、法定福利費 30,000、普通預金 250,000","(借)給料 250,000、法定福利費 50,000 ／ (貸)普通預金 300,000"],"e":"給料は支給総額¥300,000で費用計上し、控除額はそれぞれ預り金(負債)として処理します。明細書の社会保険料は従業員負担分の控除なので、法定福利費(会社負担分の科目)は使いません。"},{"c":"仕訳","t":"証ひょう","q":"商品を仕入れ、次の請求書を受け取った。「E商品 20個 @¥1,000 ¥20,000、消費税 ¥2,000、合計 ¥22,000。代金は月末までにお支払いください」。消費税は税抜方式で記帳している。適切な仕訳はどれか。","ch":["(借)仕入 20,000、仮払消費税 2,000 ／ (貸)買掛金 22,000","(借)仕入 22,000 ／ (貸)買掛金 22,000","(借)仕入 20,000、仮受消費税 2,000 ／ (貸)買掛金 22,000","(借)仕入 20,000、仮払消費税 2,000 ／ (貸)未払金 22,000"],"e":"税抜方式では、仕入は税抜の¥20,000で計上し、支払う消費税¥2,000は仮払消費税(資産)とします。商品代金の後払いなので貸方は買掛金¥22,000です。"},{"c":"仕訳","t":"証ひょう","q":"得意先に商品を売り上げ、次の請求書(控)を発行した。「F商品 50個 @¥2,000 ¥100,000、消費税 ¥10,000、合計 ¥110,000。代金は翌月末までにお振込みください」。消費税は税抜方式で記帳している。適切な仕訳はどれか。","ch":["(借)売掛金 110,000 ／ (貸)売上 100,000、仮受消費税 10,000","(借)売掛金 110,000 ／ (貸)売上 110,000","(借)売掛金 110,000 ／ (貸)売上 100,000、仮払消費税 10,000","(借)売掛金 100,000、仮受消費税 10,000 ／ (貸)売上 110,000"],"e":"売上は税抜の¥100,000で計上し、預かる消費税¥10,000は仮受消費税(負債)とします。売掛金は請求額の合計¥110,000です。"},{"c":"仕訳","t":"証ひょう","q":"商品を仕入れ、次の納品書兼領収書を受け取った。「G商品 40個 @¥250 ¥10,000、送料 ¥2,000、合計 ¥12,000。上記金額を現金にて領収いたしました」。なお、送料は当社負担である。適切な仕訳はどれか。","ch":["(借)仕入 12,000 ／ (貸)現金 12,000","(借)仕入 10,000、発送費 2,000 ／ (貸)現金 12,000","(借)仕入 10,000、支払手数料 2,000 ／ (貸)現金 12,000","(借)仕入 10,000 ／ (貸)現金 10,000"],"e":"商品を仕入れる際に当社が負担した送料(仕入諸掛)は、仕入の金額に含めて処理します。したがって仕入は¥10,000+¥2,000=¥12,000です。"},{"c":"仕訳","t":"証ひょう","q":"郵便局で次の領収書を受け取った。「収入印紙 ¥6,000。上記金額を現金にて領収いたしました」。なお、収入印紙はただちに使用した。適切な仕訳はどれか。","ch":["(借)租税公課 6,000 ／ (貸)現金 6,000","(借)通信費 6,000 ／ (貸)現金 6,000","(借)消耗品費 6,000 ／ (貸)現金 6,000","(借)支払手数料 6,000 ／ (貸)現金 6,000"],"e":"収入印紙は印紙税を納付するためのものなので「租税公課」(費用)で処理します。郵便局で買っても、切手(通信費)とは勘定科目が異なる点に注意しましょう。"},{"c":"仕訳","t":"証ひょう","q":"市役所から送付された固定資産税の納税通知書にもとづき、全期分¥100,000を現金で納付し、領収証書を受け取った。適切な仕訳はどれか。","ch":["(借)租税公課 100,000 ／ (貸)現金 100,000","(借)法人税等 100,000 ／ (貸)現金 100,000","(借)建物 100,000 ／ (貸)現金 100,000","(借)未払法人税等 100,000 ／ (貸)現金 100,000"],"e":"固定資産税は会社の費用となる税金なので「租税公課」で処理します。法人税等は会社の利益に対する税金に使う勘定科目であり、固定資産税には使いません。"},{"c":"仕訳","t":"証ひょう","q":"出張から戻った従業員が、次の領収書を提出した。「鉄道運賃 ¥8,000」「宿泊費 ¥12,000」。出発時に概算額¥25,000を渡して仮払金として処理しており、残額¥5,000は現金で受け取った。適切な仕訳はどれか。","ch":["(借)旅費交通費 20,000、現金 5,000 ／ (貸)仮払金 25,000","(借)旅費交通費 25,000 ／ (貸)仮払金 25,000","(借)旅費交通費 20,000 ／ (貸)仮払金 20,000","(借)旅費交通費 20,000、現金 5,000 ／ (貸)仮受金 25,000"],"e":"領収書から旅費は¥8,000+¥12,000=¥20,000と確定します。仮払金は渡した全額¥25,000を取り崩し、差額¥5,000は現金で戻ってきたと処理します。"},{"c":"仕訳","t":"証ひょう","q":"本日の売上集計表は次のとおりであった。「現金売上 ¥30,000、クレジットカード売上 ¥50,000、合計 ¥80,000」。なお、クレジットカード売上については、信販会社への手数料(クレジット売上代金の4%)を販売時に計上する。適切な仕訳はどれか。","ch":["(借)現金 30,000、クレジット売掛金 48,000、支払手数料 2,000 ／ (貸)売上 80,000","(借)現金 30,000、クレジット売掛金 50,000 ／ (貸)売上 80,000","(借)現金 30,000、売掛金 48,000、支払手数料 2,000 ／ (貸)売上 80,000","(借)現金 30,000、クレジット売掛金 46,800、支払手数料 3,200 ／ (貸)売上 80,000"],"e":"手数料はクレジット売上¥50,000×4%=¥2,000で、売上全体の¥80,000に掛けるのではありません。信販会社への債権は手数料を差し引いた¥48,000をクレジット売掛金として計上します。"},{"c":"仕訳","t":"証ひょう","q":"取引銀行から送付された当座勘定照合表に「○月20日 お預入れ 振込 カ)ヤマダショウテン ¥150,000」との記載があった。これは得意先山田商店に対する売掛金の回収であることが確認された。適切な仕訳はどれか。","ch":["(借)当座預金 150,000 ／ (貸)売掛金 150,000","(借)売掛金 150,000 ／ (貸)当座預金 150,000","(借)当座預金 150,000 ／ (貸)売上 150,000","(借)当座預金 150,000 ／ (貸)未収入金 150,000"],"e":"照合表の「お預入れ」は当座預金の増加を意味します。売掛金の回収と確認されているので、資産である売掛金を貸方に記入して減らします。"},{"c":"仕訳","t":"証ひょう","q":"インターネットバンキングの入出金明細に次の記載があった。「お振込 ○○商店 ¥200,000」「振込手数料 ¥400」。これは仕入先○○商店への買掛金の支払いであり、振込手数料は当社負担で普通預金口座から引き落とされた。適切な仕訳はどれか。","ch":["(借)買掛金 200,000、支払手数料 400 ／ (貸)普通預金 200,400","(借)買掛金 200,400 ／ (貸)普通預金 200,400","(借)買掛金 200,000、支払利息 400 ／ (貸)普通預金 200,400","(借)未払金 200,000、支払手数料 400 ／ (貸)普通預金 200,400"],"e":"買掛金の減少は¥200,000であり、当社負担の振込手数料¥400は支払手数料(費用)として別に計上します。普通預金は合計¥200,400減少します。"},{"c":"仕訳","t":"証ひょう","q":"文具店から次の請求書を受け取った。「コピー用紙 10箱 @¥500 ¥5,000、ボールペン 30本 @¥100 ¥3,000、合計 ¥8,000。代金は翌月末までにお支払いください」。なお、事務用品は費用として処理する。適切な仕訳はどれか。","ch":["(借)消耗品費 8,000 ／ (貸)未払金 8,000","(借)消耗品費 8,000 ／ (貸)買掛金 8,000","(借)仕入 8,000 ／ (貸)買掛金 8,000","(借)備品 8,000 ／ (貸)未払金 8,000"],"e":"事務用品は販売用の商品ではないので消耗品費(費用)で処理し、その後払い代金は買掛金ではなく未払金(負債)とします。"},{"c":"仕訳","t":"証ひょう","q":"商品を売り上げ、次の領収書(控)を発行した。「商品代金 ¥30,000。上記金額を現金にて領収いたしました」。適切な仕訳はどれか。","ch":["(借)現金 30,000 ／ (貸)売上 30,000","(借)売掛金 30,000 ／ (貸)売上 30,000","(借)現金 30,000 ／ (貸)前受金 30,000","(借)売上 30,000 ／ (貸)現金 30,000"],"e":"領収書(控)から、商品を引き渡して代金¥30,000を現金で受け取ったことが読み取れます。商品の引渡しが済んでいるので、前受金ではなく売上を計上します。"},{"c":"仕訳","t":"証ひょう","q":"事務所の貸主から次の振込依頼書を受け取り、普通預金口座から振り込んだ。「○月分賃料 ¥120,000。下記の口座へお振込みください」。適切な仕訳はどれか。","ch":["(借)支払家賃 120,000 ／ (貸)普通預金 120,000","(借)差入保証金 120,000 ／ (貸)普通預金 120,000","(借)支払地代 120,000 ／ (貸)普通預金 120,000","(借)未払金 120,000 ／ (貸)普通預金 120,000"],"e":"事務所(建物)の賃料は「支払家賃」(費用)で処理します。支払地代は土地を借りたときの賃料に使う勘定科目なので区別しましょう。"},{"c":"決算","t":"決算整理仕訳","q":"決算にあたり、売上原価を仕入勘定で算定する。期首商品棚卸高は¥50,000であった。期首商品を仕入勘定へ振り替える仕訳として正しいものはどれか。","ch":["(借)仕入 50,000 ／ (貸)繰越商品 50,000","(借)繰越商品 50,000 ／ (貸)仕入 50,000","(借)売上原価 50,000 ／ (貸)繰越商品 50,000","(借)仕入 50,000 ／ (貸)売上 50,000"],"e":"期首商品は「しーくり」で繰越商品勘定から仕入勘定の借方へ振り替えます。貸借を逆にすると期末商品の振替仕訳になってしまうので注意しましょう。"},{"c":"決算","t":"決算整理仕訳","q":"決算にあたり、売上原価を仕入勘定で算定する。期末商品棚卸高は¥80,000であった。期末商品に関する決算整理仕訳として正しいものはどれか。","ch":["(借)繰越商品 80,000 ／ (貸)仕入 80,000","(借)仕入 80,000 ／ (貸)繰越商品 80,000","(借)繰越商品 80,000 ／ (貸)売上 80,000","(借)売上原価 80,000 ／ (貸)仕入 80,000"],"e":"期末に残った商品は「くりしー」で仕入勘定から繰越商品勘定へ振り替え、仕入勘定の残高を売上原価にします。"},{"c":"決算","t":"決算整理仕訳","q":"期首商品棚卸高¥40,000、当期商品仕入高¥500,000、期末商品棚卸高¥60,000であった。売上原価はいくらか。","ch":["¥480,000","¥520,000","¥500,000","¥440,000"],"e":"売上原価＝期首商品＋当期仕入−期末商品なので、40,000＋500,000−60,000＝480,000です。期末商品を加算してしまう間違いに注意しましょう。"},{"c":"決算","t":"決算整理仕訳","q":"決算にあたり売上原価を仕入勘定で算定する。期首商品棚卸高は¥30,000、期末商品棚卸高は¥50,000である。決算整理仕訳として正しい組み合わせはどれか。","ch":["(借)仕入 30,000 ／ (貸)繰越商品 30,000 と (借)繰越商品 50,000 ／ (貸)仕入 50,000","(借)繰越商品 30,000 ／ (貸)仕入 30,000 と (借)仕入 50,000 ／ (貸)繰越商品 50,000","(借)仕入 50,000 ／ (貸)繰越商品 50,000 と (借)繰越商品 30,000 ／ (貸)仕入 30,000","(借)売上原価 30,000 ／ (貸)繰越商品 30,000 と (借)繰越商品 50,000 ／ (貸)売上原価 50,000"],"e":"「しーくり(期首30,000を仕入へ)、くりしー(期末50,000を繰越商品へ)」の順で振り替えます。金額の取り違えや貸借の逆に注意しましょう。"},{"c":"決算","t":"決算整理仕訳","q":"決算にあたり、売掛金残高¥300,000に対して2%の貸倒引当金を差額補充法により設定する。貸倒引当金の決算整理前残高は¥2,000である。正しい仕訳はどれか。","ch":["(借)貸倒引当金繰入 4,000 ／ (貸)貸倒引当金 4,000","(借)貸倒引当金繰入 6,000 ／ (貸)貸倒引当金 6,000","(借)貸倒引当金 4,000 ／ (貸)貸倒引当金繰入 4,000","(借)貸倒引当金繰入 2,000 ／ (貸)貸倒引当金 2,000"],"e":"見積額は300,000×2%＝6,000。差額補充法では残高2,000との差額6,000−2,000＝4,000だけを繰り入れます。全額6,000を繰り入れないよう注意しましょう。"},{"c":"決算","t":"決算整理仕訳","q":"決算にあたり、受取手形¥200,000と売掛金¥400,000の合計に対して3%の貸倒引当金を差額補充法で設定する。貸倒引当金の残高は¥10,000である。正しい仕訳はどれか。","ch":["(借)貸倒引当金繰入 8,000 ／ (貸)貸倒引当金 8,000","(借)貸倒引当金繰入 18,000 ／ (貸)貸倒引当金 18,000","(借)貸倒引当金繰入 12,000 ／ (貸)貸倒引当金 12,000","(借)貸倒引当金 8,000 ／ (貸)貸倒引当金繰入 8,000"],"e":"見積額は(200,000＋400,000)×3%＝18,000。差額補充法なので18,000−10,000＝8,000を繰り入れます。売掛金だけで計算しないよう注意しましょう。"},{"c":"決算","t":"決算整理仕訳","q":"決算にあたり、売掛金残高¥250,000に対して2%の貸倒引当金を設定する。貸倒引当金の決算整理前残高は¥7,000である。正しい仕訳はどれか。","ch":["(借)貸倒引当金 2,000 ／ (貸)貸倒引当金戻入 2,000","(借)貸倒引当金繰入 2,000 ／ (貸)貸倒引当金 2,000","(借)貸倒引当金戻入 2,000 ／ (貸)貸倒引当金 2,000","(借)貸倒引当金繰入 5,000 ／ (貸)貸倒引当金 5,000"],"e":"見積額は250,000×2%＝5,000ですが、残高が7,000と多すぎるため、差額2,000を貸倒引当金戻入(収益)として戻し入れます。"},{"c":"決算","t":"決算整理仕訳","q":"決算にあたり、売掛金残高¥500,000に対して2%の貸倒引当金を差額補充法で設定する。貸倒引当金の決算整理前残高が¥3,000のとき、貸倒引当金繰入の金額はいくらか。","ch":["¥7,000","¥10,000","¥3,000","¥13,000"],"e":"見積額は500,000×2%＝10,000。差額補充法なので繰入額は10,000−3,000＝7,000です。"},{"c":"決算","t":"決算整理仕訳","q":"決算(3月31日)にあたり、期首に取得した備品(取得原価¥600,000、耐用年数5年、残存価額ゼロ)について定額法・間接法で減価償却を行う。正しい仕訳はどれか。","ch":["(借)減価償却費 120,000 ／ (貸)備品減価償却累計額 120,000","(借)減価償却費 120,000 ／ (貸)備品 120,000","(借)備品減価償却累計額 120,000 ／ (貸)減価償却費 120,000","(借)減価償却費 100,000 ／ (貸)備品減価償却累計額 100,000"],"e":"減価償却費は600,000÷5年＝120,000。間接法では備品勘定を直接減らさず、備品減価償却累計額勘定の貸方に記入します。"},{"c":"決算","t":"決算整理仕訳","q":"決算にあたり、建物(取得原価¥2,400,000、耐用年数30年、残存価額ゼロ、期首取得)について定額法・間接法で減価償却を行う。正しい仕訳はどれか。","ch":["(借)減価償却費 80,000 ／ (貸)建物減価償却累計額 80,000","(借)減価償却費 80,000 ／ (貸)建物 80,000","(借)減価償却費 240,000 ／ (貸)建物減価償却累計額 240,000","(借)建物減価償却累計額 80,000 ／ (貸)減価償却費 80,000"],"e":"減価償却費は2,400,000÷30年＝80,000です。間接法なので貸方は建物減価償却累計額勘定を使います。"},{"c":"決算","t":"決算整理仕訳","q":"当期の12月1日に備品¥360,000(耐用年数4年、残存価額ゼロ)を取得し、使用を開始した。決算日(3月31日)における定額法・間接法による減価償却の仕訳として正しいものはどれか。","ch":["(借)減価償却費 30,000 ／ (貸)備品減価償却累計額 30,000","(借)減価償却費 90,000 ／ (貸)備品減価償却累計額 90,000","(借)減価償却費 37,500 ／ (貸)備品減価償却累計額 37,500","(借)減価償却費 22,500 ／ (貸)備品減価償却累計額 22,500"],"e":"年間償却費は360,000÷4年＝90,000。12月1日から3月31日までの4か月分を月割りして、90,000×4/12
